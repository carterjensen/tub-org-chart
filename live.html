<script>
(function(){
  try{
    var saved=localStorage.getItem('tub-theme');
    var theme=saved||'light';
    document.documentElement.dataset.theme=theme;
  }catch(e){document.documentElement.dataset.theme='dark'}
  try{
    var exp=parseInt(localStorage.getItem('tub-access')||'0',10);
    if(!exp||Date.now()>exp){
      document.documentElement.classList.add('locked');
    }
  }catch(e){document.documentElement.classList.add('locked')}
})();
</script>
<style>
/* ═══ RESET & BASE ═══ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;scroll-padding-top:72px}
body{
  font-family:'Geist',-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg);color:var(--text);
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  overflow-x:hidden;font-feature-settings:'ss01','ss02','cv11';letter-spacing:-.01em;
  transition:background-color .5s cubic-bezier(.4,0,.2,1),color .5s cubic-bezier(.4,0,.2,1);
}
::selection{background:var(--gold);color:var(--bg)}
a{color:inherit;text-decoration:none}
button{background:none;border:none;color:inherit;font-family:inherit;cursor:pointer}
img{display:block;max-width:100%;height:auto}

/* ═══ THEME VARIABLES ═══ */
:root,:root[data-theme="dark"]{
  --bg:#0B0A08;--bg-warm:#13110D;--bg-warmer:#1C1812;
  --text:#EDE8DC;--text-mute:rgba(237,232,220,.55);--text-faint:rgba(237,232,220,.28);
  --gold:#D1B25A;--gold-bright:#E8C570;
  --gold-subtle:var(--gold-subtle);--gold-soft:var(--gold-soft);
  --gold-medium:var(--gold-medium);--gold-strong:var(--gold-strong);
  --gold-glow:var(--gold-glow);
  --green:#4A8C5C;--green-subtle:rgba(74,140,92,.05);--green-soft:rgba(74,140,92,.12);
  --red:#E74C3C;--red-soft:rgba(231,76,60,.1);
  --hairline:rgba(237,232,220,.08);--hairline-strong:rgba(237,232,220,.15);
  --surface-subtle:rgba(237,232,220,.02);--surface-raised:rgba(237,232,220,.04);
  --nav-bg-start:rgba(11,10,8,.88);--nav-bg-mid:rgba(11,10,8,.45);
  --shadow-card:0 6px 20px rgba(0,0,0,.2);
  --shadow-raised:0 10px 36px rgba(0,0,0,.25);
  --grid-line:rgba(237,232,220,.025);
  --grain-opacity:.06;
  /* Inverse — used by numbers section so it stays a contrast moment in both modes */
  --inverse-bg:#F5F2EC;--inverse-text:#18160F;
  --inverse-accent:#8B7024;
  --inverse-mute:rgba(24,22,15,.65);--inverse-faint:rgba(24,22,15,.4);
  --inverse-hairline:rgba(24,22,15,.15);--inverse-hairline-strong:rgba(24,22,15,.25);
  --inverse-grain:.25;
}

:root[data-theme="light"]{
  --bg:#F5F2EC;--bg-warm:#EDE8DC;--bg-warmer:#DFD8C5;
  --text:#18160F;--text-mute:rgba(24,22,15,.62);--text-faint:rgba(24,22,15,.4);
  --gold:#8B7024;--gold-bright:#A88C35;
  --gold-subtle:rgba(139,112,36,.05);--gold-soft:rgba(139,112,36,.1);
  --gold-medium:rgba(139,112,36,.2);--gold-strong:rgba(139,112,36,.32);
  --gold-glow:rgba(139,112,36,.38);
  --green:#2F5B4A;--green-subtle:rgba(47,91,74,.05);--green-soft:rgba(47,91,74,.12);
  --red:#C53530;--red-soft:rgba(197,53,48,.1);
  --hairline:rgba(24,22,15,.1);--hairline-strong:rgba(24,22,15,.2);
  --surface-subtle:rgba(24,22,15,.03);--surface-raised:rgba(24,22,15,.06);
  --nav-bg-start:rgba(245,242,236,.94);--nav-bg-mid:rgba(245,242,236,.55);
  --shadow-card:0 4px 20px rgba(24,22,15,.08);
  --shadow-raised:0 10px 36px rgba(24,22,15,.12);
  --grid-line:rgba(24,22,15,.05);
  --grain-opacity:.12;
  /* Inverse flips to dark for the palate-cleanser moment */
  --inverse-bg:#0B0A08;--inverse-text:#EDE8DC;
  --inverse-accent:#D1B25A;
  --inverse-mute:rgba(237,232,220,.55);--inverse-faint:rgba(237,232,220,.3);
  --inverse-hairline:rgba(237,232,220,.12);--inverse-hairline-strong:rgba(237,232,220,.22);
  --inverse-grain:.08;
}

.serif{font-family:'Fraunces',Georgia,serif;font-feature-settings:'ss01','ss02','ss03'}
.mono{font-family:'JetBrains Mono',ui-monospace,monospace}
.eyebrow{
  font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:400;letter-spacing:2.2px;
  text-transform:uppercase;color:var(--gold);display:inline-flex;align-items:center;
}
.eyebrow-bar{display:inline-block;width:28px;height:1px;background:var(--gold);margin-right:14px}

/* ═══ TOP NAV ═══ */
.nav-top{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;justify-content:space-between;align-items:center;
  padding:22px 40px;font-size:12px;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  background:linear-gradient(180deg,var(--nav-bg-start) 0%,var(--nav-bg-mid) 70%,transparent 100%);
  transition:background .5s;
}
.nav-logo{font-family:'Fraunces',Georgia,serif;font-size:19px;font-weight:400;letter-spacing:-.015em}
.nav-logo em{font-style:italic;color:var(--gold);font-weight:300}
.nav-center{
  display:flex;align-items:center;gap:10px;padding:6px 14px 6px 12px;
  background:var(--gold-subtle);border:1px solid var(--gold-medium);border-radius:100px;
  font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1.8px;color:var(--gold);
  text-transform:uppercase;
}
.nav-center-dot{position:relative;width:7px;height:7px;border-radius:50%;background:var(--gold);animation:dotPulse 2.2s ease-in-out infinite}
.nav-center-dot::before{content:'';position:absolute;inset:-3px;border-radius:50%;background:var(--gold-strong);animation:dotRing 2.2s ease-out infinite}
@keyframes dotPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.75;transform:scale(.82)}}
@keyframes dotRing{0%{transform:scale(.8);opacity:.6}100%{transform:scale(2.8);opacity:0}}
.nav-right{justify-self:end;display:flex;align-items:center;gap:10px}
.nav-coach{
  display:flex;align-items:center;gap:8px;
  padding:7px 14px;
  background:linear-gradient(180deg,var(--gold-soft),var(--gold-subtle));
  border:1px solid var(--gold-strong);
  border-radius:100px;
  font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--gold);font-weight:500;
  transition:all .3s cubic-bezier(.22,1,.36,1);
  position:relative;overflow:hidden;
}
.nav-coach::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 100% at 50% 120%,var(--gold-strong),transparent 70%);
  opacity:0;transition:opacity .3s;
}
.nav-coach:hover{
  border-color:var(--gold);color:var(--gold-bright);
  transform:translateY(-1px);
  box-shadow:0 4px 14px var(--gold-medium);
}
.nav-coach:hover::before{opacity:1}
.nav-coach-dot{
  position:relative;width:6px;height:6px;border-radius:50%;background:var(--gold);
  box-shadow:0 0 8px var(--gold);animation:dotPulse 2.2s ease-in-out infinite;z-index:1;
}
.nav-coach-label{position:relative;z-index:1}
.nav-coach-arrow{
  position:relative;z-index:1;
  font-size:11px;opacity:.7;
  transition:transform .3s cubic-bezier(.22,1,.36,1),opacity .3s;
}
.nav-coach:hover .nav-coach-arrow{opacity:1;transform:translate(3px,-3px)}
.nav-exit{
  display:flex;align-items:center;gap:10px;
  font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:1.4px;text-transform:uppercase;
  color:var(--text-mute);padding:6px 12px;border:1px solid var(--hairline);border-radius:100px;
  transition:all .25s;
}
.nav-exit:hover{color:var(--text);border-color:var(--hairline-strong)}
.nav-exit-key{font-size:9px;padding:2px 5px;border:1px solid var(--hairline-strong);border-radius:3px;color:var(--text-faint)}

/* ═══ HERO (combined home — title + brand picker) ═══ */
.hero{position:relative;min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:130px 48px 80px;overflow:hidden}
.hero-bg-grid{position:absolute;inset:0;background-image:linear-gradient(var(--grid-line) 1px,transparent 1px),linear-gradient(90deg,var(--grid-line) 1px,transparent 1px);background-size:96px 96px;background-position:center;mask-image:radial-gradient(ellipse 90% 80% at 50% 50%,#000 20%,transparent 80%);-webkit-mask-image:radial-gradient(ellipse 90% 80% at 50% 50%,#000 20%,transparent 80%);pointer-events:none;opacity:.75}
.hero-bg-gradient{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 20% 30%,var(--gold-soft) 0%,transparent 60%),radial-gradient(ellipse 60% 50% at 85% 70%,var(--green-soft) 0%,transparent 60%);pointer-events:none;animation:ambient 24s ease-in-out infinite alternate}
@keyframes ambient{0%{transform:translate(0,0)}50%{transform:translate(-20px,10px)}100%{transform:translate(10px,-15px)}}
.hero-bg-noise{position:absolute;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='2'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.65'/%3E%3C/svg%3E");opacity:var(--grain-opacity);mix-blend-mode:overlay;pointer-events:none}
.hero-particles{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.particle{position:absolute;width:3px;height:3px;border-radius:50%;background:var(--gold);box-shadow:0 0 8px var(--gold);animation:floatParticle 20s linear infinite}
@keyframes floatParticle{0%{opacity:0;transform:translate(0,0) scale(.5)}10%{opacity:1}90%{opacity:1}100%{opacity:0;transform:translate(40px,-120px) scale(.8)}}

.hero-inner{position:relative;z-index:2;max-width:1440px;margin:0 auto;width:100%}
.hero-eyebrow{opacity:0;animation:fadeUp 1s cubic-bezier(.22,1,.36,1) .2s forwards}
.hero-eyebrow-sep{color:var(--text-faint);margin:0 14px;font-weight:300}
.hero-title{
  font-family:'Fraunces',Georgia,serif;font-size:clamp(40px,6.2vw,96px);line-height:.9;
  font-weight:300;letter-spacing:-.045em;margin-top:32px;color:var(--text);
  font-variation-settings:'opsz' 144,'SOFT' 40;
}
.hero-title .line{display:block;overflow:hidden;padding-bottom:.04em}
.hero-title .inner{display:inline-block;transform:translateY(115%);animation:lineReveal 1.3s cubic-bezier(.19,1,.22,1) forwards}
.hero-title .line:nth-child(1) .inner{animation-delay:.35s}
.hero-title .line:nth-child(2) .inner{animation-delay:.5s}
.hero-title .line:nth-child(3) .inner{animation-delay:.65s}
.hero-title em{font-style:italic;color:var(--gold);font-weight:300;font-variation-settings:'opsz' 144,'SOFT' 100}
@keyframes lineReveal{0%{transform:translateY(115%)}100%{transform:translateY(0)}}
@keyframes fadeUp{0%{opacity:0;transform:translateY(24px)}100%{opacity:1;transform:translateY(0)}}

.hero-sub{max-width:680px;margin-top:32px;font-size:15.5px;line-height:1.6;color:var(--text-mute);font-weight:300;letter-spacing:-.005em;opacity:0;animation:fadeUp 1s cubic-bezier(.22,1,.36,1) 1.1s forwards}
.hero-sub em{font-style:italic;color:var(--text);font-family:'Fraunces',Georgia,serif;font-weight:400;font-size:16.5px}

/* Inline brain-peek callout (under subtitle) */
.hero-peek{
  display:inline-flex;align-items:center;gap:10px;
  margin-top:22px;padding:8px 16px 8px 12px;
  background:var(--gold-subtle);border:1px solid var(--gold-medium);
  border-radius:100px;
  font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--gold);font-weight:500;
  transition:all .3s cubic-bezier(.22,1,.36,1);
  opacity:0;animation:fadeUp 1s cubic-bezier(.22,1,.36,1) 1.3s forwards;
  position:relative;overflow:hidden;
}
.hero-peek::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 100% at 50% 120%,var(--gold-strong),transparent 70%);
  opacity:0;transition:opacity .3s;pointer-events:none;
}
.hero-peek:hover{border-color:var(--gold);color:var(--gold-bright);transform:translateY(-1px);box-shadow:0 4px 14px var(--gold-medium)}
.hero-peek:hover::before{opacity:1}
.hero-peek-dot{position:relative;z-index:1;width:6px;height:6px;border-radius:50%;background:var(--gold);box-shadow:0 0 6px var(--gold);animation:dotPulse 2.2s ease-in-out infinite}
.hero-peek-label{position:relative;z-index:1}
.hero-peek-arrow{position:relative;z-index:1;font-size:12px;opacity:.7;transition:transform .3s,opacity .3s}
.hero-peek:hover .hero-peek-arrow{opacity:1;transform:translateX(3px)}

/* Tiles inline inside hero */
.hero-tiles{margin-top:36px;display:grid;grid-template-columns:repeat(7,1fr);gap:8px;opacity:0;animation:fadeUp 1s cubic-bezier(.22,1,.36,1) 1.5s forwards}
.hero-footnote{margin-top:28px;display:flex;align-items:center;gap:10px;font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:1.8px;text-transform:uppercase;color:var(--text-faint);opacity:0;animation:fadeUp 1s cubic-bezier(.22,1,.36,1) 1.75s forwards}
.hero-footnote-arrow{display:inline-block;animation:footnoteArrow 2.4s ease-in-out infinite}
@keyframes footnoteArrow{0%,100%{transform:translateY(0);opacity:.5}50%{transform:translateY(3px);opacity:1}}

.hero-meta{display:flex;align-items:flex-end;gap:80px;margin-top:96px;opacity:0;animation:fadeUp 1s cubic-bezier(.22,1,.36,1) 1.4s forwards}
.hero-meta-item{display:flex;flex-direction:column;gap:10px;min-width:0}
.hero-meta-val{font-family:'Fraunces',Georgia,serif;font-size:60px;font-weight:300;line-height:1;color:var(--text);letter-spacing:-.025em;font-variation-settings:'opsz' 144;font-variant-numeric:tabular-nums}
.hero-meta-val.gold{color:var(--gold)}
.hero-meta-val em{font-style:italic;color:var(--gold);font-weight:300}
.hero-meta-lbl{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1.8px;text-transform:uppercase;color:var(--text-faint);max-width:160px;line-height:1.5}
.hero-meta-divider{width:1px;height:60px;background:var(--hairline);align-self:center}

.scroll-cue{position:absolute;bottom:36px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:14px;opacity:0;animation:fadeUp 1s cubic-bezier(.22,1,.36,1) 1.8s forwards}
.scroll-cue-line{width:1px;height:56px;background:var(--hairline-strong);position:relative;overflow:hidden}
.scroll-cue-line::after{content:'';position:absolute;top:-28px;left:0;width:100%;height:28px;background:linear-gradient(180deg,transparent,var(--gold));animation:scrollTrail 2.2s ease-in-out infinite}
@keyframes scrollTrail{0%{top:-28px;opacity:0}30%{opacity:1}70%{opacity:1}100%{top:56px;opacity:0}}
.scroll-cue-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2.4px;text-transform:uppercase;color:var(--text-faint)}

/* ═══ TILE NAV ═══ */
.tiles-section{position:relative;padding:120px 48px 60px;overflow:hidden}
.tiles-section::before{content:'';position:absolute;top:0;left:48px;right:48px;height:1px;background:linear-gradient(90deg,transparent,var(--hairline-strong),transparent)}
.tiles-header{display:flex;justify-content:space-between;align-items:flex-end;gap:40px;max-width:1440px;margin:0 auto 48px;flex-wrap:wrap}
.tiles-title{font-family:'Fraunces',Georgia,serif;font-size:clamp(28px,3vw,42px);font-weight:300;letter-spacing:-.02em;line-height:1.15;color:var(--text);max-width:680px;margin-top:20px}
.tiles-title em{font-style:italic;color:var(--gold)}
.tiles-meta{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1.6px;text-transform:uppercase;color:var(--text-faint);line-height:1.8;text-align:right}
.tiles-grid{max-width:1440px;margin:0 auto;display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.tile{
  position:relative;display:flex;flex-direction:column;justify-content:space-between;
  padding:20px 16px 18px;min-height:148px;
  background:var(--surface-subtle);border:1px solid var(--hairline);border-radius:4px;
  transition:all .35s cubic-bezier(.22,1,.36,1);
  overflow:hidden;
}
.tile::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 100%,var(--tile-accent-soft),transparent 70%);opacity:0;transition:opacity .4s;pointer-events:none}
.tile:hover{border-color:var(--tile-accent);background:var(--surface-raised);transform:translateY(-3px)}
.tile:hover::before{opacity:1}
.tile-num{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1.6px;color:var(--text-faint);margin-bottom:10px}
.tile-name{font-family:'Fraunces',Georgia,serif;font-size:19px;line-height:1.1;font-weight:400;letter-spacing:-.015em;color:var(--text);font-variation-settings:'opsz' 144}
.tile-name em{font-style:italic;color:var(--tile-accent);font-weight:300}
.tile-cat{margin-top:auto;padding-top:14px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-faint);transition:color .3s}
.tile:hover .tile-cat{color:var(--tile-accent)}
.tile.tile-host{background:linear-gradient(180deg,var(--gold-subtle),var(--green-subtle));border-color:var(--gold-medium)}
.tile.tile-host:hover{border-color:var(--gold);background:linear-gradient(180deg,var(--gold-soft),var(--green-soft))}

/* ═══ COMPANY CHAPTERS ═══ */
.company{position:relative;min-height:100vh;display:flex;align-items:center;padding:120px 48px;overflow:hidden;scroll-margin-top:60px}
.company::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 50% at 50% 50%,var(--accent-soft),transparent 70%);opacity:.6;pointer-events:none;transition:opacity 1.5s}
.company.in-view::before{opacity:1}
.company-inner{max-width:1440px;margin:0 auto;width:100%;display:grid;gap:80px;align-items:center;position:relative;z-index:2}
.company.img-right .company-inner{grid-template-columns:1fr 1.05fr}
.company.img-left .company-inner{grid-template-columns:1.05fr 1fr}
.company.img-left .company-image{grid-column:1;grid-row:1}
.company.img-left .company-text{grid-column:2;grid-row:1}

.company-text{position:relative}
.company-num{display:flex;align-items:center;gap:14px;margin-bottom:20px}
.company-num-val{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:2px;color:var(--text-faint)}
.company-num-bar{flex:1;height:1px;background:var(--hairline);max-width:80px}
.company-num-val-accent{color:var(--accent);font-weight:500}

.company-category{color:var(--accent)}
.company-category .eyebrow-bar{background:var(--accent)}
.company-name{
  font-family:'Fraunces',Georgia,serif;font-size:clamp(52px,7.5vw,120px);line-height:.9;font-weight:300;letter-spacing:-.04em;
  margin-top:32px;color:var(--text);font-variation-settings:'opsz' 144,'SOFT' 40;word-break:break-word;
}
.company-name em{font-style:italic;color:var(--accent);font-weight:300;font-variation-settings:'opsz' 144,'SOFT' 100}
.company-name sup{font-size:.5em;top:-.5em;position:relative;font-weight:300}

.company-desc{margin-top:24px;font-size:16px;line-height:1.55;font-weight:400;color:var(--text);max-width:560px;letter-spacing:-.005em}
.company-desc em{font-style:italic;color:var(--accent);font-family:'Fraunces',Georgia,serif;font-weight:400}

.company-quote{
  font-family:'Fraunces',Georgia,serif;font-style:italic;font-size:clamp(17px,1.5vw,20px);line-height:1.5;font-weight:300;
  color:var(--text-mute);margin-top:28px;max-width:520px;letter-spacing:-.01em;
  padding-left:20px;border-left:1px solid var(--accent);font-variation-settings:'opsz' 144,'SOFT' 100;
}

.company-founder{display:flex;flex-direction:column;gap:4px;margin-top:32px;padding-top:20px;border-top:1px solid var(--hairline)}
.founder-name{font-family:'Fraunces',Georgia,serif;font-size:18px;color:var(--text);font-weight:400;letter-spacing:-.01em}
.founder-title{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:var(--text-faint)}

.company-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:24px;margin-top:32px;padding:22px 0;border-top:1px solid var(--hairline);border-bottom:1px solid var(--hairline)}

/* ═══ BEHIND-THE-SCENES BUTTON (host only) ═══ */
.btn-behind{
  display:flex;align-items:center;justify-content:space-between;gap:24px;
  padding:28px 32px;margin-top:32px;
  background:linear-gradient(135deg,var(--gold-soft),var(--green-subtle));
  border:1px solid var(--gold-strong);
  border-radius:6px;
  color:var(--text);
  transition:all .4s cubic-bezier(.22,1,.36,1);
  position:relative;overflow:hidden;
}
.btn-behind::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 60% at 100% 50%,var(--gold-medium),transparent 70%);
  opacity:0;transition:opacity .4s;pointer-events:none;
}
.btn-behind:hover{
  border-color:var(--gold);
  transform:translateY(-2px);
  box-shadow:var(--shadow-raised),0 0 0 1px var(--gold-medium);
}
.btn-behind:hover::before{opacity:1}
.btn-behind-text{position:relative;z-index:1;min-width:0}
.btn-behind-label{
  display:flex;align-items:center;gap:8px;
  font-family:'JetBrains Mono',monospace;
  font-size:10px;letter-spacing:1.8px;text-transform:uppercase;
  color:var(--gold);margin-bottom:12px;
}
.btn-behind-label-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);box-shadow:0 0 8px var(--gold);animation:brainPulse 2s ease-in-out infinite}
.btn-behind-title{
  font-family:'Fraunces',Georgia,serif;font-size:clamp(24px,2.4vw,32px);
  font-weight:400;line-height:1.15;letter-spacing:-.02em;color:var(--text);
  font-variation-settings:'opsz' 144;
}
.btn-behind-title em{font-style:italic;color:var(--gold);font-weight:300}
.btn-behind-meta{
  margin-top:10px;
  font-family:'JetBrains Mono',monospace;
  font-size:10.5px;letter-spacing:1.4px;text-transform:uppercase;color:var(--text-faint);
}
.btn-behind-arrow{
  position:relative;z-index:1;display:flex;align-items:center;justify-content:center;
  width:52px;height:52px;border-radius:50%;
  background:var(--gold-soft);border:1px solid var(--gold-strong);
  font-size:18px;color:var(--gold);
  transition:all .35s cubic-bezier(.22,1,.36,1);
  flex-shrink:0;
}
.btn-behind:hover .btn-behind-arrow{background:var(--gold);color:var(--bg);border-color:var(--gold);transform:translateX(4px)}
.company-stat{display:flex;flex-direction:column;gap:6px}
.company-stat-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1.4px;text-transform:uppercase;color:var(--text-faint)}
.company-stat-val{font-family:'Fraunces',Georgia,serif;font-size:18px;line-height:1.2;font-weight:400;color:var(--text);letter-spacing:-.01em}

/* ═══ DEPARTMENT WORKSPACES ═══ */
.workspaces{margin-top:32px}
.workspaces-header{display:flex;justify-content:space-between;align-items:baseline;gap:12px;margin-bottom:14px}
.workspaces-lbl{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1.6px;text-transform:uppercase;color:var(--text-faint)}
.workspaces-count{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1.2px;color:var(--text-faint)}
.workspaces-count .accent{color:var(--accent)}
.workspaces-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(192px,1fr));gap:8px}
.workspace-btn{
  position:relative;display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:13px 16px 13px 13px;border-radius:8px;
  background:var(--surface-subtle);border:1px solid var(--hairline-strong);
  font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:1.3px;text-transform:uppercase;
  color:var(--text);cursor:pointer;
  transition:all .3s cubic-bezier(.22,1,.36,1);
  overflow:hidden;
}
.workspace-btn::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 60% at 100% 50%,var(--accent-soft),transparent 70%);
  opacity:0;transition:opacity .3s;pointer-events:none;
}
.workspace-btn:hover{
  border-color:var(--accent);background:var(--surface-raised);transform:translateY(-2px);
  box-shadow:var(--shadow-card),0 0 0 1px var(--accent-soft);
}
.workspace-btn:hover::before{opacity:1}
.workspace-btn-left{display:flex;align-items:center;gap:10px;min-width:0;position:relative;z-index:1}
.workspace-btn-icon{
  position:relative;display:flex;align-items:center;justify-content:center;
  width:22px;height:22px;flex-shrink:0;color:var(--accent);
  transition:transform .4s cubic-bezier(.22,1,.36,1),filter .3s;
  filter:drop-shadow(0 0 0 transparent);
  animation:iconBreath 3.2s ease-in-out infinite;
}
.workspace-btn:hover .workspace-btn-icon{transform:scale(1.15) rotate(-4deg);filter:drop-shadow(0 0 6px var(--accent))}
@keyframes iconBreath{0%,100%{opacity:.85}50%{opacity:1}}
@keyframes brainPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.75;transform:scale(.8)}}
.workspace-btn:nth-child(2) .workspace-btn-icon{animation-delay:.4s}
.workspace-btn:nth-child(3) .workspace-btn-icon{animation-delay:.8s}
.workspace-btn:nth-child(4) .workspace-btn-icon{animation-delay:1.2s}
.workspace-btn:nth-child(5) .workspace-btn-icon{animation-delay:1.6s}
.workspace-btn-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.workspace-btn-arrow{position:relative;z-index:1;font-family:'Geist',sans-serif;font-size:13px;color:var(--text-faint);transition:transform .3s cubic-bezier(.22,1,.36,1),color .3s;flex-shrink:0}
.workspace-btn:hover .workspace-btn-arrow{color:var(--accent);transform:translateX(4px)}

/* ═══ IMAGE ═══ */
.company-image{position:relative;aspect-ratio:4/5;border-radius:2px;overflow:hidden;background:var(--bg-warm);border:1px solid var(--hairline)}
.company-image img{width:100%;height:100%;object-fit:cover;display:block;transform:scale(1.02);transition:transform 9s cubic-bezier(.22,1,.36,1);filter:grayscale(.05) contrast(1.02)}
.company.in-view .company-image img{transform:scale(1.12)}
.company-image::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,rgba(11,10,8,.5));pointer-events:none}
.company-image-tag{position:absolute;top:20px;left:20px;z-index:3;display:flex;align-items:center;gap:8px;padding:7px 12px;border-radius:100px;background:rgba(11,10,8,.7);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1.4px;text-transform:uppercase;color:#EDE8DC;border:1px solid rgba(237,232,220,.22)}
.image-tag-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent)}
.company-image-caption{position:absolute;bottom:20px;left:20px;right:20px;z-index:3;font-family:'Fraunces',Georgia,serif;font-style:italic;font-size:13px;line-height:1.4;color:#EDE8DC;opacity:.88;max-width:320px}

/* ═══ TUB HOST SECTION (distinct feel) ═══ */
.company.host{
  background:linear-gradient(180deg,var(--green-subtle) 0%,var(--gold-subtle) 100%);
  border-top:1px solid var(--gold-medium);border-bottom:1px solid var(--gold-soft);
}
.company.host::before{opacity:1;background:radial-gradient(ellipse 70% 50% at 30% 50%,var(--green-soft),transparent 70%),radial-gradient(ellipse 60% 40% at 75% 60%,var(--gold-soft),transparent 70%)}
.company.host .host-badge{
  display:inline-flex;align-items:center;gap:8px;padding:6px 12px 6px 10px;
  background:var(--gold-soft);border:1px solid var(--gold-strong);border-radius:100px;
  font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:1.8px;text-transform:uppercase;color:var(--gold);
  margin-bottom:14px;
}
.company.host .host-badge-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);box-shadow:0 0 8px var(--gold);animation:brainPulse 2s ease-in-out infinite}

/* ═══ FISHWIFE BOTTOM ═══ */
.fishwife-intro{position:relative;padding:120px 48px 0;max-width:1440px;margin:0 auto}
.fishwife-intro::before{content:'';position:absolute;top:0;left:48px;right:48px;height:1px;background:linear-gradient(90deg,transparent,var(--hairline-strong),transparent)}
.fishwife-intro-inner{display:grid;grid-template-columns:auto 1fr auto;gap:48px;align-items:end}
.fishwife-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold)}
.fishwife-title{font-family:'Fraunces',Georgia,serif;font-size:clamp(28px,3vw,42px);font-weight:300;letter-spacing:-.02em;line-height:1.1;color:var(--text)}
.fishwife-title em{font-style:italic;color:var(--gold)}
.fishwife-meta{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1.6px;text-transform:uppercase;color:var(--text-faint);text-align:right}
.company.fishwife-section{padding-top:60px;min-height:auto}

/* ═══ NUMBERS (inverse — flips contrast in each theme) ═══ */
.numbers{position:relative;background:var(--inverse-bg);color:var(--inverse-text);padding:180px 48px;overflow:hidden;transition:background-color .5s,color .5s}
.numbers::before{content:'';position:absolute;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='2'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.35'/%3E%3C/svg%3E");opacity:var(--inverse-grain);mix-blend-mode:multiply;pointer-events:none}
.numbers-inner{max-width:1440px;margin:0 auto;position:relative}
.numbers-eyebrow{color:var(--inverse-accent)}
.numbers-eyebrow .eyebrow-bar{background:var(--inverse-accent)}
.numbers-lede{margin-top:36px;max-width:980px;font-family:'Fraunces',Georgia,serif;font-size:clamp(34px,4vw,62px);line-height:1.05;font-weight:300;letter-spacing:-.025em;color:var(--inverse-text);font-variation-settings:'opsz' 144}
.numbers-lede em{font-style:italic;color:var(--inverse-accent)}
.numbers-grid{margin-top:140px;display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
.numbers-card{padding:56px 32px 48px;border-top:1px solid var(--inverse-hairline-strong);position:relative}
.numbers-card:not(:last-child)::after{content:'';position:absolute;top:0;bottom:20%;right:-12px;width:1px;background:var(--inverse-hairline)}
.numbers-card-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1.8px;text-transform:uppercase;color:var(--inverse-mute);margin-bottom:48px}
.numbers-card-val{font-family:'Fraunces',Georgia,serif;font-size:clamp(80px,10vw,152px);line-height:.88;font-weight:300;letter-spacing:-.055em;color:var(--inverse-text);font-variation-settings:'opsz' 144;font-variant-numeric:tabular-nums}
.numbers-card-val em{font-style:italic;color:var(--inverse-accent);font-weight:300}
.numbers-card-desc{margin-top:32px;font-size:14px;line-height:1.55;color:var(--inverse-mute);font-weight:400;max-width:280px}
.numbers-card-desc em{font-family:'Fraunces',Georgia,serif;font-style:italic;font-weight:400}
.numbers-closing{margin-top:160px;padding-top:48px;border-top:1px solid var(--inverse-hairline);display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:end}
.numbers-closing-text{font-family:'Fraunces',Georgia,serif;font-size:clamp(24px,2.4vw,34px);line-height:1.25;font-weight:300;letter-spacing:-.015em;color:var(--inverse-text);max-width:580px}
.numbers-closing-text em{font-style:italic;color:var(--inverse-accent)}
.numbers-closing-meta{justify-self:end;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1.6px;text-transform:uppercase;color:var(--inverse-faint);text-align:right;line-height:1.8}

/* ═══ RETURN ═══ */
.return{position:relative;padding:140px 48px 100px;overflow:hidden}
.return-inner{max-width:1440px;margin:0 auto}
.return-heading{font-family:'Fraunces',Georgia,serif;font-size:clamp(40px,5vw,72px);line-height:1;font-weight:300;letter-spacing:-.03em;color:var(--text);margin-top:28px;max-width:880px}
.return-heading em{font-style:italic;color:var(--gold)}
.return-grid{margin-top:96px;display:grid;grid-template-columns:1fr 1fr;gap:28px}
.return-card{position:relative;padding:48px 40px 40px;background:var(--bg-warm);border:1px solid var(--hairline);border-radius:4px;overflow:hidden;transition:all .4s cubic-bezier(.22,1,.36,1);display:flex;flex-direction:column;min-height:320px}
.return-card:hover{border-color:var(--gold);transform:translateY(-4px);background:linear-gradient(180deg,var(--bg-warm),var(--gold-subtle))}
.return-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 40% at 50% 120%,var(--gold-medium),transparent 60%);opacity:0;transition:opacity .5s;pointer-events:none}
.return-card:hover::before{opacity:1}
.return-card-num{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:1.6px;color:var(--text-faint)}
.return-card-title{font-family:'Fraunces',Georgia,serif;font-size:44px;line-height:1;font-weight:300;letter-spacing:-.025em;color:var(--text);margin-top:48px}
.return-card-title em{font-style:italic;color:var(--gold)}
.return-card-desc{font-size:14px;line-height:1.55;color:var(--text-mute);font-weight:300;margin-top:14px;max-width:340px}
.return-card-cta{margin-top:auto;padding-top:48px;display:flex;align-items:center;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:1.8px;text-transform:uppercase;color:var(--text)}
.return-card-arrow{display:inline-block;transition:transform .3s cubic-bezier(.22,1,.36,1)}
.return-card:hover .return-card-arrow{transform:translateX(6px)}
.return-footer{margin-top:120px;padding-top:32px;border-top:1px solid var(--hairline);display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1.6px;text-transform:uppercase;color:var(--text-faint)}

/* ═══ CURSOR ═══ */
.cursor-dot{position:fixed;top:0;left:0;width:6px;height:6px;background:var(--gold);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:transform .08s ease-out,opacity .25s,width .2s,height .2s;mix-blend-mode:difference;opacity:0;box-shadow:0 0 16px var(--gold-glow)}
.cursor-ring{position:fixed;top:0;left:0;width:32px;height:32px;border:1px solid var(--gold-glow);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:transform .25s cubic-bezier(.22,1,.36,1),opacity .25s,width .3s,height .3s,border-color .3s;opacity:0}
body.cursor-ready .cursor-dot,body.cursor-ready .cursor-ring{opacity:1}
body.cursor-hover .cursor-ring{width:54px;height:54px;border-color:var(--gold)}
body.cursor-hover .cursor-dot{width:4px;height:4px}

/* ═══ THEME TOGGLE ═══ */
.theme-toggle{
  display:inline-flex;align-items:center;gap:2px;padding:3px;
  background:var(--surface-subtle);border:1px solid var(--hairline);border-radius:100px;
  position:relative;
}
.theme-toggle-btn{
  position:relative;z-index:2;width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:var(--text-faint);cursor:pointer;transition:color .4s;
}
.theme-toggle-btn.active{color:var(--gold)}
.theme-toggle-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;transition:stroke .4s}
.theme-toggle-thumb{
  position:absolute;top:3px;left:3px;width:28px;height:28px;border-radius:50%;
  background:var(--surface-raised);border:1px solid var(--hairline-strong);
  transition:transform .45s cubic-bezier(.22,1,.36,1),background .4s,border-color .4s;
  z-index:1;pointer-events:none;
}
:root[data-theme="light"] .theme-toggle-thumb{transform:translateX(30px)}
.theme-toggle-btn:hover{color:var(--text)}

/* ═══ PASSWORD GATE ═══ */
#gate{display:none;position:fixed;inset:0;z-index:10000;background:var(--bg);align-items:center;justify-content:center;padding:40px;overflow:hidden;transition:background .5s,color .5s;color:var(--text);font-family:'Geist',-apple-system,sans-serif}
html.locked #gate{display:flex}
html.locked #root{display:none}
html.locked body{overflow:hidden}
.gate-bg-grid{position:absolute;inset:0;background-image:linear-gradient(var(--grid-line) 1px,transparent 1px),linear-gradient(90deg,var(--grid-line) 1px,transparent 1px);background-size:96px 96px;mask-image:radial-gradient(ellipse 60% 50% at 50% 50%,#000 20%,transparent 80%);-webkit-mask-image:radial-gradient(ellipse 60% 50% at 50% 50%,#000 20%,transparent 80%);pointer-events:none;opacity:.5}
.gate-bg-gradient{position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 50%,var(--gold-soft),transparent 60%);pointer-events:none}
.gate-inner{position:relative;z-index:2;max-width:460px;width:100%;text-align:center;animation:gateIn .9s cubic-bezier(.22,1,.36,1) both}
@keyframes gateIn{0%{opacity:0;transform:translateY(16px)}100%{opacity:1;transform:translateY(0)}}
.gate-eyebrow{font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:2.4px;text-transform:uppercase;color:var(--gold);display:inline-flex;align-items:center;margin-bottom:30px}
.gate-eyebrow-bar{display:inline-block;width:28px;height:1px;background:var(--gold);margin-right:14px}
.gate-title{font-family:'Fraunces',Georgia,serif;font-size:clamp(32px,5vw,56px);font-weight:300;letter-spacing:-.03em;color:var(--text);line-height:1;margin:0 0 20px;font-variation-settings:'opsz' 144}
.gate-title em{font-style:italic;color:var(--gold);font-weight:300}
.gate-sub{font-size:15px;line-height:1.55;color:var(--text-mute);margin:0 auto 40px;max-width:380px;font-weight:300}
.gate-form{display:flex;gap:8px;justify-content:center;max-width:420px;margin:0 auto;flex-wrap:wrap}
.gate-input{flex:1;min-width:0;padding:14px 20px;background:var(--surface-subtle);border:1px solid var(--hairline);border-radius:100px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:.5px;outline:none;transition:border-color .25s,background .25s}
.gate-input:focus{border-color:var(--gold);background:var(--surface-raised)}
.gate-input::placeholder{color:var(--text-faint);text-transform:uppercase;letter-spacing:1.6px;font-size:10.5px}
.gate-btn{padding:14px 26px;background:var(--gold-soft);border:1px solid var(--gold-medium);border-radius:100px;color:var(--gold);font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;font-weight:500;transition:all .25s cubic-bezier(.22,1,.36,1)}
.gate-btn:hover{background:var(--gold-medium);border-color:var(--gold);color:var(--gold-bright);transform:translateY(-1px);box-shadow:0 4px 14px var(--gold-medium)}
.gate-error{min-height:18px;margin-top:16px;font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:1.4px;text-transform:uppercase;color:#E74C3C;opacity:0;transition:opacity .3s}
.gate-error.show{opacity:.9;animation:gateShake .4s ease-out}
@keyframes gateShake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-4px)}40%,80%{transform:translateX(4px)}}

/* ═══ MOBILE ═══ */
@media(max-width:1100px){
  .tiles-grid,.hero-tiles{grid-template-columns:repeat(4,1fr)}
}
@media(max-width:900px){
  .cursor-dot,.cursor-ring{display:none}
  body{cursor:auto}
  .nav-top{padding:16px 20px;grid-template-columns:auto auto auto;gap:10px}
  .nav-logo{font-size:15px}
  .nav-center{padding:5px 10px 5px 8px;font-size:9.5px;letter-spacing:1.2px;gap:6px}
  .nav-right{gap:6px}
  .nav-coach{padding:5px 10px;font-size:9.5px;letter-spacing:1.2px;gap:6px}
  .nav-coach-label{display:none}
  .nav-exit{padding:5px 10px;font-size:10px;gap:6px}
  .nav-exit-key{display:none}

  .hero{padding:120px 22px 80px}
  .hero-title{font-size:44px}
  .hero-sub{font-size:15px;margin-top:36px}

function useInView(opts={threshold:.22}){
  const ref=useRef(null);const[inView,setInView]=useState(false);
  useEffect(()=>{
    if(!ref.current)return;
    const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting)setInView(true)},opts);
    obs.observe(ref.current);
    return()=>obs.disconnect();
  },[]);
  return[ref,inView];
}
function useCountUp(target,inView,duration=1600){
  const[val,setVal]=useState(0);
  useEffect(()=>{
    if(!inView)return;
    let raf;const start=performance.now();
    const num=typeof target==='number'?target:parseFloat(target);
    function tick(t){
      const p=Math.min((t-start)/duration,1);
      const eased=1-Math.pow(1-p,3);
      setVal(num*eased);
      if(p<1)raf=requestAnimationFrame(tick);else setVal(num);
    }
    raf=requestAnimationFrame(tick);
    return()=>cancelAnimationFrame(raf);
  },[inView,target,duration]);
  return val;
}

// ═══════════════════════════════════════
// CURSOR & KEYBOARD
// ═══════════════════════════════════════
function Cursor(){
  useEffect(()=>{
    const dot=document.querySelector('.cursor-dot');
    const ring=document.querySelector('.cursor-ring');
    if(!dot||!ring)return;
    let rx=0,ry=0,dx=0,dy=0;
    function onMove(e){
      dx=e.clientX;dy=e.clientY;
      dot.style.transform=`translate(${dx}px,${dy}px) translate(-50%,-50%)`;
      document.body.classList.add('cursor-ready');
    }
    let raf;
    function tick(){
      rx+=(dx-rx)*.18;ry+=(dy-ry)*.18;
      ring.style.transform=`translate(${rx}px,${ry}px) translate(-50%,-50%)`;
      raf=requestAnimationFrame(tick);
    }
    raf=requestAnimationFrame(tick);
    function onEnter(e){if(e.target.closest('a,button,.workspace-btn,.return-card,.numbers-card,.company-image,.tile')){document.body.classList.add('cursor-hover')}}
    function onLeave(e){if(e.target.closest('a,button,.workspace-btn,.return-card,.numbers-card,.company-image,.tile')){document.body.classList.remove('cursor-hover')}}
    window.addEventListener('mousemove',onMove);
    document.addEventListener('mouseover',onEnter);
    document.addEventListener('mouseout',onLeave);
    return()=>{
      cancelAnimationFrame(raf);
      window.removeEventListener('mousemove',onMove);
      document.removeEventListener('mouseover',onEnter);
      document.removeEventListener('mouseout',onLeave);
    };
  },[]);
  return null;
}
function Keyboard(){
  useEffect(()=>{
    function onKey(e){if(e.key==='Escape'){window.location.href='index.html'}}
    window.addEventListener('keydown',onKey);
    return()=>window.removeEventListener('keydown',onKey);
  },[]);
  return null;
}
