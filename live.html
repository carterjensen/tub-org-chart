<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TUB — A Demo. Across Industries.</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="data.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;0,9..144,800;0,9..144,900;1,9..144,300;1,9..144,400;1,9..144,500;1,9..144,600;1,9..144,700&family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ═══ RESET & BASE ═══ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;scroll-padding-top:72px}
body{
  font-family:'Geist',-apple-system,BlinkMacSystemFont,sans-serif;
  background:#0B0A08;color:#EDE8DC;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  overflow-x:hidden;font-feature-settings:'ss01','ss02','cv11';letter-spacing:-.01em;
}
::selection{background:#D1B25A;color:#0B0A08}
a{color:inherit;text-decoration:none}
button{background:none;border:none;color:inherit;font-family:inherit;cursor:pointer}
img{display:block;max-width:100%;height:auto}

:root{
  --bg:#0B0A08;--bg-warm:#13110D;--ivory:#F5F2EC;--ivory-dim:#E8E3D8;
  --text:#EDE8DC;--text-mute:rgba(237,232,220,.55);--text-faint:rgba(237,232,220,.28);
  --gold:#D1B25A;--gold-bright:#E8C570;--gold-soft:rgba(209,178,90,.12);
  --green:#4A8C5C;--green-soft:rgba(74,140,92,.12);
  --red:#E74C3C;--hairline:rgba(237,232,220,.08);--hairline-strong:rgba(237,232,220,.15);
}

.serif{font-family:'Fraunces',Georgia,serif;font-feature-settings:'ss01','ss02','ss03'}
.mono{font-family:'JetBrains Mono',ui-monospace,monospace}
.eyebrow{
  font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:400;letter-spacing:2.2px;
  text-transform:uppercase;color:var(--gold);display:inline-flex;align-items:center;
}
.eyebrow-bar{display:inline-block;width:28px;height:1px;background:var(--gold);margin-right:14px}

/* ═══ TOP NAV ═══ */
.nav-top{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;justify-content:space-between;align-items:center;
  padding:22px 40px;font-size:12px;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  background:linear-gradient(180deg,rgba(11,10,8,.88) 0%,rgba(11,10,8,.45) 70%,transparent 100%);
}
.nav-logo{font-family:'Fraunces',Georgia,serif;font-size:19px;font-weight:400;letter-spacing:-.015em}
.nav-logo em{font-style:italic;color:var(--gold);font-weight:300}
.nav-center{
  display:flex;align-items:center;gap:10px;padding:6px 14px 6px 12px;
  background:rgba(209,178,90,.06);border:1px solid rgba(209,178,90,.22);border-radius:100px;
  font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1.8px;color:var(--gold);
  text-transform:uppercase;
}
.nav-center-dot{position:relative;width:7px;height:7px;border-radius:50%;background:var(--gold);animation:dotPulse 2.2s ease-in-out infinite}
.nav-center-dot::before{content:'';position:absolute;inset:-3px;border-radius:50%;background:rgba(209,178,90,.35);animation:dotRing 2.2s ease-out infinite}
@keyframes dotPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.75;transform:scale(.82)}}
@keyframes dotRing{0%{transform:scale(.8);opacity:.6}100%{transform:scale(2.8);opacity:0}}
.nav-right{justify-self:end;display:flex;align-items:center;gap:10px}
.nav-coach{
  display:flex;align-items:center;gap:8px;
  padding:7px 14px;
  background:linear-gradient(180deg,rgba(209,178,90,.12),rgba(209,178,90,.06));
  border:1px solid rgba(209,178,90,.35);
  border-radius:100px;
  font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--gold);font-weight:500;
  transition:all .3s cubic-bezier(.22,1,.36,1);
  position:relative;overflow:hidden;
}
.nav-coach::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 100% at 50% 120%,rgba(209,178,90,.3),transparent 70%);
  opacity:0;transition:opacity .3s;
}
.nav-coach:hover{
  border-color:var(--gold);color:var(--gold-bright);
  transform:translateY(-1px);
  box-shadow:0 4px 14px rgba(209,178,90,.2);
}
.nav-coach:hover::before{opacity:1}
.nav-coach-dot{
  position:relative;width:6px;height:6px;border-radius:50%;background:var(--gold);
  box-shadow:0 0 8px var(--gold);animation:dotPulse 2.2s ease-in-out infinite;z-index:1;
}
.nav-coach-label{position:relative;z-index:1}
.nav-coach-arrow{
  position:relative;z-index:1;
  font-size:11px;opacity:.7;
  transition:transform .3s cubic-bezier(.22,1,.36,1),opacity .3s;
}
.nav-coach:hover .nav-coach-arrow{opacity:1;transform:translate(3px,-3px)}
.nav-exit{
  display:flex;align-items:center;gap:10px;
  font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:1.4px;text-transform:uppercase;
  color:var(--text-mute);padding:6px 12px;border:1px solid var(--hairline);border-radius:100px;
  transition:all .25s;
}
.nav-exit:hover{color:var(--text);border-color:var(--hairline-strong)}
.nav-exit-key{font-size:9px;padding:2px 5px;border:1px solid var(--hairline-strong);border-radius:3px;color:var(--text-faint)}

/* ═══ HERO ═══ */
.hero{position:relative;min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:140px 48px 100px;overflow:hidden}
.hero-bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(237,232,220,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(237,232,220,.025) 1px,transparent 1px);background-size:96px 96px;background-position:center;mask-image:radial-gradient(ellipse 90% 80% at 50% 50%,#000 20%,transparent 80%);-webkit-mask-image:radial-gradient(ellipse 90% 80% at 50% 50%,#000 20%,transparent 80%);pointer-events:none}
.hero-bg-gradient{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 20% 30%,rgba(209,178,90,.06) 0%,transparent 60%),radial-gradient(ellipse 60% 50% at 85% 70%,rgba(74,140,92,.07) 0%,transparent 60%);pointer-events:none;animation:ambient 24s ease-in-out infinite alternate}
@keyframes ambient{0%{transform:translate(0,0)}50%{transform:translate(-20px,10px)}100%{transform:translate(10px,-15px)}}
.hero-bg-noise{position:absolute;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='2'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.65'/%3E%3C/svg%3E");opacity:.06;mix-blend-mode:overlay;pointer-events:none}
.hero-particles{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.particle{position:absolute;width:3px;height:3px;border-radius:50%;background:var(--gold);box-shadow:0 0 8px rgba(209,178,90,.8);animation:floatParticle 20s linear infinite}
@keyframes floatParticle{0%{opacity:0;transform:translate(0,0) scale(.5)}10%{opacity:1}90%{opacity:1}100%{opacity:0;transform:translate(40px,-120px) scale(.8)}}

.hero-inner{position:relative;z-index:2;max-width:1440px;margin:0 auto;width:100%}
.hero-eyebrow{opacity:0;animation:fadeUp 1s cubic-bezier(.22,1,.36,1) .2s forwards}
.hero-eyebrow-sep{color:var(--text-faint);margin:0 14px;font-weight:300}
.hero-title{
  font-family:'Fraunces',Georgia,serif;font-size:clamp(62px,10.5vw,168px);line-height:.9;
  font-weight:300;letter-spacing:-.045em;margin-top:44px;color:var(--text);
  font-variation-settings:'opsz' 144,'SOFT' 40;
}
.hero-title .line{display:block;overflow:hidden;padding-bottom:.04em}
.hero-title .inner{display:inline-block;transform:translateY(115%);animation:lineReveal 1.3s cubic-bezier(.19,1,.22,1) forwards}
.hero-title .line:nth-child(1) .inner{animation-delay:.35s}
.hero-title .line:nth-child(2) .inner{animation-delay:.5s}
.hero-title .line:nth-child(3) .inner{animation-delay:.65s}
.hero-title em{font-style:italic;color:var(--gold);font-weight:300;font-variation-settings:'opsz' 144,'SOFT' 100}
@keyframes lineReveal{0%{transform:translateY(115%)}100%{transform:translateY(0)}}
@keyframes fadeUp{0%{opacity:0;transform:translateY(24px)}100%{opacity:1;transform:translateY(0)}}

.hero-sub{max-width:620px;margin-top:56px;font-size:17px;line-height:1.6;color:var(--text-mute);font-weight:300;letter-spacing:-.005em;opacity:0;animation:fadeUp 1s cubic-bezier(.22,1,.36,1) 1.15s forwards}
.hero-sub em{font-style:italic;color:var(--text);font-family:'Fraunces',Georgia,serif;font-weight:400;font-size:18px}

.hero-meta{display:flex;align-items:flex-end;gap:80px;margin-top:96px;opacity:0;animation:fadeUp 1s cubic-bezier(.22,1,.36,1) 1.4s forwards}
.hero-meta-item{display:flex;flex-direction:column;gap:10px;min-width:0}
.hero-meta-val{font-family:'Fraunces',Georgia,serif;font-size:60px;font-weight:300;line-height:1;color:var(--text);letter-spacing:-.025em;font-variation-settings:'opsz' 144;font-variant-numeric:tabular-nums}
.hero-meta-val.gold{color:var(--gold)}
.hero-meta-val em{font-style:italic;color:var(--gold);font-weight:300}
.hero-meta-lbl{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1.8px;text-transform:uppercase;color:var(--text-faint);max-width:160px;line-height:1.5}
.hero-meta-divider{width:1px;height:60px;background:var(--hairline);align-self:center}

.scroll-cue{position:absolute;bottom:36px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:14px;opacity:0;animation:fadeUp 1s cubic-bezier(.22,1,.36,1) 1.8s forwards}
.scroll-cue-line{width:1px;height:56px;background:var(--hairline-strong);position:relative;overflow:hidden}
.scroll-cue-line::after{content:'';position:absolute;top:-28px;left:0;width:100%;height:28px;background:linear-gradient(180deg,transparent,var(--gold));animation:scrollTrail 2.2s ease-in-out infinite}
@keyframes scrollTrail{0%{top:-28px;opacity:0}30%{opacity:1}70%{opacity:1}100%{top:56px;opacity:0}}
.scroll-cue-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2.4px;text-transform:uppercase;color:var(--text-faint)}

/* ═══ TILE NAV ═══ */
.tiles-section{position:relative;padding:120px 48px 60px;overflow:hidden}
.tiles-section::before{content:'';position:absolute;top:0;left:48px;right:48px;height:1px;background:linear-gradient(90deg,transparent,var(--hairline-strong),transparent)}
.tiles-header{display:flex;justify-content:space-between;align-items:flex-end;gap:40px;max-width:1440px;margin:0 auto 48px;flex-wrap:wrap}
.tiles-title{font-family:'Fraunces',Georgia,serif;font-size:clamp(28px,3vw,42px);font-weight:300;letter-spacing:-.02em;line-height:1.15;color:var(--text);max-width:680px;margin-top:20px}
.tiles-title em{font-style:italic;color:var(--gold)}
.tiles-meta{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1.6px;text-transform:uppercase;color:var(--text-faint);line-height:1.8;text-align:right}
.tiles-grid{max-width:1440px;margin:0 auto;display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.tile{
  position:relative;display:flex;flex-direction:column;justify-content:space-between;
  padding:20px 16px 18px;min-height:148px;
  background:rgba(237,232,220,.02);border:1px solid var(--hairline);border-radius:4px;
  transition:all .35s cubic-bezier(.22,1,.36,1);
  overflow:hidden;
}
.tile::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 100%,var(--tile-accent-soft),transparent 70%);opacity:0;transition:opacity .4s;pointer-events:none}
.tile:hover{border-color:var(--tile-accent);background:rgba(237,232,220,.04);transform:translateY(-3px)}
.tile:hover::before{opacity:1}
.tile-num{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1.6px;color:var(--text-faint);margin-bottom:10px}
.tile-name{font-family:'Fraunces',Georgia,serif;font-size:19px;line-height:1.1;font-weight:400;letter-spacing:-.015em;color:var(--text);font-variation-settings:'opsz' 144}
.tile-name em{font-style:italic;color:var(--tile-accent);font-weight:300}
.tile-cat{margin-top:auto;padding-top:14px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-faint);transition:color .3s}
.tile:hover .tile-cat{color:var(--tile-accent)}
.tile.tile-host{background:linear-gradient(180deg,rgba(209,178,90,.06),rgba(74,140,92,.04));border-color:rgba(209,178,90,.22)}
.tile.tile-host:hover{border-color:var(--gold);background:linear-gradient(180deg,rgba(209,178,90,.1),rgba(74,140,92,.06))}

/* ═══ COMPANY CHAPTERS ═══ */
.company{position:relative;min-height:100vh;display:flex;align-items:center;padding:120px 48px;overflow:hidden;scroll-margin-top:60px}
.company::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 50% at 50% 50%,var(--accent-soft),transparent 70%);opacity:.6;pointer-events:none;transition:opacity 1.5s}
.company.in-view::before{opacity:1}
.company-inner{max-width:1440px;margin:0 auto;width:100%;display:grid;gap:80px;align-items:center;position:relative;z-index:2}
.company.img-right .company-inner{grid-template-columns:1fr 1.05fr}
.company.img-left .company-inner{grid-template-columns:1.05fr 1fr}
.company.img-left .company-image{grid-column:1;grid-row:1}
.company.img-left .company-text{grid-column:2;grid-row:1}

.company-text{position:relative}
.company-num{display:flex;align-items:center;gap:14px;margin-bottom:20px}
.company-num-val{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:2px;color:var(--text-faint)}
.company-num-bar{flex:1;height:1px;background:var(--hairline);max-width:80px}
.company-num-val-accent{color:var(--accent);font-weight:500}

.company-category{color:var(--accent)}
.company-category .eyebrow-bar{background:var(--accent)}
.company-name{
  font-family:'Fraunces',Georgia,serif;font-size:clamp(52px,7.5vw,120px);line-height:.9;font-weight:300;letter-spacing:-.04em;
  margin-top:32px;color:var(--text);font-variation-settings:'opsz' 144,'SOFT' 40;word-break:break-word;
}
.company-name em{font-style:italic;color:var(--accent);font-weight:300;font-variation-settings:'opsz' 144,'SOFT' 100}
.company-name sup{font-size:.5em;top:-.5em;position:relative;font-weight:300}

.company-desc{margin-top:24px;font-size:16px;line-height:1.55;font-weight:400;color:var(--text);max-width:560px;letter-spacing:-.005em}
.company-desc em{font-style:italic;color:var(--accent);font-family:'Fraunces',Georgia,serif;font-weight:400}

.company-quote{
  font-family:'Fraunces',Georgia,serif;font-style:italic;font-size:clamp(17px,1.5vw,20px);line-height:1.5;font-weight:300;
  color:var(--text-mute);margin-top:28px;max-width:520px;letter-spacing:-.01em;
  padding-left:20px;border-left:1px solid var(--accent);font-variation-settings:'opsz' 144,'SOFT' 100;
}

.company-founder{display:flex;flex-direction:column;gap:4px;margin-top:32px;padding-top:20px;border-top:1px solid var(--hairline)}
.founder-name{font-family:'Fraunces',Georgia,serif;font-size:18px;color:var(--text);font-weight:400;letter-spacing:-.01em}
.founder-title{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:var(--text-faint)}

.company-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:24px;margin-top:32px;padding:22px 0;border-top:1px solid var(--hairline);border-bottom:1px solid var(--hairline)}

/* ═══ BEHIND-THE-SCENES BUTTON (host only) ═══ */
.btn-behind{
  display:flex;align-items:center;justify-content:space-between;gap:24px;
  padding:28px 32px;margin-top:32px;
  background:linear-gradient(135deg,rgba(209,178,90,.08),rgba(74,140,92,.04));
  border:1px solid rgba(209,178,90,.3);
  border-radius:6px;
  color:var(--text);
  transition:all .4s cubic-bezier(.22,1,.36,1);
  position:relative;overflow:hidden;
}
.btn-behind::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 60% at 100% 50%,rgba(209,178,90,.2),transparent 70%);
  opacity:0;transition:opacity .4s;pointer-events:none;
}
.btn-behind:hover{
  border-color:var(--gold);
  transform:translateY(-2px);
  box-shadow:0 10px 36px rgba(0,0,0,.25),0 0 0 1px rgba(209,178,90,.18);
}
.btn-behind:hover::before{opacity:1}
.btn-behind-text{position:relative;z-index:1;min-width:0}
.btn-behind-label{
  display:flex;align-items:center;gap:8px;
  font-family:'JetBrains Mono',monospace;
  font-size:10px;letter-spacing:1.8px;text-transform:uppercase;
  color:var(--gold);margin-bottom:12px;
}
.btn-behind-label-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);box-shadow:0 0 8px var(--gold);animation:brainPulse 2s ease-in-out infinite}
.btn-behind-title{
  font-family:'Fraunces',Georgia,serif;font-size:clamp(24px,2.4vw,32px);
  font-weight:400;line-height:1.15;letter-spacing:-.02em;color:var(--text);
  font-variation-settings:'opsz' 144;
}
.btn-behind-title em{font-style:italic;color:var(--gold);font-weight:300}
.btn-behind-meta{
  margin-top:10px;
  font-family:'JetBrains Mono',monospace;
  font-size:10.5px;letter-spacing:1.4px;text-transform:uppercase;color:var(--text-faint);
}
.btn-behind-arrow{
  position:relative;z-index:1;display:flex;align-items:center;justify-content:center;
  width:52px;height:52px;border-radius:50%;
  background:rgba(209,178,90,.1);border:1px solid rgba(209,178,90,.3);
  font-size:18px;color:var(--gold);
  transition:all .35s cubic-bezier(.22,1,.36,1);
  flex-shrink:0;
}
.btn-behind:hover .btn-behind-arrow{background:var(--gold);color:var(--bg);border-color:var(--gold);transform:translateX(4px)}
.company-stat{display:flex;flex-direction:column;gap:6px}
.company-stat-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1.4px;text-transform:uppercase;color:var(--text-faint)}
.company-stat-val{font-family:'Fraunces',Georgia,serif;font-size:18px;line-height:1.2;font-weight:400;color:var(--text);letter-spacing:-.01em}

/* ═══ DEPARTMENT WORKSPACES ═══ */
.workspaces{margin-top:32px}
.workspaces-header{display:flex;justify-content:space-between;align-items:baseline;gap:12px;margin-bottom:14px}
.workspaces-lbl{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1.6px;text-transform:uppercase;color:var(--text-faint)}
.workspaces-count{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1.2px;color:var(--text-faint)}
.workspaces-count .accent{color:var(--accent)}
.workspaces-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(192px,1fr));gap:8px}
.workspace-btn{
  position:relative;display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:13px 16px 13px 13px;border-radius:8px;
  background:rgba(237,232,220,.025);border:1px solid var(--hairline-strong);
  font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:1.3px;text-transform:uppercase;
  color:var(--text);cursor:pointer;
  transition:all .3s cubic-bezier(.22,1,.36,1);
  overflow:hidden;
}
.workspace-btn::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 60% at 100% 50%,var(--accent-soft),transparent 70%);
  opacity:0;transition:opacity .3s;pointer-events:none;
}
.workspace-btn:hover{
  border-color:var(--accent);background:rgba(237,232,220,.04);transform:translateY(-2px);
  box-shadow:0 6px 20px rgba(0,0,0,.2),0 0 0 1px var(--accent-soft);
}
.workspace-btn:hover::before{opacity:1}
.workspace-btn-left{display:flex;align-items:center;gap:10px;min-width:0;position:relative;z-index:1}
.workspace-btn-dot{
  position:relative;width:8px;height:8px;border-radius:50%;flex-shrink:0;
  background:var(--accent);box-shadow:0 0 10px var(--accent);
  animation:brainPulse 2.4s ease-in-out infinite;
}
.workspace-btn-dot::after{
  content:'';position:absolute;inset:-4px;border-radius:50%;
  background:var(--accent);opacity:.3;
  animation:brainRing 2.4s ease-out infinite;
}
@keyframes brainPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.75;transform:scale(.8)}}

function useInView(opts={threshold:.22}){
  const ref=useRef(null);const[inView,setInView]=useState(false);
  useEffect(()=>{
    if(!ref.current)return;
    const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting)setInView(true)},opts);
    obs.observe(ref.current);
    return()=>obs.disconnect();
  },[]);
  return[ref,inView];
}
function useCountUp(target,inView,duration=1600){
  const[val,setVal]=useState(0);
  useEffect(()=>{
    if(!inView)return;
    let raf;const start=performance.now();
    const num=typeof target==='number'?target:parseFloat(target);
    function tick(t){
      const p=Math.min((t-start)/duration,1);
      const eased=1-Math.pow(1-p,3);
      setVal(num*eased);
      if(p<1)raf=requestAnimationFrame(tick);else setVal(num);
    }
    raf=requestAnimationFrame(tick);
    return()=>cancelAnimationFrame(raf);
  },[inView,target,duration]);
  return val;
}

function Particles({count=22}){

    id:i,left:Math.random()*100,top:40+Math.random()*60,delay:Math.random()*20,duration:14+Math.random()*12,size:.5+Math.random()*1.2,
  })),[count]);
  return(
    <div className="hero-particles">
      {particles.map(p=>(
        <div key={p.id} className="particle" style={{
          left:`${p.left}%`,top:`${p.top}%`,animationDelay:`${p.delay}s`,animationDuration:`${p.duration}s`,transform:`scale(${p.size})`,
        }}/>
      ))}
    </div>
  );
}

// CURSOR & KEYBOARD
// ═══════════════════════════════════════
function Cursor(){
  useEffect(()=>{
    const dot=document.querySelector('.cursor-dot');
    const ring=document.querySelector('.cursor-ring');
    if(!dot||!ring)return;
    let rx=0,ry=0,dx=0,dy=0;
    function onMove(e){
      dx=e.clientX;dy=e.clientY;
      dot.style.transform=`translate(${dx}px,${dy}px) translate(-50%,-50%)`;
      document.body.classList.add('cursor-ready');
    }
    let raf;
    function tick(){
      rx+=(dx-rx)*.18;ry+=(dy-ry)*.18;
      ring.style.transform=`translate(${rx}px,${ry}px) translate(-50%,-50%)`;
      raf=requestAnimationFrame(tick);
    }
    raf=requestAnimationFrame(tick);
    function onEnter(e){if(e.target.closest('a,button,.workspace-btn,.return-card,.numbers-card,.company-image,.tile')){document.body.classList.add('cursor-hover')}}
    function onLeave(e){if(e.target.closest('a,button,.workspace-btn,.return-card,.numbers-card,.company-image,.tile')){document.body.classList.remove('cursor-hover')}}
    window.addEventListener('mousemove',onMove);
    document.addEventListener('mouseover',onEnter);
    document.addEventListener('mouseout',onLeave);
    return()=>{
      cancelAnimationFrame(raf);
      window.removeEventListener('mousemove',onMove);
      document.removeEventListener('mouseover',onEnter);
      document.removeEventListener('mouseout',onLeave);
    };
  },[]);
  return null;
}
function Keyboard(){
  useEffect(()=>{
    function onKey(e){if(e.key==='Escape'){window.location.href='index.html'}}
    window.addEventListener('keydown',onKey);
    return()=>window.removeEventListener('keydown',onKey);
  },[]);
  return null;
}
