<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TUB — The Monday Morning</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="data.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;1,14..32,400&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Inter',-apple-system,sans-serif;
  background:#0B0E14;
  color:#E8E8E8;
  overflow:hidden;
  height:100vh;
  -webkit-font-smoothing:antialiased;
}
#root{height:100vh;display:flex;flex-direction:column}

/* ═══ SKY GRADIENT ═══ */
.sky{
  position:fixed;inset:0;z-index:0;
  transition:background 1.5s ease;
}
.sky.midnight{background:linear-gradient(180deg,#06080D 0%,#0D1117 40%,#131926 100%)}
.sky.pre-dawn{background:linear-gradient(180deg,#0B1020 0%,#1A2040 30%,#2D2845 60%,#4A3050 100%)}
.sky.dawn{background:linear-gradient(180deg,#1A2040 0%,#3D3060 20%,#8B5A5A 50%,#D4956B 80%,#E8B87A 100%)}
.sky.sunrise{background:linear-gradient(180deg,#1E2A40 0%,#2A3A58 25%,#4A4A50 50%,#6A5A48 75%,#7A6A50 100%)}
.sky.morning{background:linear-gradient(180deg,#1A2838 0%,#2A3A50 30%,#3A4A58 60%,#4A5560 100%)}

/* Stars */
.stars{position:fixed;inset:0;z-index:1;transition:opacity 2s}
.star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%}

/* ═══ NAV TABS ═══ */
.nav-bar{
  position:fixed;top:0;left:0;right:0;height:56px;z-index:50;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;
  background:rgba(11,14,20,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,.06);
}
.nav-left{display:flex;align-items:center;gap:14px}
.nav-logo{font-family:'Instrument Serif',Georgia,serif;font-size:18px;color:#E8E8E8;letter-spacing:-.3px}
.nav-logo em{color:#D1B25A;font-style:italic}
.nav-divider{width:1px;height:20px;background:rgba(255,255,255,.12)}
.nav-tabs{display:flex;gap:2px;background:rgba(255,255,255,.06);border-radius:8px;padding:3px}
.nav-tab{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:500;color:rgba(255,255,255,.5);cursor:pointer;transition:all .2s;border:none;background:transparent;font-family:inherit;text-decoration:none}
.nav-tab:hover{color:rgba(255,255,255,.7)}
.nav-tab.active{background:rgba(255,255,255,.1);color:#fff}
.nav-right{display:flex;align-items:center;gap:16px}

/* ═══ MAIN LAYOUT ═══ */
.main{position:relative;z-index:10;flex:1;display:flex;flex-direction:column;padding-top:56px}
.main::before{content:'';position:absolute;top:56px;left:0;right:0;height:320px;background:linear-gradient(180deg,rgba(10,14,22,.6) 0%,rgba(10,14,22,.3) 70%,transparent 100%);pointer-events:none;z-index:0}
.main>*{position:relative;z-index:1}

/* ═══ CLOCK ═══ */
.clock-section{text-align:center;padding:40px 20px 16px}
.clock-time{font-family:'JetBrains Mono',monospace;font-size:72px;font-weight:300;color:#fff;letter-spacing:-2px;line-height:1;text-shadow:0 0 40px rgba(255,255,255,.1)}
.clock-period{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:300;color:rgba(255,255,255,.4);margin-left:8px;letter-spacing:1px}
.clock-label{font-size:13px;color:rgba(255,255,255,.3);margin-top:8px;font-weight:400}

/* ═══ TIMELINE SCRUBBER ═══ */
.timeline-bar{padding:0 60px;margin:16px 0 8px}
.timeline-track{position:relative;height:4px;background:rgba(255,255,255,.08);border-radius:4px;cursor:pointer}
.timeline-fill{height:100%;background:linear-gradient(90deg,#D1B25A,#E8C88A);border-radius:4px;transition:width .3s linear}
.timeline-labels{display:flex;justify-content:space-between;padding:6px 0 0;font-family:'JetBrains Mono',monospace;font-size:9px;color:rgba(255,255,255,.2);letter-spacing:.5px}
.timeline-markers{position:absolute;inset:0;pointer-events:none}
.timeline-dot{position:absolute;top:50%;width:6px;height:6px;border-radius:50%;background:#D1B25A;transform:translate(-50%,-50%);opacity:0;transition:opacity .3s}
.timeline-dot.active{opacity:1}
.timeline-dot.future{opacity:.2;background:rgba(255,255,255,.2)}

/* ═══ CONTROLS ═══ */
.controls-row{display:flex;justify-content:center;gap:8px;padding:8px 20px 16px}
.ctrl-btn{
  padding:6px 16px;border-radius:8px;border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.04);color:rgba(255,255,255,.6);
  font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit;
}
.ctrl-btn:hover{background:rgba(255,255,255,.08);color:#fff;border-color:rgba(255,255,255,.2)}
.ctrl-btn.active{background:rgba(209,178,90,.15);color:#D1B25A;border-color:rgba(209,178,90,.3)}
.ctrl-btn.play{min-width:80px}

/* ═══ COUNTERS ═══ */
.counters{display:flex;justify-content:center;gap:48px;padding:8px 20px 20px}
.counter{text-align:center}
.counter-num{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:400;color:#fff;line-height:1}
.counter-num.gold{color:#D1B25A}
.counter-lbl{font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.25);margin-top:4px}

/* ═══ FEED ═══ */
.feed-area{flex:1;overflow-y:auto;padding:0 40px 40px;display:flex;flex-direction:column;gap:8px}
.feed-area::-webkit-scrollbar{width:4px}
.feed-area::-webkit-scrollbar-track{background:transparent}
.feed-area::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}

/* ═══ TASK CARD ═══ */
@keyframes slideIn{from{opacity:0;transform:translateY(16px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}

.task-card{
  display:flex;gap:16px;
  padding:16px 20px;
  background:rgba(10,14,22,.75);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.08);
  border-radius:14px;
  animation:slideIn .5s cubic-bezier(.34,1.56,.64,1) both;
  transition:background .2s,border-color .2s;
}
.task-card:hover{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.1)}

.task-icon-col{display:flex;flex-direction:column;align-items:center;gap:6px}
.task-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.task-time{font-family:'JetBrains Mono',monospace;font-size:10px;color:rgba(255,255,255,.25);letter-spacing:.5px}

.task-body{flex:1;min-width:0}
.task-header{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.task-ai-name{font-size:14px;font-weight:600;letter-spacing:-.1px}
.task-owner{font-size:11px;color:rgba(255,255,255,.3);font-weight:400}
.task-desc{font-size:12px;color:rgba(255,255,255,.45);line-height:1.5}
.task-output{font-size:12px;color:rgba(255,255,255,.6);margin-top:6px;padding:8px 12px;background:rgba(255,255,255,.03);border-radius:8px;border-left:2px solid rgba(209,178,90,.3);line-height:1.5}
.task-output strong{color:#D1B25A;font-weight:600}

.task-stats{display:flex;gap:16px;margin-top:8px}
.task-stat{display:flex;align-items:center;gap:4px;font-family:'JetBrains Mono',monospace;font-size:10px;color:rgba(255,255,255,.25)}
.task-stat .val{color:rgba(255,255,255,.5)}

/* Category colors on task icon */
.task-icon.c-voice{background:rgba(192,87,70,.15)}.tc-voice{color:#E07060}
.task-icon.c-strategy{background:rgba(123,94,167,.15)}.tc-strategy{color:#A08CC7}
.task-icon.c-research{background:rgba(58,124,165,.15)}.tc-research{color:#6AAED5}
.task-icon.c-creative{background:rgba(194,102,136,.15)}.tc-creative{color:#D88AA8}
.task-icon.c-ops{background:rgba(42,143,130,.15)}.tc-ops{color:#4ABFB0}
.task-icon.c-product{background:rgba(184,134,11,.15)}.tc-product{color:#D8B63B}
.task-icon.c-curriculum{background:rgba(74,140,92,.15)}.tc-curriculum{color:#6ABC7C}
.task-icon.c-sales{background:rgba(212,123,46,.15)}.tc-sales{color:#E89B4E}
.task-icon.c-engineering{background:rgba(74,111,165,.15)}.tc-engineering{color:#7AA1D5}
.task-icon.c-analytics{background:rgba(91,126,149,.15)}.tc-analytics{color:#8BB0C8}
.task-icon.c-finance{background:rgba(61,139,110,.15)}.tc-finance{color:#5DBB98}
.task-icon.c-hr{background:rgba(139,107,174,.15)}.tc-hr{color:#AB8BD0}

/* ═══ REVEAL MOMENT ═══ */
@keyframes revealPulse{0%{box-shadow:0 0 0 0 rgba(209,178,90,.4)}70%{box-shadow:0 0 0 20px rgba(209,178,90,0)}100%{box-shadow:0 0 0 0 rgba(209,178,90,0)}}

.reveal-card{
  text-align:center;padding:32px 24px;
  background:linear-gradient(135deg,rgba(10,14,22,.8),rgba(10,14,22,.7));
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(209,178,90,.25);
  border-radius:16px;
  animation:slideIn .6s cubic-bezier(.34,1.56,.64,1) both,revealPulse 2s ease-out;
}
.reveal-card h2{font-family:'Instrument Serif',Georgia,serif;font-size:28px;font-weight:400;color:#D1B25A;margin-bottom:8px}
.reveal-card p{font-size:14px;color:rgba(255,255,255,.5);line-height:1.6;max-width:500px;margin:0 auto}
.reveal-stats{display:flex;justify-content:center;gap:40px;margin-top:20px}
.reveal-stat-num{font-family:'JetBrains Mono',monospace;font-size:24px;color:#fff}
.reveal-stat-lbl{font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.3);margin-top:2px}
.reveal-stat-sub{font-size:10px;color:rgba(209,178,90,.5);margin-top:2px}

/* ═══ MOBILE ═══ */
@media(max-width:768px){
  .nav-bar{height:auto;flex-wrap:wrap;padding:10px 14px;gap:6px}
  .nav-left{width:100%;justify-content:space-between}
  .nav-right{width:100%;justify-content:center}
  .nav-divider{display:none}
  .nav-logo{font-size:16px}
  .nav-tab{padding:5px 10px;font-size:11px}

  .main{padding-top:90px}
  .main::before{top:90px;height:260px}

  .clock-section{padding:20px 16px 10px}
  .clock-time{font-size:48px;letter-spacing:-1px}
  .clock-period{font-size:14px}
  .clock-label{font-size:11px;margin-top:6px}

  .timeline-bar{padding:0 20px;margin:10px 0 6px}
  .timeline-labels{font-size:8px}
  .timeline-labels span:nth-child(2),.timeline-labels span:nth-child(4){display:none}

  .controls-row{gap:4px;padding:6px 12px 10px;flex-wrap:wrap;justify-content:center}
  .ctrl-btn{padding:5px 12px;font-size:11px}

  .counters{gap:24px;padding:6px 16px 14px}
  .counter-num{font-size:22px}
  .counter-lbl{font-size:8px;letter-spacing:1px}

  .feed-area{padding:0 14px 30px;gap:6px}

  .task-card{padding:12px 14px;gap:12px}
  .task-icon{width:34px;height:34px;font-size:17px;border-radius:10px}
  .task-time{font-size:9px}
  .task-ai-name{font-size:13px}
  .task-owner{font-size:10px}
  .task-desc{font-size:11px}
  .task-output{font-size:11px;padding:6px 10px}
  .task-stats{gap:12px;margin-top:6px}
  .task-stat{font-size:9px}
  .task-header{flex-wrap:wrap;gap:4px}

  .reveal-card{padding:24px 16px}
  .reveal-card h2{font-size:22px}
  .reveal-card p{font-size:12px}
  .reveal-stats{gap:20px;flex-wrap:wrap}
  .reveal-stat-num{font-size:20px}
}

@media(max-width:400px){
  .clock-time{font-size:40px}
  .counters{gap:16px}
  .counter-num{font-size:18px}
  .task-card{padding:10px 12px;gap:10px}
  .task-icon{width:30px;height:30px;font-size:15px}
  .task-ai-name{font-size:12px}
  .task-desc{font-size:10px}
  .task-output{font-size:10px}
  .nav-tabs{display:none}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useCallback,useRef,useEffect}=React;

// Map AI employee name → category from shared data
const aiCatMap = {};
ALL_AI_EMPLOYEES.forEach(ai => { aiCatMap[ai.name] = ai.cat; });

function formatTime(minutes) {
  const h = Math.floor(minutes / 60);
  const m = minutes % 60;
  const hour12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
  const ampm = h < 12 ? 'AM' : 'AM';
  return { time: `${hour12}:${String(m).padStart(2,'0')}`, period: h < 12 ? 'AM' : 'AM' };
}

function getSkyPhase(minutes) {
  if (minutes < 180) return 'midnight';
  if (minutes < 300) return 'pre-dawn';
  if (minutes < 390) return 'dawn';
  if (minutes < 450) return 'sunrise';
  return 'morning';
}

function TaskCard({ event, index }) {
  const cat = aiCatMap[event.aiName] || 'ops';
  const { time } = formatTime(event.time);
  return (
    <div className="task-card" style={{ animationDelay: `${index * 0.05}s` }}>
      <div className="task-icon-col">
        <div className={`task-icon c-${cat}`}>{event.icon}</div>
        <div className="task-time">{time}</div>
      </div>
      <div className="task-body">
        <div className="task-header">
          <span className={`task-ai-name tc-${cat}`}>{event.aiName}</span>
          <span className="task-owner">for {event.owner}</span>
        </div>
        <div className="task-desc">{event.desc}</div>
        <div className="task-output"><strong>Output:</strong> {event.output}</div>
        <div className="task-stats">
          <div className="task-stat">⏱ <span className="val">{event.hoursSaved}h saved</span></div>
          <div className="task-stat">💰 <span className="val">${event.dollarValue} value</span></div>
        </div>
      </div>
    </div>
  );
}

function RevealCard({ tasks }) {
  const totalHours = tasks.reduce((s, t) => s + t.hoursSaved, 0);
  const totalDollar = tasks.reduce((s, t) => s + t.dollarValue, 0);
  return (
    <div className="reveal-card">
      <h2>Callan opens her laptop.</h2>
      <p>It's 8:00 AM. Before she poured her coffee, {tasks.length} AI employees completed {totalHours.toFixed(1)} hours of work worth ${totalDollar.toLocaleString()} — and it's all waiting for her.</p>
      <div className="reveal-stats">
        <div style={{textAlign:'center'}}><div className="reveal-stat-num">{tasks.length}</div><div className="reveal-stat-lbl">Tasks Done</div></div>
        <div style={{textAlign:'center'}}><div className="reveal-stat-num">{totalHours.toFixed(1)}h</div><div className="reveal-stat-lbl">Hours Saved</div></div>
        <div style={{textAlign:'center'}}><div className="reveal-stat-num">${totalDollar.toLocaleString()}</div><div className="reveal-stat-lbl">Value Created</div><div className="reveal-stat-sub">≈ ${(totalDollar * 52).toLocaleString()}/yr</div></div>
      </div>
    </div>
  );
}

// Generate random stars
const stars = Array.from({ length: 80 }, () => ({
  x: Math.random() * 100,
  y: Math.random() * 60,
  size: Math.random() * 1.5 + 0.5,
  opacity: Math.random() * 0.6 + 0.2,
}));

function App() {
  const [currentMinute, setCurrentMinute] = useState(0);
  const [isPlaying, setIsPlaying] = useState(false);
  const [speed, setSpeed] = useState(1);
  const [showReveal, setShowReveal] = useState(false);
  const intervalRef = useRef(null);
  const feedRef = useRef(null);
  const TOTAL_MINUTES = 490; // through 8:10am

  const visibleEvents = TIMELINE_EVENTS.filter(e => e.time <= currentMinute);
  const totalHours = visibleEvents.reduce((s, e) => s + e.hoursSaved, 0);
  const totalDollars = visibleEvents.reduce((s, e) => s + e.dollarValue, 0);

  useEffect(() => {
    if (currentMinute >= 480 && !showReveal) setShowReveal(true);
    if (currentMinute < 480 && showReveal) setShowReveal(false);
  }, [currentMinute, showReveal]);

  useEffect(() => {
    if (!isPlaying) { clearInterval(intervalRef.current); return; }
    const ms = speed === 1 ? 120 : speed === 2 ? 60 : 30;
    intervalRef.current = setInterval(() => {
      setCurrentMinute(prev => {
        if (prev >= TOTAL_MINUTES) { setIsPlaying(false); return TOTAL_MINUTES; }
        return prev + 1;
      });
    }, ms);
    return () => clearInterval(intervalRef.current);
  }, [isPlaying, speed]);

  // Auto-scroll feed
  useEffect(() => {
    if (feedRef.current) feedRef.current.scrollTop = 0;
  }, [visibleEvents.length, showReveal]);

  const { time: clockTime } = formatTime(currentMinute);
  const period = currentMinute < 720 ? 'AM' : 'PM';
  const skyPhase = getSkyPhase(currentMinute);
  const starsOpacity = currentMinute < 300 ? 1 : currentMinute < 420 ? (420 - currentMinute) / 120 : 0;

  const handleTrackClick = (e) => {
    const rect = e.currentTarget.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    setCurrentMinute(Math.round(pct * TOTAL_MINUTES));
  };

  const reset = () => { setCurrentMinute(0); setIsPlaying(false); setShowReveal(false); };

  return (
    <>
      <div className={`sky ${skyPhase}`} />
      <div className="stars" style={{ opacity: starsOpacity }}>
        {stars.map((s, i) => (
          <div key={i} className="star" style={{ left: `${s.x}%`, top: `${s.y}%`, width: s.size, height: s.size, opacity: s.opacity }} />
        ))}
      </div>

      <div className="nav-bar">
        <div className="nav-left">
          <div className="nav-logo">The Uncommon <em>Business</em></div>
          <div className="nav-divider" />
          <div className="nav-tabs">
            <a className="nav-tab" href="index.html">Org Map</a>
            <a className="nav-tab" href="ecosystem.html?v=grid">By Manager</a>
            <a className="nav-tab" href="ecosystem.html?v=flow">Data Flow</a>
            <a className="nav-tab active" href="monday-morning.html">Monday Morning</a>
          </div>
        </div>
        <div className="nav-right">
          <div style={{fontSize:11,color:'rgba(255,255,255,.3)',fontWeight:500}}>
            {visibleEvents.length} of {TIMELINE_EVENTS.length} tasks complete
          </div>
        </div>
      </div>

      <div className="main">
        {/* Clock */}
        <div className="clock-section">
          <span className="clock-time">{clockTime}</span>
          <span className="clock-period">{period}</span>
          <div className="clock-label">
            {currentMinute < 480 ? 'Every human is still asleep. The AI employees are working.' : 'The team is awake. All this was done before coffee.'}
          </div>
        </div>

        {/* Timeline */}
        <div className="timeline-bar">
          <div className="timeline-track" onClick={handleTrackClick}>
            <div className="timeline-fill" style={{ width: `${(currentMinute / TOTAL_MINUTES) * 100}%` }} />
            <div className="timeline-markers">
              {TIMELINE_EVENTS.map((ev, i) => (
                <div
                  key={i}
                  className={`timeline-dot ${ev.time <= currentMinute ? 'active' : 'future'}`}
                  style={{ left: `${(ev.time / TOTAL_MINUTES) * 100}%` }}
                />
              ))}
            </div>
          </div>
          <div className="timeline-labels">
            <span>12:00 AM</span><span>2:00 AM</span><span>4:00 AM</span><span>6:00 AM</span><span>8:00 AM</span>
          </div>
        </div>

        {/* Controls */}
        <div className="controls-row">
          <button className={`ctrl-btn play`} onClick={() => setIsPlaying(!isPlaying)}>
            {isPlaying ? '❚❚ Pause' : '▶ Play'}
          </button>
          <button className={`ctrl-btn ${speed===1?'active':''}`} onClick={() => setSpeed(1)}>1×</button>
          <button className={`ctrl-btn ${speed===2?'active':''}`} onClick={() => setSpeed(2)}>2×</button>
          <button className={`ctrl-btn ${speed===4?'active':''}`} onClick={() => setSpeed(4)}>4×</button>
          <button className="ctrl-btn" onClick={reset}>↩ Reset</button>
        </div>

        {/* Counters */}
        <div className="counters">
          <div className="counter"><div className="counter-num">{visibleEvents.length}</div><div className="counter-lbl">Tasks Completed</div></div>
          <div className="counter"><div className="counter-num gold">{totalHours.toFixed(1)}h</div><div className="counter-lbl">Hours Saved</div></div>
          <div className="counter"><div className="counter-num">${totalDollars.toLocaleString()}</div><div className="counter-lbl">Value Created</div></div>
        </div>

        {/* Feed */}
        <div className="feed-area" ref={feedRef}>
          {visibleEvents.length === 0 && currentMinute < 30 && (
            <div style={{ textAlign: 'center', padding: '60px 20px', color: 'rgba(255,255,255,.2)', fontSize: 14 }}>
              <div style={{ fontSize: 40, marginBottom: 16 }}>🌙</div>
              The city sleeps. The AI employees are about to wake up.<br/>
              <span style={{ fontSize: 12, opacity: 0.5 }}>Press Play or scrub the timeline to begin.</span>
            </div>
          )}
          {showReveal && <RevealCard tasks={visibleEvents} />}
          {[...visibleEvents].reverse().map((event, i) => (
            <TaskCard key={event.aiName + event.time} event={event} index={i} />
          ))}
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
