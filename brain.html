<script>
(function(){
  try{
    var saved=localStorage.getItem('tub-theme');
    var theme=saved||'light';
    document.documentElement.dataset.theme=theme;
  }catch(e){document.documentElement.dataset.theme='dark'}
  try{
    var exp=parseInt(localStorage.getItem('tub-access')||'0',10);
    if(!exp||Date.now()>exp){
      document.documentElement.classList.add('locked');
    }
  }catch(e){document.documentElement.classList.add('locked')}
})();
</script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:'Geist',-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg);color:var(--text);
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  overflow-x:hidden;font-feature-settings:'ss01','ss02','cv11';letter-spacing:-.01em;
  transition:background-color .5s cubic-bezier(.4,0,.2,1),color .5s cubic-bezier(.4,0,.2,1);
}
::selection{background:var(--gold);color:var(--bg)}
a{color:inherit;text-decoration:none}
button{background:none;border:none;color:inherit;font-family:inherit;cursor:pointer}
img{display:block;max-width:100%;height:auto}

/* ═══ THEME VARIABLES ═══ */
:root,:root[data-theme="dark"]{
  --bg:#0B0A08;--bg-warm:#13110D;--bg-warmer:#1C1812;
  --text:#EDE8DC;--text-mute:rgba(237,232,220,.55);--text-faint:rgba(237,232,220,.28);
  --gold:#D1B25A;--gold-bright:#E8C570;
  --gold-subtle:rgba(209,178,90,.05);--gold-soft:rgba(209,178,90,.12);
  --gold-medium:rgba(209,178,90,.22);--gold-strong:rgba(209,178,90,.35);
  --gold-glow:rgba(209,178,90,.5);
  --green:#4A8C5C;--green-soft:rgba(74,140,92,.07);--red:#E74C3C;
  --hairline:rgba(237,232,220,.08);--hairline-strong:rgba(237,232,220,.15);
  --surface-subtle:rgba(237,232,220,.025);--surface-raised:rgba(237,232,220,.04);
  --nav-bg-start:rgba(11,10,8,.88);--nav-bg-mid:rgba(11,10,8,.45);
  --tabs-bg:rgba(11,10,8,.85);
  --drawer-overlay:rgba(11,10,8,.7);
  --shadow-card:0 6px 20px rgba(0,0,0,.2);
  --shadow-raised:0 10px 30px rgba(0,0,0,.2);
  --grid-line:rgba(237,232,220,.025);
  --grain-opacity:.06;
}

:root[data-theme="light"]{
  --bg:#F5F2EC;--bg-warm:#EDE8DC;--bg-warmer:#DFD8C5;
  --text:#18160F;--text-mute:rgba(24,22,15,.62);--text-faint:rgba(24,22,15,.4);
  --gold:#8B7024;--gold-bright:#A88C35;
  --gold-subtle:rgba(139,112,36,.04);--gold-soft:rgba(139,112,36,.1);
  --gold-medium:rgba(139,112,36,.22);--gold-strong:rgba(139,112,36,.32);
  --gold-glow:rgba(139,112,36,.38);
  --green:#2F5B4A;--green-soft:rgba(47,91,74,.06);--red:#C53530;
  --hairline:rgba(24,22,15,.1);--hairline-strong:rgba(24,22,15,.2);
  --surface-subtle:rgba(24,22,15,.03);--surface-raised:rgba(24,22,15,.06);
  --nav-bg-start:rgba(245,242,236,.94);--nav-bg-mid:rgba(245,242,236,.55);
  --tabs-bg:rgba(245,242,236,.9);
  --drawer-overlay:rgba(24,22,15,.45);
  --shadow-card:0 4px 20px rgba(24,22,15,.08);
  --shadow-raised:0 10px 30px rgba(24,22,15,.1);
  --grid-line:rgba(24,22,15,.05);
  --grain-opacity:.12;
}

.serif{font-family:'Fraunces',Georgia,serif;font-feature-settings:'ss01','ss02','ss03'}
.mono{font-family:'JetBrains Mono',ui-monospace,monospace}
.eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:400;letter-spacing:2.2px;text-transform:uppercase;color:var(--gold);display:inline-flex;align-items:center}
.eyebrow-bar{display:inline-block;width:28px;height:1px;background:var(--gold);margin-right:14px}

/* NAV */
.nav-top{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:22px 40px;font-size:12px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);background:linear-gradient(180deg,var(--nav-bg-start) 0%,var(--nav-bg-mid) 70%,transparent 100%);transition:background .5s}
.nav-logo{font-family:'Fraunces',Georgia,serif;font-size:19px;font-weight:400;letter-spacing:-.015em}
.nav-logo em{font-style:italic;color:var(--gold);font-weight:300}
.nav-right{display:flex;align-items:center;gap:10px}
.nav-back{display:flex;align-items:center;gap:10px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:var(--text-mute);padding:6px 12px;border:1px solid var(--hairline);border-radius:100px;transition:all .25s}
.nav-back:hover{color:var(--text);border-color:var(--hairline-strong)}
.nav-back-arrow{font-size:13px}

/* HERO */
.hero{position:relative;padding:140px 48px 80px;overflow:hidden}
.hero-bg-grid{position:absolute;inset:0;background-image:linear-gradient(var(--grid-line) 1px,transparent 1px),linear-gradient(90deg,var(--grid-line) 1px,transparent 1px);background-size:96px 96px;background-position:center;mask-image:radial-gradient(ellipse 90% 80% at 50% 50%,#000 20%,transparent 80%);-webkit-mask-image:radial-gradient(ellipse 90% 80% at 50% 50%,#000 20%,transparent 80%);pointer-events:none}
.hero-bg-gradient{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 30% 30%,var(--gold-subtle) 0%,transparent 60%),radial-gradient(ellipse 60% 50% at 85% 70%,var(--green-soft) 0%,transparent 60%);pointer-events:none}
.hero-inner{position:relative;z-index:2;max-width:1440px;margin:0 auto}
.hero-title{font-family:'Fraunces',Georgia,serif;font-size:clamp(56px,9vw,140px);line-height:.9;font-weight:300;letter-spacing:-.045em;margin-top:28px;color:var(--text);font-variation-settings:'opsz' 144,'SOFT' 40}
.hero-title em{font-style:italic;color:var(--gold);font-weight:300;font-variation-settings:'opsz' 144,'SOFT' 100}
.hero-sub{max-width:680px;margin-top:36px;font-size:17px;line-height:1.6;color:var(--text-mute);font-weight:300}
.hero-sub em{font-style:italic;color:var(--text);font-family:'Fraunces',Georgia,serif;font-weight:400;font-size:18px}

/* EXPLAINER */
.explainer{padding:40px 48px 80px;max-width:1440px;margin:0 auto}
.explainer-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-top:40px}
.explainer-card{padding:32px 28px 28px;background:var(--bg-warm);border:1px solid var(--hairline);border-radius:6px;transition:all .3s}
.explainer-card:hover{border-color:var(--hairline-strong)}
.explainer-num{font-family:'Fraunces',Georgia,serif;font-style:italic;color:var(--gold);font-size:40px;font-weight:300;line-height:1;letter-spacing:-.03em;margin-bottom:16px;font-variation-settings:'opsz' 144}
.explainer-title{font-family:'Fraunces',Georgia,serif;font-size:22px;font-weight:400;line-height:1.2;letter-spacing:-.015em;color:var(--text);margin-bottom:10px}
.explainer-title em{font-style:italic;color:var(--gold)}
.explainer-desc{font-size:13.5px;line-height:1.55;color:var(--text-mute);font-weight:300}

/* EXPLORER */
.explorer{padding:40px 48px 120px;max-width:1440px;margin:0 auto}
.explorer-head{display:flex;justify-content:space-between;align-items:flex-end;gap:40px;margin-bottom:36px;flex-wrap:wrap}
.explorer-title{font-family:'Fraunces',Georgia,serif;font-size:clamp(28px,3vw,40px);font-weight:300;letter-spacing:-.02em;line-height:1.1;color:var(--text);max-width:620px;margin-top:16px}
.explorer-title em{font-style:italic;color:var(--gold)}
.explorer-meta{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1.6px;text-transform:uppercase;color:var(--text-faint);text-align:right;line-height:1.8}

/* TABS */
.tabs{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:48px;position:sticky;top:72px;z-index:50;background:var(--tabs-bg);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);padding:14px;border-radius:10px;border:1px solid var(--hairline);transition:background .5s,border-color .5s}
.tab{display:flex;align-items:center;justify-content:center;gap:10px;padding:14px 18px;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:1.3px;text-transform:uppercase;color:var(--text-mute);cursor:pointer;background:transparent;transition:all .3s cubic-bezier(.22,1,.36,1);border:1px solid transparent;position:relative}
.tab:hover{color:var(--text);background:var(--surface-raised)}
.tab.active{background:var(--bg-warm);border-color:var(--tab-accent);color:var(--text)}
.tab.active .tab-dot{animation:dotPulse 1.6s ease-in-out infinite}
.tab-dot{width:6px;height:6px;border-radius:50%;background:var(--tab-accent);box-shadow:0 0 8px var(--tab-accent);opacity:.5;transition:opacity .3s}
.tab.active .tab-dot{opacity:1}
@keyframes dotPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.7;transform:scale(.82)}}

/* DEPT INTRO */
.dept-intro{padding:28px 0 24px;border-bottom:1px solid var(--hairline);margin-bottom:40px;display:grid;grid-template-columns:1fr auto;gap:24px;align-items:center}
.dept-intro-left h2{font-family:'Fraunces',Georgia,serif;font-size:48px;font-weight:300;letter-spacing:-.025em;line-height:1;color:var(--text);font-variation-settings:'opsz' 144,'SOFT' 40}
.dept-intro-left h2 em{font-style:italic;color:var(--dept-accent);font-weight:300}
.dept-intro-left .dept-desc{margin-top:14px;font-size:14px;line-height:1.55;color:var(--text-mute);max-width:620px;font-weight:300}
.dept-intro-right{display:flex;flex-direction:column;gap:4px;text-align:right;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:var(--text-faint)}
.dept-intro-right span.accent{color:var(--dept-accent)}

/* FILE SECTIONS */
.file-section{margin-bottom:52px}
.file-section-head{display:flex;align-items:baseline;gap:14px;margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid var(--hairline)}
.file-section-title{font-family:'Fraunces',Georgia,serif;font-size:20px;font-weight:400;letter-spacing:-.01em;color:var(--text)}
.file-section-title em{font-style:italic;color:var(--dept-accent)}
.file-section-count{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:var(--text-faint);margin-left:auto}

/* FILE CARD */
.file-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.file-card{position:relative;padding:18px 20px;background:var(--bg-warm);border:1px solid var(--hairline);border-radius:6px;transition:all .3s cubic-bezier(.22,1,.36,1);cursor:pointer;text-align:left;font-family:inherit;color:var(--text);overflow:hidden}
.file-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 50% at 100% 100%,var(--card-accent-soft,rgba(209,178,90,.12)),transparent 70%);opacity:0;transition:opacity .3s;pointer-events:none}
.file-card:hover{border-color:var(--card-accent,var(--gold));transform:translateY(-2px);box-shadow:var(--shadow-card)}
.file-card:hover::before{opacity:1}
.file-card-head{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
.file-icon{display:flex;align-items:center;justify-content:center;width:38px;height:44px;flex-shrink:0;background:var(--surface-raised);border:1px solid var(--hairline);border-radius:4px;color:var(--card-accent,var(--gold));position:relative;transition:transform .4s cubic-bezier(.22,1,.36,1),border-color .3s,background .3s}
.file-icon::after{content:'';position:absolute;top:-1px;right:-1px;width:8px;height:8px;background:var(--bg-warm);border-left:1px solid var(--hairline);border-bottom:1px solid var(--hairline);transition:background .3s,border-color .3s}
.file-icon svg{transition:transform .4s cubic-bezier(.22,1,.36,1)}
.file-card:hover .file-icon{transform:translateY(-1px) rotate(-3deg);border-color:var(--card-accent,var(--gold))}
.file-card:hover .file-icon svg{transform:scale(1.1)}
.file-meta{min-width:0;flex:1}
.file-name{font-family:'Fraunces',Georgia,serif;font-size:17px;font-weight:400;line-height:1.2;letter-spacing:-.01em;color:var(--text);word-break:break-word}
.file-tag{display:inline-block;margin-top:6px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1.4px;text-transform:uppercase;color:var(--card-accent,var(--gold))}
.file-desc{font-size:12.5px;line-height:1.55;color:var(--text-mute);font-weight:300}

/* DRAWER */
.drawer-overlay{position:fixed;inset:0;z-index:400;background:var(--drawer-overlay);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);opacity:0;pointer-events:none;transition:opacity .3s,background .5s}
.drawer-overlay.open{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;bottom:0;z-index:500;width:min(620px,94vw);background:var(--bg-warm);border-left:1px solid var(--hairline-strong);transform:translateX(100%);transition:transform .5s cubic-bezier(.22,1,.36,1);overflow-y:auto}
.drawer.open{transform:translateX(0)}
.drawer::-webkit-scrollbar{width:6px}
.drawer::-webkit-scrollbar-thumb{background:var(--hairline-strong);border-radius:4px}
.drawer-inner{padding:32px 40px 56px}
.drawer-close{position:absolute;top:20px;right:20px;width:36px;height:36px;border-radius:50%;background:var(--surface-raised);border:1px solid var(--hairline);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--text-mute);cursor:pointer;transition:all .25s;z-index:10}
.drawer-close:hover{color:var(--text);background:var(--surface-raised);border-color:var(--hairline-strong)}
.drawer-tag{display:inline-flex;align-items:center;gap:8px;padding:6px 12px 6px 10px;border-radius:100px;background:var(--drawer-accent-soft,rgba(209,178,90,.1));border:1px solid var(--drawer-accent,rgba(209,178,90,.3));font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:1.4px;text-transform:uppercase;color:var(--drawer-accent,var(--gold));margin-top:32px}
.drawer-tag-dot{width:6px;height:6px;border-radius:50%;background:var(--drawer-accent,var(--gold));box-shadow:0 0 6px var(--drawer-accent,var(--gold));animation:dotPulse 2s ease-in-out infinite}
.drawer-file{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:1.2px;color:var(--text-faint);margin-top:20px}
.drawer-title{font-family:'Fraunces',Georgia,serif;font-size:40px;font-weight:300;line-height:1;letter-spacing:-.03em;color:var(--text);margin-top:10px;font-variation-settings:'opsz' 144,'SOFT' 40}
.drawer-title em{font-style:italic;color:var(--drawer-accent,var(--gold));font-weight:300}
.drawer-purpose{margin-top:24px;padding:20px 22px;background:var(--surface-subtle);border-left:2px solid var(--drawer-accent,var(--gold));border-radius:2px;font-family:'Fraunces',Georgia,serif;font-style:italic;font-size:17px;line-height:1.5;font-weight:300;color:var(--text);letter-spacing:-.005em}
.drawer-section{margin-top:36px}
.drawer-section-title{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1.8px;text-transform:uppercase;color:var(--drawer-accent,var(--gold));margin-bottom:16px;display:flex;align-items:center;gap:10px}
.drawer-section-title .bar{flex:1;height:1px;background:var(--hairline)}

/* TOGGLE CONTENT ITEMS */
.drawer-contents{display:flex;flex-direction:column;gap:6px}
.content-item{background:var(--bg-warmer);border:1px solid var(--hairline);border-radius:4px;overflow:hidden;transition:border-color .3s}
.content-item.open{border-color:var(--drawer-accent,var(--gold))}
.content-header{display:flex;align-items:center;gap:14px;padding:14px 16px;cursor:pointer;user-select:none;transition:background .2s}
.content-header:hover{background:var(--surface-subtle)}
.content-header .chev{width:10px;height:10px;flex-shrink:0;border-right:1.5px solid var(--text-faint);border-bottom:1.5px solid var(--text-faint);transform:rotate(-45deg);transition:transform .3s,border-color .3s;margin-left:auto}
.content-item.open .content-header .chev{transform:rotate(45deg);border-color:var(--drawer-accent,var(--gold))}
.content-label{flex:1;font-size:13px;line-height:1.5;color:var(--text);font-weight:400;min-width:0}
.content-icon{display:flex;align-items:center;justify-content:center;width:22px;height:22px;flex-shrink:0;color:var(--drawer-accent,var(--gold));opacity:.55;transition:opacity .35s cubic-bezier(.22,1,.36,1),transform .4s cubic-bezier(.22,1,.36,1),filter .35s}
.content-item:hover .content-icon{opacity:.85}
.content-item.open .content-icon{opacity:1;transform:scale(1.12);filter:drop-shadow(0 0 4px var(--drawer-accent,var(--gold)))}
.content-detail{max-height:0;opacity:0;overflow:hidden;transition:max-height .5s cubic-bezier(.22,1,.36,1),opacity .3s,padding .3s;padding:0 18px;font-size:13px;line-height:1.7;color:var(--text-mute);font-weight:300;border-top:1px solid transparent}
.content-item.open .content-detail{max-height:3000px;opacity:1;padding:18px 20px 22px;border-top-color:var(--hairline)}
.content-detail p{margin-bottom:12px}
.content-detail p:last-child{margin-bottom:0}
.content-detail ul{padding-left:18px;margin:10px 0}
.content-detail ol{padding-left:20px;margin:10px 0}
.content-detail li{margin-bottom:6px;line-height:1.6}
.content-detail strong{color:var(--text);font-weight:500}
.content-detail em{color:var(--drawer-accent,var(--gold));font-style:italic}
.content-detail blockquote{margin:14px 0;padding:10px 16px;border-left:2px solid var(--drawer-accent,var(--gold));background:var(--surface-subtle);font-style:italic;font-family:'Fraunces',Georgia,serif;font-size:13.5px;line-height:1.55;color:var(--text)}
.content-detail blockquote cite{display:block;margin-top:6px;font-family:'JetBrains Mono',monospace;font-style:normal;font-size:10px;color:var(--text-faint);letter-spacing:.8px;text-transform:uppercase}
.content-detail table{margin:12px 0;border-collapse:collapse;font-size:12px;width:100%}
.content-detail th,.content-detail td{padding:8px 10px;border-bottom:1px solid var(--hairline);text-align:left;vertical-align:top}
.content-detail th{color:var(--drawer-accent,var(--gold));font-weight:500;font-size:10px;text-transform:uppercase;letter-spacing:.8px}
.content-detail code{font-family:'JetBrains Mono',monospace;font-size:11.5px;background:var(--surface-raised);padding:2px 6px;border-radius:3px;color:var(--text)}
.content-detail h4{font-family:'Fraunces',Georgia,serif;font-size:16px;color:var(--text);font-weight:400;margin:16px 0 8px;font-variation-settings:'opsz' 144}
.content-detail .callout{padding:12px 14px;background:var(--gold-subtle);border:1px solid var(--gold-medium);border-radius:4px;margin:14px 0;font-size:12.5px;line-height:1.55;color:var(--text)}

.drawer-note{margin-top:32px;padding-top:24px;border-top:1px solid var(--hairline);font-size:12.5px;line-height:1.55;color:var(--text-mute);font-style:italic;font-family:'Fraunces',Georgia,serif;font-weight:300}

/* RETURN */
.return{padding:120px 48px 80px;border-top:1px solid var(--hairline);background:var(--bg-warm)}
.return-inner{max-width:1440px;margin:0 auto;display:grid;grid-template-columns:1fr auto;gap:40px;align-items:end}
.return-text{font-family:'Fraunces',Georgia,serif;font-size:clamp(28px,3vw,42px);font-weight:300;letter-spacing:-.025em;line-height:1.1;color:var(--text);max-width:660px}
.return-text em{font-style:italic;color:var(--gold)}
.return-cta{display:flex;align-items:center;gap:12px;padding:14px 22px;background:var(--bg);border:1px solid var(--hairline-strong);border-radius:100px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:1.6px;text-transform:uppercase;color:var(--text);transition:all .3s cubic-bezier(.22,1,.36,1)}
.return-cta:hover{background:var(--gold);color:var(--bg);border-color:var(--gold);transform:translateY(-2px);box-shadow:0 8px 20px var(--gold-medium)}
.return-cta-arrow{transition:transform .3s}
.return-cta:hover .return-cta-arrow{transform:translateX(4px)}

/* THEME TOGGLE */
.theme-toggle{display:inline-flex;align-items:center;gap:2px;padding:3px;background:var(--surface-subtle);border:1px solid var(--hairline);border-radius:100px;position:relative}
.theme-toggle-btn{position:relative;z-index:2;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--text-faint);cursor:pointer;transition:color .4s}
.theme-toggle-btn.active{color:var(--gold)}
.theme-toggle-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;transition:stroke .4s}
.theme-toggle-thumb{position:absolute;top:3px;left:3px;width:28px;height:28px;border-radius:50%;background:var(--surface-raised);border:1px solid var(--hairline-strong);transition:transform .45s cubic-bezier(.22,1,.36,1),background .4s,border-color .4s;z-index:1;pointer-events:none}
:root[data-theme="light"] .theme-toggle-thumb{transform:translateX(30px)}
.theme-toggle-btn:hover{color:var(--text)}

/* PASSWORD GATE */
#gate{display:none;position:fixed;inset:0;z-index:10000;background:var(--bg);align-items:center;justify-content:center;padding:40px;overflow:hidden;transition:background .5s,color .5s;color:var(--text);font-family:'Geist',-apple-system,sans-serif}
html.locked #gate{display:flex}
html.locked #root{display:none}
html.locked body{overflow:hidden}
.gate-bg-grid{position:absolute;inset:0;background-image:linear-gradient(var(--grid-line) 1px,transparent 1px),linear-gradient(90deg,var(--grid-line) 1px,transparent 1px);background-size:96px 96px;mask-image:radial-gradient(ellipse 60% 50% at 50% 50%,#000 20%,transparent 80%);-webkit-mask-image:radial-gradient(ellipse 60% 50% at 50% 50%,#000 20%,transparent 80%);pointer-events:none;opacity:.5}
.gate-bg-gradient{position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 50%,var(--gold-soft),transparent 60%);pointer-events:none}
.gate-inner{position:relative;z-index:2;max-width:460px;width:100%;text-align:center;animation:gateIn .9s cubic-bezier(.22,1,.36,1) both}
@keyframes gateIn{0%{opacity:0;transform:translateY(16px)}100%{opacity:1;transform:translateY(0)}}
.gate-eyebrow{font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:2.4px;text-transform:uppercase;color:var(--gold);display:inline-flex;align-items:center;margin-bottom:30px}
.gate-eyebrow-bar{display:inline-block;width:28px;height:1px;background:var(--gold);margin-right:14px}
.gate-title{font-family:'Fraunces',Georgia,serif;font-size:clamp(32px,5vw,56px);font-weight:300;letter-spacing:-.03em;color:var(--text);line-height:1;margin:0 0 20px;font-variation-settings:'opsz' 144}
.gate-title em{font-style:italic;color:var(--gold);font-weight:300}
.gate-sub{font-size:15px;line-height:1.55;color:var(--text-mute);margin:0 auto 40px;max-width:380px;font-weight:300}
.gate-form{display:flex;gap:8px;justify-content:center;max-width:420px;margin:0 auto;flex-wrap:wrap}
.gate-input{flex:1;min-width:0;padding:14px 20px;background:var(--surface-subtle);border:1px solid var(--hairline);border-radius:100px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:.5px;outline:none;transition:border-color .25s,background .25s}
.gate-input:focus{border-color:var(--gold);background:var(--surface-raised)}
.gate-input::placeholder{color:var(--text-faint);text-transform:uppercase;letter-spacing:1.6px;font-size:10.5px}
.gate-btn{padding:14px 26px;background:var(--gold-soft);border:1px solid var(--gold-medium);border-radius:100px;color:var(--gold);font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;font-weight:500;transition:all .25s cubic-bezier(.22,1,.36,1)}
.gate-btn:hover{background:var(--gold-medium);border-color:var(--gold);color:var(--gold-bright);transform:translateY(-1px);box-shadow:0 4px 14px var(--gold-medium)}
.gate-error{min-height:18px;margin-top:16px;font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:1.4px;text-transform:uppercase;color:#E74C3C;opacity:0;transition:opacity .3s}
.gate-error.show{opacity:.9;animation:gateShake .4s ease-out}
@keyframes gateShake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-4px)}40%,80%{transform:translateX(4px)}}

/* MOBILE */
@media(max-width:900px){
  .nav-top{padding:16px 20px}
  .nav-logo{font-size:15px}
  .hero{padding:120px 22px 60px}
  .hero-title{font-size:42px}
  .hero-sub{font-size:15px}
  .explainer{padding:20px 22px 60px}
  .explainer-grid{grid-template-columns:1fr;gap:10px}
  .explorer{padding:20px 22px 80px}
  .explorer-head{flex-direction:column;align-items:flex-start}
  .explorer-meta{text-align:left}
  .tabs{grid-template-columns:repeat(2,1fr);gap:4px;padding:10px;top:60px}
  .tab{padding:10px 12px;font-size:9.5px;letter-spacing:1.1px;gap:6px}
  .dept-intro{grid-template-columns:1fr;gap:12px}
  .dept-intro-left h2{font-size:32px}
  .dept-intro-right{text-align:left}
  .file-grid{grid-template-columns:1fr}
  .drawer{width:100%}
  .drawer-inner{padding:28px 22px 48px}
  .drawer-title{font-size:30px}
  .return{padding:80px 22px 60px}
  .return-inner{grid-template-columns:1fr;gap:24px}
  .return-text{font-size:26px}
}

<body>
<div id="gate">
  <div class="gate-bg-grid"></div>
  <div class="gate-bg-gradient"></div>
  <div class="gate-inner">
    <div class="gate-eyebrow"><span class="gate-eyebrow-bar"></span>Private access</div>
    <h1 class="gate-title">The Uncommon <em>Business</em></h1>
    <p class="gate-sub">Enter the password to step inside the demo.</p>
    <form class="gate-form" id="gate-form" autocomplete="off">
      <input type="password" class="gate-input" id="gate-input" placeholder="Password" autocomplete="off" autofocus>
      <button type="submit" class="gate-btn">Enter</button>
    </form>
    <div class="gate-error" id="gate-error">Incorrect password</div>
  </div>
</div>
<script>
(function(){
  var form=document.getElementById('gate-form');
  var input=document.getElementById('gate-input');
  var err=document.getElementById('gate-error');
  if(!form)return;
  form.addEventListener('submit',function(e){
    e.preventDefault();
    var pwd=(input.value||'').trim().toLowerCase();
    if(pwd==='employee'){
      try{localStorage.setItem('tub-access',String(Date.now()+7*24*60*60*1000))}catch(e){}
      document.documentElement.classList.remove('locked');
    }else{
      err.classList.remove('show');
      void err.offsetWidth;
      err.classList.add('show');
      input.value='';
      input.focus();
    }
  });
})();
</script>

// Infer icon from bullet label
function inferIcon(label){
  const l=label.toLowerCase();
  if(l.includes('three-layer')||l.includes('layer')||l.includes('ladder')||l.includes('stack')||l.includes('matrix')||l.includes('structure'))return'layers';
  if(l.includes('identity')||l.includes('who this'))return'user';
  if(l.includes('team')||l.includes('partnership')||l.includes('community')||l.includes('leadership map')||l.includes('handoff'))return'users';
  if(l.includes('knowledge')||l.includes('terminology')||l.includes('philosophy')||l.includes('a2a term')||l.includes('assumption'))return'book-open';
  if(l.includes('objective')||l.includes('positioning')||l.includes('steph')||l.includes('cac')||l.includes('target'))return'target';
  if(l.includes('embodiment')||l.includes('unique')||l.includes('signature')||l.includes('july 2023')||l.includes('innovation'))return'sparkles';
  if(l.includes('move')||l.includes('flow')||l.includes('pattern')||l.includes('process')||l.includes('methodology')||l.includes('how processed')||l.includes('margin'))return'activity';
  if(l.includes('process')||l.includes('escalation')||l.includes('decision')||l.includes('lean in')||l.includes('upsell')||l.includes('branch'))return'git-branch';
  if(l.includes('boundaries')||l.includes('guardrail')||l.includes('objection')||l.includes('refund')||l.includes('hold')||l.includes('don\'t work'))return'shield';
  if(l.includes('mandate')||l.includes('trust signal')||l.includes('award')||l.includes('proof')||l.includes('aggregate'))return'award';
  if(l.includes('mission')||l.includes('callan stand')||l.includes('core focus')||l.includes('compass'))return'compass';
  if(l.includes('value')||l.includes('why we exist')||l.includes('why tub')||l.includes('life transformation')||l.includes('mission'))return'heart';
  if(l.includes('10 rules')||l.includes('checklist')||l.includes('how values apply')||l.includes('tone rules'))return'check-square';
  if(l.includes('quote')||l.includes('verbatim')||l.includes('sample post'))return'quote';
  if(l.includes('revenue')||l.includes('trending')||l.includes('growth')||l.includes('breakdown'))return'trending-up';
  if(l.includes('time saving')||l.includes('clock')||l.includes('sample: time')||l.includes('scheduling'))return'clock';
  if(l.includes('faq')||l.includes('help')||l.includes('question'))return'help-circle';
  if(l.includes('key links')||l.includes('portal')||l.includes('link'))return'link';
  if(l.includes('pain point')||l.includes('banned list')||l.includes('sample: price')||l.includes('what doesn\'t work'))return'alert-circle';
  if(l.includes('false belief')||l.includes('one test'))return'eye';
  if(l.includes('eye-off'))return'eye-off';
  if(l.includes('hook')||l.includes('what we actually do')||l.includes('ai employee')||l.includes('tebb'))return'zap';
  if(l.includes('specificity'))return'target';
  if(l.includes('career')||l.includes('briefcase'))return'briefcase';
  if(l.includes('what goes in')||l.includes('folder'))return'folder';
  if(l.includes('why in every brain'))return'network';
  if(l.includes('what enables')||l.includes('what it enables'))return'sparkles';
  if(l.includes('radical specificity'))return'target';
  return'circle-dot';
}

// ═══ THEME ═══
function useTheme(){
  const[theme,setTheme]=useState(()=>{
    if(typeof document==='undefined')return'dark';
    return document.documentElement.dataset.theme||'dark';
  });
  useEffect(()=>{
    document.documentElement.dataset.theme=theme;
    try{localStorage.setItem('tub-theme',theme)}catch(e){}
  },[theme]);
  return[theme,setTheme];
}

function ThemeToggle({theme,setTheme}){
  return(
    <div className="theme-toggle" role="group" aria-label="Theme">
      <span className="theme-toggle-thumb"/>
      <button className={`theme-toggle-btn ${theme==='dark'?'active':''}`} onClick={()=>setTheme('dark')} aria-label="Dark mode" aria-pressed={theme==='dark'}>
        <svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>

        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      </button>
    </div>
  );
}

      {label:'Positioning — first in the world',html:`<p>The Uncommon Business is the <strong>first company in the world to train humans on becoming AI Architects</strong>. We are a human training company, not a tech company that teaches AI. We teach business owners and their teams how to integrate AI into every department of their organization as a full operating system that compounds over time.</p><p><strong>Scale:</strong> 25 humans operating 150+ AI employees across content, operations, sales, and curriculum development.</p>`},
      {label:'Mission — implementation to imagination',html:`<p><strong>Move all humans from implementation to imagination.</strong> AI handles the doing; humans focus on strategy and creative thinking.</p><p>Based on Myron Golden's 4 Levels of Value:</p><ul><li><strong>Implementation</strong> (lowest value) — doing the tasks</li><li><strong>Unification</strong> — organizing people and resources</li><li><strong>Communication</strong> — selling and influencing</li><li><strong>Imagination</strong> (highest value) — strategy and creative thinking</li></ul><p>AI should handle Implementation so humans can operate at Imagination. Every program we run moves people up this ladder.</p>`},
      {label:'What we actually do',html:`<p>We run live cohort programs where business owners build AI employees department by department across their entire organization. Students don't just learn about AI. They leave with <strong>60+ working AI employees, a complete AI Operating System, and the skills to keep building after the program ends</strong>.</p><p>Our core 12-week program (A2A) has a <em>78% completion rate</em> and <em>68.5 NPS</em>.</p>`},
      {label:'What we do NOT do (prevents AI hallucination)',html:`<ul><li>We do NOT build AI tools or software products</li><li>We do NOT offer consulting or done-for-you AI implementation (except through the new Build Team)</li><li>We do NOT claim AI replaces humans. Our entire model is <em>human-first</em>.</li><li>We do NOT guarantee specific revenue outcomes</li><li>We do NOT teach "hacks" or "tricks." We build systems.</li><li>We do NOT say "simple" or "easy." This work is worth doing, not effortless.</li></ul>`},
      {label:'Core frameworks — the named IP',html:`<ol><li><strong>Spot, Build, Train</strong> — The AI Architect identity. Spot bottlenecks, Build AI employees to solve them, Train the system to improve over time.</li><li><strong>AI Employee Definition</strong> — A helper built inside your computer, taught a specific job, that works on schedule or on demand. Four components: knowledge base, skills, connectors, memory. The test: <em>"Can you just say 'go'?"</em></li><li><strong>AI Operating System</strong> — Four layers: Knowledge (filing cabinet), Skills (verbs), Tools Access (integrations), Personal Knowledge (individual context).</li></ol>`},
      {label:'Values that run through every decision',html:`<ul><li><strong>Human-first</strong> — AI amplifies human capability; it does not replace human purpose</li><li><strong>Invitation over fear</strong> — Marketing leans into possibility, not urgency or scarcity</li><li><strong>Specificity over vagueness</strong> — Be concrete, tell stories, avoid cliches</li><li><strong>Interactive learning</strong> — Every session has hands-on building, not passive consumption</li><li><strong>Authenticity</strong> — Content must never read as obviously AI-generated</li></ul>`},

  {
    name:'Brand Voice',prefix:'[TUB]',
    purpose:'The writing-style guide that keeps every AI output sounding like Callan. Not like a chatbot with TUB\'s logo on it.',
    contents:[
      {label:'The One Test — no one should know AI touched it',html:`<p>Every piece of content must pass this: <em>no one should know AI touched it</em>. If someone could tell, rewrite it.</p><p>For newsletters specifically, add a second test: <em>would a reader screenshot it, forward it, or save it?</em> If not, it's not done.</p><p><strong>The final test:</strong> Read it out loud. Does it sound like Callan typing on her phone while sitting somewhere beautiful, telling you something she just figured out? If not, rewrite.</p>`},
      {label:'The signature move — sentence flow',html:`<p>This is the single biggest thing that separates Callan's voice from AI-generated copy. AI writes uniformly choppy or uniformly medium sentences. Callan connects thoughts with commas and "and," letting sentences flow like she's talking.</p><blockquote><strong>Bad (AI voice):</strong> "We slowed down. We listened. We shared what does not get posted publicly."<br/><br/><strong>Good (Callan voice):</strong> "We slowed all the way down, we listened to each other, and we shared the stuff that never makes it to the feed."</blockquote><ul><li>Connect thoughts with "and" — Callan's signature connector</li><li>Use commas for momentum within sentences</li><li>Drop in occasional short sentences for emphasis, but don't make every sentence short</li><li>Mix lengths — real writing is messier than AI writing</li><li>Use ampersand (&) when flowing fast and casual</li></ul>`},
      {label:'The complete banned list — words and phrases',html:`<h4>Filler qualifiers (biggest AI tells)</h4><table><tr><th>Word</th><th>Why</th></tr><tr><td>genuinely</td><td>AI crutch word</td></tr><tr><td>honestly</td><td>Same problem</td></tr><tr><td>actually</td><td>Filler that adds nothing</td></tr><tr><td>really</td><td>Makes sentences weaker</td></tr><tr><td>truly</td><td>Sounds like trying too hard</td></tr></table><h4>AI vocabulary red flags</h4><p>Dead giveaways that AI wrote it: <code>delve, tapestry, multifaceted, nuanced, resonate, embark, journey, foster, illuminate, paramount, pivotal, robust, seamless, holistic, testament, meticulous, furthermore, moreover, in addition</code></p><h4>Banned corporate and buzzword speak</h4><p><code>unpack, deep dive, pivot, leverage (as verb), utilize, aligned, game changer, cutting-edge, revolutionary</code></p><h4>Banned phrases (with replacements)</h4><table><tr><th>Phrase</th><th>Replacement</th></tr><tr><td>here's the thing</td><td>Just state the thing</td></tr><tr><td>at the end of the day</td><td>Delete entirely</td></tr><tr><td>let that sink in</td><td>Delete. Trust the reader.</td></tr><tr><td>sound familiar?</td><td>Delete. No engagement bait.</td></tr></table><h4>Banned punctuation</h4><ul><li>Em-dashes → use commas or line breaks</li><li>Semicolons → periods or commas</li><li>Rhetorical questions → statements</li></ul>`},
      {label:'The 10 Rules for writing as Callan',html:`<ol><li><strong>Avoid antithesis.</strong> State what it IS about directly.</li><li><strong>The 20% rule.</strong> After drafting, cut 20% of the words.</li><li><strong>Avoid uniformly short sentences.</strong> Mix lengths. Connect with "and" and commas.</li><li><strong>Avoid repetitive patterns.</strong> Don't start consecutive paragraphs the same way.</li><li><strong>Rule of 3.</strong> When listing, use 1 or 3 items. Never 2 (creates artificial antithesis).</li><li><strong>Do not overexplain.</strong> Trust the reader. Delete "The lesson here is..."</li><li><strong>Make it personal.</strong> Use "I," "you," "me," "your."</li><li><strong>No filler phrases.</strong> Every banned phrase exists because it adds zero value.</li><li><strong>Avoid line break overload.</strong> Not every sentence needs its own line.</li><li><strong>Avoid too many one-liners.</strong> Mix in longer, flowing passages.</li></ol>`},
      {label:'Radical specificity — this is a rule, not a vibe',html:`<p>If a vague word can be replaced with a specific number, name, or detail and you don't replace it, you're leaving trust on the table.</p><table><tr><th>Vague</th><th>Specific</th></tr><tr><td>recently</td><td>last week</td></tr><tr><td>a tool</td><td>Replit</td></tr><tr><td>a lot of money</td><td>$25,000 to $30,000</td></tr><tr><td>saved time</td><td>got back 18 hours a week</td></tr><tr><td>a trip</td><td>Nosara, Costa Rica</td></tr><tr><td>dinner</td><td>Howler's restaurant eating tuna carpaccio</td></tr></table><p><strong>Real people, named.</strong> Every great piece is populated with real humans doing real things. Give them a one-line role so the reader can place them ("Kinsey, who runs the day-to-day as COO").</p>`},
      {label:'TUB terminology — always use these',html:`<table><tr><th>Always say</th><th>Never say</th></tr><tr><td>AI employee</td><td>agent, bot, assistant</td></tr><tr><td>AI Architect</td><td>AI consultant, AI specialist</td></tr><tr><td>Spot, Build, Train</td><td>(never paraphrase the framework)</td></tr><tr><td>collapse time</td><td>save time</td></tr><tr><td>build, ship, train, wire, architect</td><td>implement, deploy, integrate</td></tr></table><p>Programs: <em>Automate to Accelerate (A2A)</em>, <em>Uncommon Leaders (UCL)</em>, <em>SuperHuman Work / Foundations of AI (FOA)</em>. Full name first reference, abbreviation after.</p>`},
      {label:'Pre-send checklist — the final gate',html:`<p>Before any content goes out, run through:</p><h4>Voice quality</h4><ul><li>Does this sound like Callan talking to a friend at a coffee shop?</li><li>Would she say this out loud?</li><li>Could someone know AI wrote it?</li></ul><h4>Structure check</h4><ul><li>No rhetorical or engagement-bait questions?</li><li>No em-dashes or semicolons?</li><li>Sentence length varied?</li><li>No throat-clearing opener?</li><li>No clever antithesis closing or philosophical summary bow?</li></ul><h4>Specificity check</h4><ul><li>Tools named, costs named, dates named, people named?</li><li>All names, numbers, and claims accurate and verified?</li></ul><div class="callout"><strong>The Safety Question:</strong> What would Callan be upset about if this goes live? Misrepresentation of people, offensive assumptions, inaccurate claims, AI tells, preachy tone, missing context, relationship damage.</div>`},
    ],
  },
  {
    name:'Case Studies',prefix:'[TUB]',
    purpose:'Deep narrative case studies of A2A graduates. Every story has specific names, numbers, and verbatim quotes. Nothing fabricated.',
    contents:[
      {label:'Jennifer Coleman — Gigawatt Coffee Roasters',html:`<p>Jennifer is the non-technical co-founder of a DTC coffee company in Chicago. For six years before A2A, she ran the back end solo.</p><h4>What she built in 13 weeks</h4><ul><li>A <strong>Brand Guardian</strong> in Claude that responds to customer emails in her exact voice with 97% accuracy</li><li>A <strong>Voice-Locked Review Assistant</strong> that replies to every customer review in brand voice, rotates phrasing, weaves in SEO</li><li>A <strong>Farmers Market Assistant</strong> — drops in one photo of a paper sign-up list, validates names through NeverBounce, uploads clean to CRM. Hours → 5 minutes</li><li>A Klaviyo War Room, automated Illinois sales tax filing, automated inventory management, a Gmail-to-Notion task extraction pipeline, a payroll skill in Claude Cowork</li></ul><blockquote>"13 weeks. Nearly doubled BFCM revenue YoY. Hired my first executive assistant after 6 years of running the back end solo. None of this required a developer, a designer, or a bigger team."<cite>Jennifer Coleman, Week 13</cite></blockquote>`},
      {label:'Siri Amrit Khalsa — Aligned Impact Strategies',html:`<p>Fractional CFO based in Vancouver. Before A2A: proposals took 6-8 hours each. Revenue vision capped around $2-5M.</p><h4>The transformation</h4><blockquote>"His proposals went from 6–8 hours down to 30 minutes to an hour — and they're better than before. His revenue vision completely shifted from a $2–5M ceiling to a $100M pathway."<cite>Jodi Thornock, A2A teaching team</cite></blockquote><p>Eight hours to thirty minutes. Quality up, not down. A revenue ceiling 20 to 50x bigger.</p><blockquote>"My normal day now is like my absolute freaking best day a year and a half ago."<cite>Siri Amrit Khalsa</cite></blockquote>`},
      {label:'Rebecca Stone — Affair Recovery Coach',html:`<p>Rebecca came into A2A struggling with the gap between repeatable prompts and custom GPTs. More importantly, she had a long-term team member who was about to leave. Losing that person would have cost her $20,000 in hiring, retraining, and lost work.</p><h4>Week 6 — Money Coach</h4><p>Rebecca took the Money Coach framework and used it on her own business. Instead of framing the team member's departure as a retention problem, she used AI to reframe the compensation, responsibilities, and structure of the role.</p><blockquote>"The Money Coach alone has saved me $20,000 because I was able to figure out how to keep a long-term team member who was ready to leave. I have built out systems that would normally take two years in three months."<cite>Rebecca Stone</cite></blockquote>`},
      {label:'Danielle Leger — The Polly Bateman Ltd',html:`<p>Chief Growth Officer at a UK-based mindset coaching company. Came in mid-pivot, mid-build, mid-identity-shift.</p><blockquote>"13 weeks ago, I was a different person. I felt like I was drowning in open water with no sight of land. Yesterday, I signed my first official paying client. You didn't just teach AI skills. You threw a lifeline to someone drowning."<cite>Danielle Leger</cite></blockquote><p>A2A works for people mid-pivot, not just established operators. Danielle didn't come in with a polished business. She came in with a vision, a founder she trusted, and a willingness to build fast.</p>`},
      {label:'Match the story to the objection',html:`<table><tr><th>Objection</th><th>Story to use</th></tr><tr><td>"AI isn't relevant to my industry"</td><td>Jennifer (coffee), Abigail (chiropractor), Rebecca (coach)</td></tr><tr><td>"I'm not technical"</td><td>Jennifer's Week 13 line: "None of this required a developer"</td></tr><tr><td>"What's the ROI?"</td><td>Siri (8hrs→30min), Rebecca ($20K saved), Jennifer (doubled BFCM)</td></tr><tr><td>"I don't have time"</td><td>Rebecca (3 months of work in 13 weeks). Abigail (built live in class)</td></tr><tr><td>"I'm too far behind"</td><td>Danielle. "Drowning" → "first paying client"</td></tr></table><div class="callout"><strong>Never fabricate.</strong> If a detail is not in the documented vault, do not add, embellish, or turn "her proposals take 30 minutes now" into "her proposals take minutes." Specifics are what make these stories work as proof.</div>`},

  {
    name:'Founder Story',prefix:'[TUB]',
    purpose:'Callan\'s origin — her path, why TUB exists, what she refuses to compromise on.',
    contents:[
      {label:'The career arc — a decade before TUB',html:`<p>Callan spent a decade in the business of making other people's operations work better than they did without her. She sold Cutco out of college — her first real education in persuasion. Then built a digital marketing agency coming out of University of St. Thomas in 2013, followed by <strong>six to seven years doing CRM implementations inside Salesforce and HubSpot</strong>.</p><p>The job wasn't just configuring software — it was getting entire teams of humans to actually change how they worked. She learned, over and over, that <em>the system is only as good as the training behind it</em>.</p><p>She's not an engineer. Never was. That matters, because neither are most of the business owners she now teaches.</p>`},
      {label:'July 2023 — the moment',html:`<p>She tried to solve the leverage problem with a land investing business. It made money. It also drained her — because she was still the one making it move. That experience planted the question that would eventually become TUB: <em>what does a business look like when it genuinely doesn't depend on you to function?</em></p><p>In July 2023, she saw ChatGPT. For most people, it was a curiosity. For someone who'd spent years building business systems and training people to use them, it was <strong>infrastructure</strong> — the missing layer that finally made the answer to her question possible.</p><p>She founded TUB shortly after and ran her first cohort within months. Eighteen months later: 25+ people on the team, multi-million-dollar revenue, and a business built largely on the same AI employee model she was teaching. <em>The method proved itself on itself.</em></p>`},
      {label:'Why TUB exists — the cabin moment',html:`<p>The inflection point was a mastermind in the Canadian Rockies. Callan was in a cabin with four other women founders. They were hunched over their laptops building sales pages, writing case studies, drafting process docs. Callan was in the kitchen making quiche. She sat down with them for three hours.</p><p><strong>Two out of the four cried.</strong></p><p>She walked out of that cabin with a mission. If she could teach those women to build systems that wrote their sales pages like them, sales emails like them, and analyzed their calls like them, they would have more time for vision, creativity, and the work they actually came here to do. AI wasn't the point. <em>Activating human potential was the point. AI was the vehicle.</em></p><p>That is why TUB exists. Callan believes there is a woman sitting somewhere right now writing her hundredth repetitive document, doing work she did herself years ago, with no idea any of this exists. TUB exists for her.</p>`},
      {label:'What Callan stands for — four pillars',html:`<h4>Human-first, always</h4><p>Callan does not believe AI replaces humans. She believes it replaces <em>the work humans should never have been doing in the first place</em>. The work humans were put on the planet to do — vision, relationship building, strategy, intuition — becomes more valuable when AI handles the rest.</p><h4>Training is the skill</h4><p>Most people use AI like a gumball machine: put a quarter in every time they have a task, get one output, start over. Callan teaches them to build a <strong>gumball factory</strong> instead. The difference is training.</p><h4>Imagination over implementation</h4><p>Anchored in Myron Golden's 4 Levels of Value. Implementation is the lowest-value work a human can do. AI handles the doing. Humans operate at the level of strategy and creative thinking.</p><h4>Intuition is a job</h4><p>AI does not have a frequency. It does not have intuition. It does not have a connection to a higher power. Humans do. The human job is to read what AI produces and ask whether it is actually right.</p>`},
      {label:'Trust signals — the receipts',html:`<ul><li><strong>Scale:</strong> 10,000+ people through TUB programs since launch. Single bootcamp peak: 13,000 registrations.</li><li><strong>Company:</strong> 25 humans operating 150+ AI employees across every department.</li><li><strong>Program results:</strong> A2A has a 78% completion rate and 68.5 NPS across 171 survey responses (Fall 2025).</li><li><strong>Featured by:</strong> Amy Porterfield, Jasmine Star. Inbound from Natalie Ellis and Jenna Kutcher.</li><li><strong>Keynotes:</strong> Minted Wealth Live (Scottsdale), Team Women (Minneapolis), Real Estate Coaching Collective.</li><li><strong>Education:</strong> University of St. Thomas, 2013. Entrepreneurship major.</li><li><strong>Assessments:</strong> Enneagram 3. StrengthsFinder: Woo, Communication, Futuristic, Activator, Significance. Kolbe: 4-2-10-3.</li></ul><blockquote>She's based in Minnesota. Born May 16. Did real magic tricks as a kid — which became the architecture of her keynote: show the trick first, explain after. Results before process, always.</blockquote>`},
    ],

  {
    name:'ICP',prefix:'[TUB]',
    purpose:'Ideal Customer Profile — Steph (founder) and Brandi (team transformation buyer). Every messaging decision runs through this file.',
    contents:[
      {label:'Steph — the North Star Founder',html:`<p><strong>This is the aspirational ICP.</strong> Every piece of messaging should be calibrated as if Steph is in the room. When we speak to Steph, everyone below her self-selects in.</p><table><tr><th>Attribute</th><th>Detail</th></tr><tr><td>Age</td><td>35-50</td></tr><tr><td>Revenue</td><td>$3M-$10M+</td></tr><tr><td>Team Size</td><td>2-5 (lean by design)</td></tr><tr><td>Stage</td><td>Post-growth, pre-scale. Proven concept, operational ceiling.</td></tr><tr><td>Business Type</td><td>Mission-driven, often female-led. Coaching, consulting, healthcare, e-commerce, services.</td></tr><tr><td>Role</td><td>Founder/CEO — makes every strategic decision. The business runs through her.</td></tr></table><h4>Core beliefs</h4><ul><li>Growth is possible without sacrificing her life or mission</li><li>She should be working ON the business, not drowning IN it</li><li>The right systems multiply her team's output without multiplying payroll</li><li>She refuses to let it plateau because of operational bottlenecks</li></ul>`},
      {label:'Brandi — the Team Transformation Buyer',html:`<p>Brandi doesn't just want AI for herself. She needs to transform how her <em>entire team</em> operates. She feeds the Team Transformation Offer (TTO) and enterprise deals.</p><table><tr><th>Attribute</th><th>Detail</th></tr><tr><td>Age</td><td>35-44 (avg age of US ops managers: 43.7)</td></tr><tr><td>Company Revenue</td><td>$5M-$50M+</td></tr><tr><td>Team She Manages</td><td>5-45+</td></tr><tr><td>Role</td><td>VP of Ops, Director of Admin, COO, Fractional DOO</td></tr><tr><td>Salary</td><td>$100K-$130K total comp</td></tr></table><h4>The squeeze</h4><blockquote>"45 people about to go in 45 different AI directions with no standard."<cite>Kiki Kavari, $40M fashion brand</cite></blockquote><p>She's caught between executive pressure from above and team resistance from below. 75% of managers are overwhelmed by expanding responsibilities. Only 14% of organizations provide managers support on integrating GenAI. She's been handed the mandate without the map.</p>`},
      {label:'Top pain points — how each persona hurts',html:`<h4>Steph's pain stack</h4><ol><li><strong>"I'm making every decision and I can't step away."</strong> She's built a business that can't function without her brain.</li><li><strong>"I'm working 60 hours a week and the needle isn't moving."</strong> Revenue is strong but growth has stalled.</li><li><strong>"I know AI could change everything but I can't make it stick."</strong> She's tried ChatGPT. It's all one-off.</li></ol><h4>Brandi's pain stack</h4><ol><li><strong>"I'm responsible for making AI work but nobody taught ME how."</strong> Only 8% of HR leaders believe managers have AI skills.</li><li><strong>"My team won't use the tools we bought."</strong> 57% of employees hide their AI use. 77% say AI added to their workload.</li><li><strong>"I'm squeezed between executives who want results and employees who are resistant."</strong></li></ol>`},
      {label:'How Steph describes her problem — verbatim',html:`<blockquote>"I'm making every decision and I can't step away"</blockquote><blockquote>"I always feel behind"</blockquote><blockquote>"I've been doing this the hard way for weeks"</blockquote><blockquote>"I tried AI but it just gives me generic stuff that doesn't sound like me"</blockquote><blockquote>"I don't have time for one more thing"</blockquote><h4>How transformed students describe the win</h4><blockquote>"My normal day now is like my absolute freaking best day a year and a half ago"</blockquote><blockquote>"I built and implemented everything. My business thinks with me now."</blockquote><blockquote>"Team of 3 operating like 15. I close my laptop at 4:30."</blockquote><blockquote>"The Money Coach alone saved me $20,000"</blockquote><blockquote>"Proposals went from 6-8 hours to 30 minutes, and they're better than before"</blockquote>`},
      {label:'Common objections — approved reframes',html:`<table><tr><th>Objection</th><th>Approved reframe</th></tr><tr><td>"I don't have time for a 13-week program."</td><td>"You're spending 60 hours/week doing work AI should handle. The first 2 weeks pay for the time investment."</td></tr><tr><td>"It costs too much."</td><td>"$9K one time for 4-5 AI employees. A single human hire is $6K/month. Jennifer Coleman paid for itself in month one."</td></tr><tr><td>"My business is different."</td><td>"Coffee roasters, pelvic floor clinics, real estate, manufacturing, fashion brands. Every business has marketing, sales, ops, and finance."</td></tr><tr><td>"Can I just hire a consultant?"</td><td>"A consultant builds you one agent. We train your entire team to think this way. The difference between renting and owning."</td></tr></table>`},
      {label:'False beliefs Steph brings in — and the truth',html:`<h4>"I'm already using AI — I'm ahead of most people"</h4><p>Reality: She puts a quarter in the gumball machine, gets one output, leaves. She's never trained it, never given it feedback. The gap between "using AI" and "running on AI" is enormous.</p><h4>"I can learn this on YouTube"</h4><p>Reality: YouTube teaches tricks. Nobody on YouTube shows you the inside of a real company operating with AI employees. TUB has five rounds, 300+ businesses, real results across every industry.</p><h4>"I just need to hire better people"</h4><p>Reality: Her team isn't the problem. Her systems are. She could hire 5 more people and still be the bottleneck because every decision still runs through her.</p><h4>"AI is too technical for me"</h4><p>Reality: Her 25-year-old marketing manager has the skill set to build an AI employee tomorrow with proper training. The barrier isn't technical ability.</p>`},

  {
    name:'Mission and Values',prefix:'[TUB]',
    purpose:'The North Star — what we believe, what we stand for, what we refuse to do for any price. The filter for hiring, firing, and every tradeoff.',
    contents:[
      {label:'Core focus — purpose and niche',html:`<p><strong>Purpose (the "why"):</strong> Activate humans to their highest potential.</p><p><strong>Niche (the "what"):</strong> AI education for growing businesses.</p><h4>Our Mission</h4><p><em>Move all humans from implementation to imagination.</em> AI handles the doing. Humans operate at the level of strategy, relationships, intuition, and creative thinking.</p><h4>Our Vision</h4><p>A world where every knowledge worker is an AI Architect. Every business runs on an AI Operating System. The work humans do is the work humans were actually put on the planet to do.</p>`},
      {label:'The six core values — measurable "we" statements',html:`<h4>1. We do not make excuses. We take radical ownership.</h4><p>When something breaks, we don't point fingers. We fix it. "That's not my job" doesn't exist here.</p><h4>2. We are AI Architects.</h4><p>We use AI as an extension of our genius, and we design systems to remove friction. Before you add manual work, ask: "Can AI do this?"</p><h4>3. We lift the room.</h4><p>Our presence adds, never subtracts. People are glad when you join a meeting.</p><h4>4. This work is bigger than any one person.</h4><p>We choose unity over ego, purpose over credit, "we" over "I."</p><h4>5. We operate like elite athletes.</h4><p>Championship teams train hard, execute precisely, and recover intentionally. Launch seasons are sprints. Between launches, we rest and build systems.</p><h4>6. We are unreasonably resourceful.</h4><p>Obstacles don't stop us. They redirect us. When Plan A fails, we're already on Plan C.</p>`},
      {label:'Why we exist — the gap was never the AI',html:`<p>Callan saw it first in a cabin in the Canadian Rockies. Four women founders hunched over their laptops building sales pages, drafting case studies, writing process docs. Two of the four cried.</p><p>Most of the AI world got the framing wrong. They built it as a tech industry story — better models, better tools, better infrastructure. Callan saw something different from inside a decade of Salesforce and HubSpot implementations:</p><blockquote>The gap was never the AI. The gap was the humans. The training data, the context, the systems thinking, the discipline to train a machine the way you'd train a new hire. <em>AI is a human skill dressed up as a technical one.</em></blockquote><p>We are the first company in the world to train humans on becoming AI Architects. Not a tech company that teaches AI. A human training company that teaches mindset, leadership, and systems thinking, using AI as the vehicle.</p>`},
      {label:'How values apply — hiring, firing, weekly rhythm',html:`<h4>Hiring</h4><p>Every candidate gets evaluated against all six values. A hire has to already <em>live at least three of them</em> and be coachable on the rest. "Smart and hardworking" is not enough. We hire AI Architects, not AI users.</p><h4>Weekly rhythms</h4><p>Every team's L10 checks progress against these values in plain language. Did we build and ship? Did we come with solutions? Are we lifting the room or draining it?</p><h4>AI employees</h4><p>Every AI employee we build inherits these values through its knowledge base. The Brand Guardian enforces specificity and authenticity. Every employee is a downstream expression of this document.</p><h4>Firing and feedback</h4><p>When someone consistently violates a value, we name the value and the specific behavior. If the pattern continues, they are not the right fit. <em>Values are the filter, not the slogan.</em></p>`},
    ],
  },
  {
    name:'Org Chart & Decision Rights',prefix:'[TUB]',

      {label:'The product ladder — awareness to enterprise',html:`<pre style="font-family:'JetBrains Mono',monospace;font-size:11.5px;line-height:1.6;background:var(--surface-subtle);padding:14px 16px;border-radius:4px;color:var(--text)">Awareness:      AI Masterclass (Free–$97)

Enterprise:     Team Transformation Offer (TTO)</pre><p>Each tier feeds the next. Free and micro events build trust and shift beliefs. Paid programs build AI operating systems. Community retains and compounds.</p>`},
      {label:'A2A Program — the flagship',html:`<p><strong>Automate to Accelerate.</strong> 13-week live cohort where business owners build AI into every department.</p><h4>The transformation</h4><blockquote>Before: "I'm making every decision. I can't step away. I tried AI but it gives me generic garbage."<br/><br/>After: "My team of 3 operates like 15. I have AI employees running across every department. I close my laptop at 4:30."</blockquote><h4>What's included</h4><ul><li>13 weeks live (Tuesdays + weekly office hours + Coffee & Code)</li><li>SuperHuman Work ($997 value) included free</li><li>Department-by-department AI employee builds (Marketing, Sales, Ops, CS, Finance)</li><li>The Vault (full skill library) — 1-year access</li><li>CalChat AI co-pilot — 24/7 during program</li><li>Brand Guardian module (#1 rated, +103 net favorability)</li><li>AI Business Brain capstone (Week 10)</li><li>Student Showcase (Week 12)</li></ul><h4>Price</h4><p><strong>$8,997 PIF</strong> / 3-Pay ($3,199×3) / 5-Pay ($1,957×5) / 10-Pay ($997×10). Team seats: $1,500 each.</p><h4>Proof</h4><ul><li>68.5 NPS across 171 survey responses (Fall 2025)</li><li>78% completion rate</li><li>Students save 20+ hours/week after implementation</li></ul><p><strong>Guarantee:</strong> Do the Work Guarantee. Attend 6 of 8 sessions, complete 4 of 7 builds, full refund within 30 days after Week 8.</p>`},
      {label:'TEBB — The Effortless Business Bootcamp',html:`<p>3-session live bootcamp that introduces the AI employee model and creates a proof-of-concept experience fast enough that A2A feels obvious.</p><h4>The transformation</h4><blockquote>Before: "I've heard about AI but I don't know where to start. Everything feels like hype."<br/><br/>After: "I just saw a real business owner build a working AI employee in 20 minutes."</blockquote><ul><li>3 live sessions over one week</li><li>Live demos of AI employees inside real businesses</li><li>Session 3 is the primary pitch moment for A2A</li><li>GA: $97 · VIP: $297</li></ul><p><strong>Proof:</strong> 3,343 registrations for Spring 2026. 500+ attendees per session in Fall 2025.</p>`},

      {label:'Uncommon Leaders — the graduate community',html:`<p>Post-A2A graduate community. <em>Less a course, more an insurance policy.</em></p><ul><li>Weekly Strategy Labs (Wednesdays — live coaching and teaching)</li><li>Insider Playbooks and "How I Built This" sessions</li><li>Loom Reviews — submit strategy docs, receive personalized Loom feedback</li><li>Coffee & Code (informal Friday sessions)</li><li>Hot seat coaching, private Slack community</li><li>CalChat+ (24/7 AI employee trained on all UCL/A2A content)</li><li>Power Plays (3 weekly tactical emails)</li><li><strong>Full A2A access for all future cohorts at no added cost</strong></li><li>UCL Live in-person event (June 17-19, 2026, Minneapolis)</li></ul><h4>Price</h4><p>$1,500/month (6-month minimum) · Additional team seats: $500/month · Activation fee for non-current A2A grads: $2,000 one-time</p>`},

      {label:'Profile structure — what lives in every teammate file',html:`<p>Every profile has the same bones:</p><ul><li><strong>Role</strong> — one-sentence description of what they do</li><li><strong>Owns</strong> — specific outcomes they're accountable for</li><li><strong>Decides</strong> — decisions they make without approval</li><li><strong>Consults on</strong> — where they're pulled in for input</li><li><strong>KPIs</strong> — how performance is measured</li><li><strong>Personality assessments</strong> — StrengthsFinder, Enneagram, Kolbe, Culture Index, Human Design</li><li><strong>Communication style</strong> — how they prefer to be pitched, given feedback, worked with</li><li><strong>Works best when</strong> — environmental conditions for peak performance</li><li><strong>Struggles with</strong> — documented failure modes</li><li><strong>Career arc</strong> — what they did before TUB and how it shapes current work</li><li><strong>Fun facts</strong> — personal context that makes them human</li></ul>`},
      {label:'Callan Faulkner — Founder & CEO (sample profile)',html:`<h4>Role</h4><p>Founder, CEO, and the face and voice of TUB. Primary instructor across every program.</p><h4>Owns</h4><ul><li>Brand voice and positioning across every channel</li><li>Product vision and strategic direction</li><li>Primary instruction for A2A, Bootcamp, Masterclass, UCL, SuperHuman Plus</li><li>Final authority on what ships to students</li></ul><h4>Personality assessments</h4><ul><li>StrengthsFinder: Woo, Communication, Futuristic, Activator, Significance</li><li>Enneagram: 3</li><li>Kolbe: 4-2-10-3 (Explain, Adapt, Innovate, Envision)</li></ul><h4>Communication style</h4><p>Direct, fast, high-energy. Teaches by demo (the "magic show"): give her the problem live, she'll solve it in five minutes. Gives feedback in the moment. Prefers to be pitched on ideas with a point of view attached, not open-ended options.</p><h4>Struggles with</h4><ul><li>Process documentation and slow, repetitive admin work (she says so openly)</li><li>Staying in execution mode once a decision is made</li></ul><h4>Fun facts</h4><blockquote>Minnesota based. Birthday May 16. Best friend in her work is Claude ("If I liked men, Claude would be my boyfriend"). Did real magic tricks as a kid and performs them for the adults — that became the keynote format.</blockquote>`},

      {label:'Why we document struggles too',html:`<p>Every profile names documented failure modes. <em>Not strengths only.</em> This is unusual and intentional.</p><p>When we ask Callan's AI employee to "draft this proposal in Callan's style," the AI needs to know not just how Callan writes — but how she <strong>wouldn't</strong> write, what bores her, what drains her, what she avoids.</p><div class="callout"><strong>Why it matters:</strong> When an AI employee inherits a teammate's profile, it inherits the whole person — strengths, struggles, preferences, quirks. A profile that only lists strengths produces output that feels off. A profile that includes struggles produces output that sounds like the person.</div>`},

  {
    name:'What Makes Us Unique',prefix:'[TUB]',
    purpose:'The differentiation doc — why TUB is not interchangeable with any other AI program. Four layers: beliefs, thinking, teaching, proof.',
    contents:[
      {label:'The short version — first in the world',html:`<p>TUB is the only company in the world that trains humans to become <strong>AI Architects</strong> inside their own business, department by department, using AI employees built live in every session.</p><p>Everyone else teaches tools, prompts, or one-off automations. <em>We build the operating system.</em> We run 150+ AI employees with 25 humans. We don't just teach what we preach. We teach what we already built and operate every day.</p>`},
      {label:'Our philosophy — five beliefs we refuse to abandon',html:`<h4>AI employees, not AI tools</h4><p>A gumball machine gives you one gumball per quarter. An employee shows up every day, knows your business, and does the job the way you would. Most people use AI like a gumball machine and conclude AI doesn't work. <em>The problem was never the AI. It was the architecture.</em></p><h4>Training is the skill</h4><p>Training is the slow, judgment-heavy work that no outside consultant can do. Your voice, your data, your line-in-the-sand calls. The business owner always has to train. That's the job.</p><h4>Implementation is the lowest-value human work</h4><p>A founder at 90-95% capacity is stuck at Implementation. AI is the first technology in history that handles Implementation at human quality. That frees humans for strategy, creative thinking, and relationships.</p><h4>Human-first, always</h4><p>AI amplifies human capability. It does not replace human purpose. The students who thrive in A2A lean into their humanity <em>more</em>, not less.</p><h4>Invitation, not fear</h4><p>The prospect who buys from fear quits when the work gets hard. The prospect who buys from invitation finishes, implements, and refers. 78% completion and 68.5 NPS are not built on fear.</p>`},
      {label:'Named frameworks — the proprietary IP',html:`<h4>Spot, Build, Train</h4><p>The AI Architect identity. Spot bottlenecks. Build AI employees to solve them. Train the system over time.</p><h4>AI Efficiency Ladder</h4><p>The progression students climb: single prompts → saved prompts → Custom Projects / AI employees → automations → agents. Each rung removes more human labor.</p><h4>RCRQ Framework</h4><p>The four-part prompt structure: <strong>R</strong>ole, <strong>C</strong>ontext, <strong>R</strong>equest, <strong>Q</strong>uestions. Students write better prompts in 30 seconds than they used to in 30 minutes.</p><h4>Think-See-Operate</h4><p>The three modes of human-AI interaction: Think (strategic partner), See (context and pattern recognition), Operate (execution). Knowing which mode you need is the skill.</p><h4>The Uncommon Method™ — Rewire, Build, Scale</h4><p>The three-phase program delivery methodology: <strong>Phase 1 Rewire</strong> (master the AI mindset), <strong>Phase 2 Build</strong> (create custom AI employees), <strong>Phase 3 Scale</strong> (expand across the business).</p><h4>Architect vs. Offloader</h4><p>The identity shift A2A creates. Offloaders hand tasks to AI and hope. Architects design systems, train them, operate them.</p>`},
      {label:'Our methodology — five mechanics no one else runs',html:`<ol><li><strong>Live builds, every session.</strong> Students build alongside the instructor in real time. No passive consumption.</li><li><strong>Department-by-department AI employees.</strong> We teach department by department (Marketing, Sales, Ops, CS, Finance, HR, Life). Students finish with an operating business, not a bag of tools.</li><li><strong>13-week live cohort with Do-the-Work Guarantee.</strong> Live group pacing, not self-paced drift. Show up to 6 of 8 weeks, complete 4 of 7 builds.</li><li><strong>Dogfood loop.</strong> We run 150+ AI employees with 25 humans. Everything we teach is already running inside TUB before it hits a classroom.</li><li><strong>Graduate ecosystem.</strong> A2A is not the end. Uncommon Leaders, Power Plays, Coffee & Code keep graduates compounding.</li></ol>`},
      {label:'Proof of concept — we live it before we teach it',html:`<ul><li><strong>25 humans running 150+ AI employees</strong> across marketing, sales, ops, CS, curriculum, and finance</li><li><strong>Callan's newsletter pipeline:</strong> 4 AI employees in sequence, 3 hours of work compressed to 10 minutes</li><li><strong>5 full-time job descriptions taken down</strong> because AI employees now do the work</li><li><strong>68.5 NPS</strong> across 171 survey responses</li><li><strong>78% completion rate</strong> on A2A (industry benchmark: 10-20%)</li><li><strong>Brand Guardian rated #1 module</strong> with +103 net favorability</li><li><strong>3,343 bootcamp registrations</strong> for Spring 2026</li><li><strong>40+ industries</strong> across student base</li><li><strong>500+ attendees per live session</strong> in Fall 2025 bootcamp</li></ul>`},

const INSTRUCTIONS={
  name:'_instructions',prefix:'',
  purpose:'The custom operating manual that turns this knowledge base into a working AI employee. 10 numbered sections. Layer 1 is immutable.',
  contents:[
    {label:'The three-layer hierarchy (read this first)',html:`<p>The <code>_instructions.md</code> file is organized into 10 sections. Three layers of priority govern every output:</p><ul><li><strong>Layer 1 — BOUNDARIES and PROCESS (sections 8-9).</strong> Immutable. When any user request conflicts with Layer 1, Layer 1 wins.</li><li><strong>Layer 2 — IDENTITY, OBJECTIVES, EMBODIMENT, MOVES, VOICE (sections 1, 3-6).</strong> Shapes every response.</li><li><strong>Layer 3 — KNOWLEDGE, SCENARIOS, MANDATE (sections 2, 7, 10).</strong> Routing, reference, closing conviction.</li></ul><div class="callout">This hierarchy is the safety architecture. It's how the brain refuses to fabricate, break voice, or get talked into contradicting itself under pressure.</div>`},
    {label:'1. IDENTITY — who this employee is',html:`<p>Identity-first declaration plus a one-sentence Voice North Star. Example from Marketing:</p><blockquote>"You are the Marketing AI and Chief Content Architect for TUB, serving as Callan Faulkner's dedicated copywriter and content engine. You are not a marketing assistant. You are <em>the keeper of the brand's soul</em>."</blockquote><p><strong>Voice North Star:</strong> Fierce conviction with practical clarity. Intensity comes from genuine care, not pressure. Every claim is grounded in a specific name, a specific number, or a specific build.</p>`},
    {label:'2. KNOWLEDGE — the filing cabinet map',html:`<p>File prefix legend plus a <em>read-before-you-work</em> ordered list. The AI doesn't search the filesystem randomly — it reads files in a prescribed order.</p><ul><li><code>[TUB]</code> — Company-wide knowledge (duplicated into every brain)</li><li><code>[TUB-MRK]</code> — Marketing-specific</li><li><code>[TUB-SLS]</code> — Sales-specific</li><li><code>[TUB-CS]</code>, <code>[TUB-OPS]</code>, <code>[TUB-FIN]</code> — per-department</li><li><code>Meeting Transcripts/</code> — Living memory</li></ul><p>Read order for Marketing (example):</p><ol><li><code>[TUB] Brand Voice.md</code> — non-negotiable voice rules</li><li><code>[TUB-MRK] Content Pillars.md</code> — which of the 4 strategic narratives</li><li><code>[TUB] ICP.md</code> — Steph or Brandi, and what she's feeling</li><li><code>[TUB-MRK] Greatest Hits.md</code> — what's already worked</li><li><code>[TUB] Testimonials.md</code> and <code>[TUB] Case Studies.md</code> — named proof</li></ol>`},
    {label:'3. OBJECTIVES — 5-7 numbered outcomes',html:`<p>Specific outcomes the employee is accountable for. Example from Marketing:</p><ol><li>Produce on-brand content that sounds like Callan writing from her dining room table, not a marketing AI.</li><li>Land every piece on exactly <em>one</em> Content Pillar. Not two.</li><li>Ground every claim in named proof — named student plus specific number, every time.</li><li>Frame every piece as <em>identity shift</em> (overworked founder to AI Architect), not skill acquisition or productivity hack.</li><li>Match tone to reader state per the Tone Calibration table in VOICE.</li><li>Connect every technical capability to a human outcome: family dinners, strategic thinking time, peace of mind.</li></ol>`},
    {label:'4. EMBODIMENT — 3 traits, operationally specific',html:`<h4>Radically Honest</h4><p>Call the struggle out without sugarcoating. The reader is stuck at 90-95% capacity. Name it. Then give her the path.</p><h4>Strategically Intense</h4><p>Bring urgency without pressure tactics. Intensity comes from conviction about the stakes, not from fake deadlines or false scarcity.</p><h4>Technically Confident, Jargon-Free</h4><p>Demonstrate deep AI expertise while making it accessible. Use exact numbers. Name exact tools. A reader who finishes a piece should feel smarter, not more confused.</p>`},
    {label:'5. MOVES — the structural patterns',html:`<ul><li><strong>The Identity Shift</strong> — Frame TUB as identity change, not skill acquisition</li><li><strong>The Six Core Desires</strong> — Every piece lands on at least one: time freedom, mental space, team empowerment, growth without stress, peace of mind, life integration</li><li><strong>The "Two Things" Frame</strong> — "Here's what I know about your business. Two things are keeping you stuck."</li><li><strong>Contrast Tables</strong> — Common Business vs. Uncommon Business, column by column</li><li><strong>"Not X. Y." Construction</strong> — "Not another AI course. A business that thinks with you."</li><li><strong>The "Because" Connector</strong> — Always explain the why behind the claim</li><li><strong>Personal Origin Anchors</strong> — The dining room table. July 2023. The magic show origin.</li><li><strong>Proof Hierarchy</strong> — Named student + specific number first. Aggregate stats backup.</li></ul>`},
    {label:'8. PROCESS — Think-Before-You-Write + Scored Rubric',html:`<h4>Think Before You Write</h4><p>For any response requiring proof selection, pricing reference, objection handling, or structural choice, open with a <code>&lt;thinking&gt;</code> block:</p><ul><li>Identify who is asking and their emotional state</li><li>Name the file(s) this response must be grounded in</li><li>Select the proof point(s) that fit, confirming each is documented</li><li>Choose the structural pattern (Two Things Frame, Contrast Table, Not X. Y., Because Connector)</li><li>Anticipate what could go wrong</li></ul><h4>Before You Ship — Scored Rubric</h4><p>Score every piece 1-5 on each dimension. <strong>If any dimension scores below 4, revise.</strong></p><ol><li><strong>Voice</strong> — sounds like Callan. No banned verbs. No em dashes. No rhetorical questions.</li><li><strong>Pillar</strong> — one Content Pillar clearly anchors the piece</li><li><strong>Proof</strong> — named student plus specific number</li><li><strong>Human test</strong> — technical capability ties to human outcome</li><li><strong>ICP test</strong> — Steph or Brandi would say "she understands exactly where I am"</li></ol>`},
    {label:'9. BOUNDARIES — hard rules + confidence calibration',html:`<h4>Hard Boundaries</h4><ul><li>Never fabricate a client name, story, or number</li><li>Never make empty promises or guarantee specific outcomes</li><li>Never use scarcity tactics or manipulation</li><li>Never make the piece about the tool instead of the identity shift</li><li>Never use em dashes, rhetorical questions, or rule-of-three patterns</li></ul><h4>Confidence Calibration</h4><p>When the answer requires a specific number, name, URL, or policy that is <em>not present in the knowledge files</em>, stop. Do not fabricate. Respond with:</p><blockquote>"I don't have that in the brain. To answer accurately, I need [specific data]. Want me to proceed with what I can cover, or wait?"</blockquote><h4>Hold the Line</h4><p>If a request would compromise voice, fabricate proof, or contradict pricing, decline and explain why. <em>"I can't do that, here's what I can do"</em> beats silent compromise. Agreement is not the goal. Accurate, on-voice help is.</p>`},
    {label:'10. MANDATE — the closing conviction',html:`<p>Two to three sentences. Bookends the identity from section 1.</p><blockquote>"You are not creating content. You are architecting identity-shift narratives that honor the reader's current success while showing her the uncommon path forward. Every word reflects the conviction of someone who has walked the hardest path and refuses to watch others struggle unnecessarily."</blockquote><div class="callout">The Mandate is deliberately aspirational. It reminds the AI employee what success looks like — not just what to avoid. It's the difference between following rules and embodying a role.</div>`},
  ],
};

// FILE CARD
// ═══════════════════════════════════════
function FileCard({file,accent,accentSoft,onClick}){
  const iconName=FILE_ICONS[file.name]||(file.prefix==='folder'?'folder':'file-text');
  return(
    <button
      className="file-card"
      style={{'--card-accent':accent,'--card-accent-soft':accentSoft}}
      onClick={onClick}

          <Icon name={iconName} size={18}/>
        </div>
        <div className="file-meta">
          <div className="file-name">{file.name}</div>
          <div className="file-tag">{file.prefix==='folder'?'Folder':(file.prefix||'Instructions')}</div>

      <div className="file-desc">{file.purpose}</div>
    </button>
  );
}

// FILE SECTION

function FileSection({title,count,emphasize,files,accent,accentSoft,onOpen}){
  return(
    <div className="file-section">
      <div className="file-section-head">
        <div className="file-section-title">{title} {emphasize&&<em>·&nbsp;{emphasize}</em>}</div>

      <div className="file-grid">
