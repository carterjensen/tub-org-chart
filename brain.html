// ═══════════════════════════════════════
// CONTENT ITEM (toggle)
// ═══════════════════════════════════════
function ContentItem({item,isOpen,onToggle}){
  const iconName=item.icon||inferIcon(item.label);
  return(
    <div className={`content-item ${isOpen?'open':''}`}>
      <div className="content-header" onClick={onToggle}>
        <span className="content-icon"><Icon name={iconName} size={17}/></span>
        <span className="content-label">{item.label}</span>
        <span className="chev"/>
      </div>
      <div className="content-detail" dangerouslySetInnerHTML={{__html:item.html}}/>
    </div>
  );
}

// ═══════════════════════════════════════
// DRAWER
// ═══════════════════════════════════════
function Drawer({file,accent,accentSoft,dept,onClose}){
  const[openIdx,setOpenIdx]=useState(new Set());
  useEffect(()=>{
    function onKey(e){if(e.key==='Escape')onClose()}
    window.addEventListener('keydown',onKey);
    return()=>window.removeEventListener('keydown',onKey);
  },[onClose]);
  useEffect(()=>{setOpenIdx(new Set())},[file]);

  const isOpen=!!file;
  const fullFileName=file?(file.prefix==='folder'?`${file.name}/`:`${file.prefix?file.prefix+' ':''}${file.name}${file.prefix==='folder'?'':'.md'}`):'';
  const tagLabel=file?(file.prefix==='folder'?'Folder · Transcripts':(file.prefix?(file.prefix==='[TUB]'?'Company-wide Knowledge':`${dept} Knowledge`):'Custom Instructions')):'';

  function toggle(i){
    setOpenIdx(prev=>{
      const next=new Set(prev);
      if(next.has(i))next.delete(i);else next.add(i);
      return next;
    });
  }

  return(
    <>
      <div className={`drawer-overlay ${isOpen?'open':''}`} onClick={onClose}/>
      <aside className={`drawer ${isOpen?'open':''}`} style={{'--drawer-accent':accent,'--drawer-accent-soft':accentSoft}}>
        <button className="drawer-close" onClick={onClose} aria-label="Close">×</button>
        {file&&(
          <div className="drawer-inner">
            <div className="drawer-tag">
              <span className="drawer-tag-dot"/>
              {tagLabel}
            </div>
            <div className="drawer-file">{fullFileName}</div>
            <h2 className="drawer-title">{file.name}</h2>
            <div className="drawer-purpose">{file.purpose}</div>
            <div className="drawer-section">
              <div className="drawer-section-title">
                What's inside · click any to open
                <span className="bar"/>
              </div>
              <div className="drawer-contents">
                {file.contents.map((item,i)=>(
                  <ContentItem key={i} item={item} isOpen={openIdx.has(i)} onToggle={()=>toggle(i)}/>
                ))}
              </div>
            </div>
            <div className="drawer-note">
              This is a preview of the file's contents. The actual file lives inside the Cowork project — edited, versioned, and read every time an AI employee runs. What you see here is pulled directly from the source markdown.
            </div>
          </div>
        )}
      </aside>
    </>
  );
}

// ═══════════════════════════════════════
// EXPLORER
// ═══════════════════════════════════════
function Explorer(){
  const[activeId,setActiveId]=useState('marketing');
  const[openFile,setOpenFile]=useState(null);
  const dept=DEPARTMENTS.find(d=>d.id===activeId);

  // Split company-wide files into "powers this workspace" vs "supporting"
  const powersCompanyFiles=COMMON_FILES.filter(f=>dept.powersCompany.includes(f.name));
  const supportingCompanyFiles=COMMON_FILES.filter(f=>!dept.powersCompany.includes(f.name));

  const powersGroup=[INSTRUCTIONS,...dept.specific,...powersCompanyFiles];
  const supportingGroup=[...supportingCompanyFiles,MEETING_TRANSCRIPTS];

  function handleOpen(file){setOpenFile(file)}
  function handleClose(){setOpenFile(null)}

  return(
    <section className="explorer">
      <div className="explorer-head">
        <div>
          <div className="eyebrow">
            <span className="eyebrow-bar"/>
            The five department workspaces
          </div>
          <h2 className="explorer-title">
            Each workspace is built from the files that <em>power it</em> — plus the broader business files it can reference. Pick a department.
          </h2>
        </div>
        <div className="explorer-meta">
          5 workspaces<br/>
          Core + supporting split<br/>
          Click any card
        </div>
      </div>

      <div className="tabs">
        {DEPARTMENTS.map(d=>(
          <button key={d.id} className={`tab ${activeId===d.id?'active':''}`} style={{'--tab-accent':d.accent}} onClick={()=>{setActiveId(d.id);setOpenFile(null)}}>
            <span className="tab-dot"/>
            {d.name}
          </button>
        ))}
      </div>

      <div className="dept-intro" style={{'--dept-accent':dept.accent}}>
        <div className="dept-intro-left">
          <h2>The <em>{dept.name}</em> Workspace</h2>
          <div className="dept-desc">{dept.description}</div>
        </div>
        <div className="dept-intro-right">
          <div><span className="accent">{powersGroup.length}</span> files power this workspace</div>
          <div><span className="accent">{supportingGroup.length}</span> supporting files available</div>
          <div>Meeting transcripts included</div>
        </div>
      </div>

      <FileSection
        title="What Powers this Workspace"
        emphasize="the files it actually runs on"
        count={powersGroup.length}
        files={powersGroup}
        accent={dept.accent}
        accentSoft={dept.accentSoft}
        onOpen={handleOpen}
      />

      <FileSection
        title="Supporting Business Files"
        emphasize="available context, not core"
        count={supportingGroup.length}
        files={supportingGroup}
        accent={dept.accent}
        accentSoft={dept.accentSoft}
        onOpen={handleOpen}
      />

      <Drawer file={openFile} accent={dept.accent} accentSoft={dept.accentSoft} dept={dept.name} onClose={handleClose}/>
    </section>
  );
}
