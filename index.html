<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="data.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;1,14..32,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,sans-serif;background:#F7F7F5;color:#1a1a1a;overflow:hidden;height:100vh;width:100vw;-webkit-font-smoothing:antialiased}
#root{height:100vh;width:100vw}

.canvas-viewport{width:100%;height:100%;overflow:hidden;cursor:grab;position:relative;touch-action:none}
.canvas-viewport:active{cursor:grabbing}
.canvas-world{transform-origin:0 0;will-change:transform;position:absolute;top:0;left:0;padding:120px 200px 300px;min-width:max-content}

/* TREE */
.tree-node{display:flex;flex-direction:column;align-items:center;position:relative}
.tree-children{display:flex;justify-content:center;gap:24px;position:relative;padding-top:48px}
.tree-children::before{content:'';position:absolute;top:0;left:50%;width:1px;height:24px;background:#D4D4D0;transform:translateX(-50%)}
.tree-children.multi::after{content:'';position:absolute;top:24px;height:1px;background:#D4D4D0;left:var(--bar-l,50%);right:var(--bar-r,50%)}
.tree-children>.tree-node::before{content:'';position:absolute;top:-24px;left:50%;width:1px;height:24px;background:#D4D4D0;transform:translateX(-50%)}

/* CARD */
.node-card{background:#FFF;border-radius:16px;box-shadow:0 1px 2px rgba(0,0,0,.04),0 4px 16px rgba(0,0,0,.05);cursor:pointer;transition:box-shadow .25s,transform .25s;user-select:none;border:1px solid rgba(0,0,0,.04);width:260px;overflow:hidden;flex-shrink:0}
.node-card:hover{box-shadow:0 2px 4px rgba(0,0,0,.06),0 8px 32px rgba(0,0,0,.08);transform:translateY(-1px)}
.node-card.is-active{box-shadow:0 2px 4px rgba(0,0,0,.06),0 12px 40px rgba(0,0,0,.1);border-color:rgba(47,91,74,.15);width:420px}
.node-card.is-founder{width:300px}
.node-card.is-founder.is-active{width:440px}
.node-inner{padding:20px}
.card-header-row{display:flex;align-items:center;gap:14px}

.avatar-ring{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Instrument Serif',Georgia,serif;font-size:18px;flex-shrink:0;background:#F7F7F5;color:#2F5B4A;border:2px solid #E8E8E4;transition:all .2s;overflow:hidden}
.node-card:hover .avatar-ring{border-color:#D1B25A;background:rgba(209,178,90,.06)}
.avatar-ring.founder{background:linear-gradient(135deg,#2F5B4A,#3d7a63);color:#fff;border:2px solid #2F5B4A;font-size:16px}
.node-card:hover .avatar-ring.founder{border-color:#D1B25A}
.avatar-ring img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.avatar-ring.has-img{background:transparent;border-color:#E8E8E4}
.node-card:hover .avatar-ring.has-img{border-color:#D1B25A}

.meta-block{flex:1;min-width:0}
.person-name{font-size:16px;font-weight:600;color:#1a1a1a;letter-spacing:-.2px;line-height:1.2}
.person-title{font-size:12px;color:#888;margin-top:2px}
.reports-to{font-size:10px;color:#8B7024;margin-top:3px;font-style:italic;display:flex;align-items:center;gap:4px}
.reports-to::before{content:'';width:12px;height:1px;background:#D1B25A;border-top:1px dashed #D1B25A;display:inline-block}

.pills-row{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap}
.pill{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:100px;font-size:11px;font-weight:600;transition:background .15s;cursor:pointer}
.pill-team{background:#F0F0ED;color:#555}
.pill-team:hover{background:#E8E8E4}
.pill-ai{background:rgba(209,178,90,.1);color:#8B7024}
.pill-ai:hover{background:rgba(209,178,90,.18)}
.pill-dot{width:6px;height:6px;border-radius:50%;background:#D1B25A}
.pill-chevron{font-size:9px;transition:transform .25s;margin-left:2px;opacity:.5}
.ai-open .pill-chevron.ai-chev{transform:rotate(180deg)}
.org-open .pill-chevron.org-chev{transform:rotate(180deg)}

/* AI PANEL */
.ai-panel{padding:0 16px 16px;border-top:1px solid #F0F0ED;margin-top:16px;padding-top:14px}
.ai-panel-header{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#B8A04A;margin-bottom:10px}
.ai-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}

.skill-card{background:#FAFAF8;border:1px solid rgba(0,0,0,.05);border-radius:10px;padding:10px 11px;transition:all .2s;cursor:default;position:relative;overflow:hidden}
.skill-card:hover{border-color:rgba(0,0,0,.1);box-shadow:0 2px 8px rgba(0,0,0,.04);transform:translateY(-1px)}
.skill-card-top{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.skill-icon-wrap{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.skill-name{font-size:11.5px;font-weight:600;line-height:1.2;letter-spacing:-.1px;flex:1;min-width:0}
.skill-desc{font-size:10px;color:#999;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.skill-card-footer{display:flex;align-items:center;justify-content:flex-end;margin-top:6px}

/* Category colors */
.skill-card.s-voice{border-left:2px solid #C05746}.skill-card.s-voice .skill-icon-wrap{background:rgba(192,87,70,.08);color:#C05746}.skill-card.s-voice .skill-name{color:#A04030}
.skill-card.s-strategy{border-left:2px solid #7B5EA7}.skill-card.s-strategy .skill-icon-wrap{background:rgba(123,94,167,.08);color:#7B5EA7}.skill-card.s-strategy .skill-name{color:#6B4E97}
.skill-card.s-research{border-left:2px solid #3A7CA5}.skill-card.s-research .skill-icon-wrap{background:rgba(58,124,165,.08);color:#3A7CA5}.skill-card.s-research .skill-name{color:#2A6C95}
.skill-card.s-creative{border-left:2px solid #C26688}.skill-card.s-creative .skill-icon-wrap{background:rgba(194,102,136,.08);color:#C26688}.skill-card.s-creative .skill-name{color:#A85070}
.skill-card.s-ops{border-left:2px solid #2A8F82}.skill-card.s-ops .skill-icon-wrap{background:rgba(42,143,130,.08);color:#2A8F82}.skill-card.s-ops .skill-name{color:#1A7F72}
.skill-card.s-product{border-left:2px solid #B8860B}.skill-card.s-product .skill-icon-wrap{background:rgba(184,134,11,.08);color:#B8860B}.skill-card.s-product .skill-name{color:#9A7000}
.skill-card.s-curriculum{border-left:2px solid #4A8C5C}.skill-card.s-curriculum .skill-icon-wrap{background:rgba(74,140,92,.08);color:#4A8C5C}.skill-card.s-curriculum .skill-name{color:#3A7C4C}
.skill-card.s-sales{border-left:2px solid #D47B2E}.skill-card.s-sales .skill-icon-wrap{background:rgba(212,123,46,.08);color:#D47B2E}.skill-card.s-sales .skill-name{color:#B46520}
.skill-card.s-engineering{border-left:2px solid #4A6FA5}.skill-card.s-engineering .skill-icon-wrap{background:rgba(74,111,165,.08);color:#4A6FA5}.skill-card.s-engineering .skill-name{color:#3A5F95}
.skill-card.s-analytics{border-left:2px solid #5B7E95}.skill-card.s-analytics .skill-icon-wrap{background:rgba(91,126,149,.08);color:#5B7E95}.skill-card.s-analytics .skill-name{color:#4B6E85}
.skill-card.s-finance{border-left:2px solid #3D8B6E}.skill-card.s-finance .skill-icon-wrap{background:rgba(61,139,110,.08);color:#3D8B6E}.skill-card.s-finance .skill-name{color:#2D7B5E}
.skill-card.s-hr{border-left:2px solid #8B6BAE}.skill-card.s-hr .skill-icon-wrap{background:rgba(139,107,174,.08);color:#8B6BAE}.skill-card.s-hr .skill-name{color:#7B5B9E}

.more-row{display:flex;align-items:center;gap:8px;padding:10px 12px;font-size:13px;font-weight:500;color:#aaa;font-style:italic}
.more-dots-wrap{display:flex;gap:3px}
.more-dots-wrap span{width:4px;height:4px;border-radius:50%;background:#ccc}

/* STATUS DOTS */
.status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.status-dot.s-built{background:#4A8C5C;box-shadow:0 0 0 0 rgba(74,140,92,.4);animation:breathe 3s ease-in-out infinite}
.status-dot.s-rebuild{background:#D1B25A;box-shadow:0 0 0 0 rgba(209,178,90,.4);animation:spinRing 2.5s linear infinite}
.status-dot.s-new{background:#C05746;animation:pulse 2s ease-in-out infinite}
@keyframes breathe{0%,100%{box-shadow:0 0 0 0 rgba(74,140,92,.3)}50%{box-shadow:0 0 0 4px rgba(74,140,92,0)}}
@keyframes spinRing{0%{box-shadow:2px 0 0 0 rgba(209,178,90,.5)}25%{box-shadow:0 2px 0 0 rgba(209,178,90,.5)}50%{box-shadow:-2px 0 0 0 rgba(209,178,90,.5)}75%{box-shadow:0 -2px 0 0 rgba(209,178,90,.5)}100%{box-shadow:2px 0 0 0 rgba(209,178,90,.5)}}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.85}50%{transform:scale(1.3);opacity:1}}

/* ACTIVATION BADGES */
.activation-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;font-size:9px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;flex-shrink:0;margin-left:auto;white-space:nowrap}
.activation-badge.a-schedule{background:rgba(58,124,165,.08);color:#3A7CA5}
.activation-badge.a-trigger{background:rgba(184,134,11,.08);color:#9A7000}
.activation-badge.a-demand{background:rgba(42,143,130,.08);color:#1A7F72}
.activation-badge svg{width:12px;height:12px}
.act-icon-schedule{animation:slowSpin 4s linear infinite}
.act-icon-trigger{animation:zapPulse 2s ease-in-out infinite}
.act-icon-demand{transition:transform .2s}
.activation-badge:hover .act-icon-demand{transform:translateY(-1px)}
@keyframes slowSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes zapPulse{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:1;transform:scale(1.15)}}

/* LUCIDE ICON IN SKILL ROW */
.skill-icon-wrap svg{width:18px;height:18px;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;fill:none}
.skill-row:hover .skill-icon-wrap svg{transform:scale(1.1);transition:transform .2s}

/* CARD SHINE EFFECT */
.node-card::after{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);transition:none;pointer-events:none;z-index:1}
.node-card:hover::after{left:120%;transition:left .6s ease}

/* TOP BAR */
.top-bar{position:fixed;top:0;left:0;right:0;height:56px;background:rgba(255,255,255,.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,0,0,.05);display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:100}
.top-bar-left{display:flex;align-items:center;gap:14px}
.top-bar-logo{font-family:'Instrument Serif',Georgia,serif;font-size:18px;color:#2F5B4A;letter-spacing:-.3px}
.top-bar-logo em{color:#D1B25A;font-style:italic}
.top-bar-divider{width:1px;height:20px;background:#E0E0DC}
.top-bar-subtitle{font-size:12px;color:#999}
.nav-tabs{display:flex;gap:2px;background:rgba(0,0,0,.04);border-radius:8px;padding:3px}
.nav-tab{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:500;color:#999;cursor:pointer;transition:all .2s;border:none;background:transparent;font-family:inherit;text-decoration:none}
.nav-tab:hover{color:#555}
.nav-tab.active{background:#fff;color:#1a1a1a;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.top-bar-right{display:flex;align-items:center;gap:16px}
.stat-chip{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:500;color:#666}
.stat-chip .num{font-weight:700;color:#1a1a1a}
.stat-chip .num.gold{color:#B8960B}
.stat-chip-dot{width:6px;height:6px;border-radius:50%}
.stat-chip-dot.green{background:#2F5B4A}
.stat-chip-dot.amber{background:#D1B25A}
.top-sep{width:1px;height:18px;background:#E8E8E4}
.tb-btn{padding:6px 12px;border-radius:8px;border:1px solid #E0E0DC;background:#fff;font-size:11px;font-weight:500;color:#555;cursor:pointer;transition:all .15s;font-family:inherit}
.tb-btn:hover{border-color:#ccc;color:#1a1a1a;box-shadow:0 1px 4px rgba(0,0,0,.06)}

/* ZOOM */
.zoom-controls{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:1px;background:rgba(255,255,255,.88);backdrop-filter:blur(20px);border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.08),0 0 0 1px rgba(0,0,0,.04);z-index:100;overflow:hidden}
.zoom-btn{width:40px;height:40px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;cursor:pointer;font-size:16px;color:#555;transition:background .15s;font-family:inherit}
.zoom-btn:hover{background:rgba(0,0,0,.04);color:#1a1a1a}
.zoom-divider{height:1px;background:rgba(0,0,0,.06);margin:0 8px}
.zoom-level{font-size:9px;font-weight:600;color:#999;text-align:center;padding:3px 0;letter-spacing:.5px}

.canvas-hint{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);font-size:11px;color:#aaa;background:rgba(255,255,255,.88);backdrop-filter:blur(16px);padding:7px 18px;border-radius:100px;box-shadow:0 1px 4px rgba(0,0,0,.06),0 0 0 1px rgba(0,0,0,.03);z-index:90;font-weight:500;pointer-events:none;transition:opacity .5s}
.hint-mobile{display:none}
@media(hover:none) and (pointer:coarse){
  .hint-desktop{display:none}
  .hint-mobile{display:inline}
  *{-webkit-tap-highlight-color:transparent}
}

/* HERO / INTRO PANEL */
.hero-panel{width:700px;margin:0 auto 60px;text-align:center;padding:0 20px}
.hero-panel h1{font-family:'Instrument Serif',Georgia,serif;font-size:44px;font-weight:400;color:#2F5B4A;line-height:1.1;letter-spacing:-.5px;margin-bottom:8px}
.hero-panel h1 em{color:#D1B25A;font-style:italic}
.hero-panel .hero-sub{font-size:15px;color:#666;line-height:1.6;margin-bottom:24px;max-width:560px;margin-left:auto;margin-right:auto}
.hero-stats{display:flex;justify-content:center;gap:32px;margin-bottom:24px}
.hero-stat{text-align:center}
.hero-stat-num{font-family:'Instrument Serif',Georgia,serif;font-size:36px;color:#2F5B4A}
.hero-stat-num.gold{color:#D1B25A}
.hero-stat-lbl{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:#999;margin-top:2px}
.hero-divider{width:60px;height:1px;background:#E0E0DC;margin:20px auto}
.hero-tagline{font-size:13px;color:#888;font-style:italic;line-height:1.5;max-width:480px;margin:0 auto 20px}
.hero-cta{font-size:12px;color:#aaa;font-weight:500}
.hero-cta span{color:#2F5B4A;font-weight:600}

/* ═══ SALES TEAM PANEL ═══ */
.sales-panel{padding:0 20px 16px;border-top:1px solid #F0F0ED;margin-top:14px;padding-top:14px}
.sales-panel-title{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#D47B2E;margin-bottom:8px}
.sales-reps-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.sales-rep-chip{display:flex;align-items:center;gap:5px;padding:4px 8px;border-radius:6px;background:rgba(47,91,74,.04);border:1px solid rgba(47,91,74,.08);font-size:10px;color:#4a6358;font-weight:500}
.sales-rep-avatar{width:20px;height:20px;border-radius:50%;background:rgba(47,91,74,.08);border:1px solid rgba(47,91,74,.12);display:flex;align-items:center;justify-content:center;font-size:8px;color:#2F5B4A;font-weight:600;font-family:'Instrument Serif',Georgia,serif}
.sales-shared-label{font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#B8A04A;margin-bottom:4px}
.sales-shared-note{font-size:10px;color:#aaa;font-style:italic;margin-bottom:8px}

/* ═══ MOBILE ═══ */
@media(max-width:768px){
  .top-bar{height:auto;flex-wrap:wrap;padding:10px 16px;gap:8px}
  .top-bar-left{width:100%;justify-content:space-between}
  .top-bar-right{width:100%;justify-content:center;gap:10px;padding-bottom:2px}
  .top-bar-divider{display:none}
  .stat-chip{font-size:11px}
  .top-sep{display:none}
  .tb-btn{font-size:10px;padding:5px 10px}
  .canvas-world{padding:130px 40px 200px}
  .hero-panel{width:auto;max-width:360px}
  .hero-panel h1{font-size:30px}
  .hero-stats{gap:20px}
  .hero-stat-num{font-size:28px}
  .hero-tagline{font-size:11px}
  .hero-cta{font-size:11px}
  .node-card{width:200px}
  .node-card.is-active{width:340px}
  .node-card.is-founder{width:230px}
  .ai-grid{grid-template-columns:1fr}
  .person-name{font-size:14px}
  .person-title{font-size:11px}
  .avatar-ring{width:40px;height:40px;font-size:15px}
  .pill{font-size:10px;padding:4px 9px}
  .skill-name{font-size:12px}
  .skill-desc{font-size:10px}
  .skill-icon-wrap{width:28px;height:28px;font-size:13px}
  .skill-row{padding:8px 10px;gap:10px}
  .tree-children{gap:14px}
  .zoom-controls{bottom:12px;right:12px}
  .canvas-hint{font-size:10px;padding:6px 14px;bottom:12px}
}
@media(max-width:400px){
  .canvas-world{padding:120px 20px 200px}
  .hero-panel h1{font-size:26px}
  .node-card{width:180px}
  .node-card.is-founder{width:210px}
  .nav-tabs{display:none}
}

@keyframes fadeInUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.tree-children>.tree-node{animation:fadeInUp .35s ease-out both}
.tree-children>.tree-node:nth-child(2){animation-delay:.05s}
.tree-children>.tree-node:nth-child(3){animation-delay:.1s}
.tree-children>.tree-node:nth-child(4){animation-delay:.15s}
.tree-children>.tree-node:nth-child(5){animation-delay:.2s}

/* ARCHIVE DROPDOWN */
.archive-dropdown{position:relative;display:inline-block}
.archive-btn{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:500;color:#999;cursor:pointer;transition:all .2s;border:none;background:transparent;font-family:inherit;display:flex;align-items:center;gap:4px}
.archive-btn:hover{color:#555}
.archive-menu{position:absolute;top:calc(100% + 6px);left:0;background:#fff;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.1),0 0 0 1px rgba(0,0,0,.06);padding:4px;min-width:148px;z-index:200}
.archive-item{display:block;padding:7px 12px;border-radius:5px;font-size:12px;font-weight:500;color:#666;text-decoration:none;transition:all .15s}
.archive-item:hover{background:rgba(0,0,0,.04);color:#1a1a1a}
.archive-chevron{font-size:9px;opacity:.5;transition:transform .2s;margin-left:2px}
.archive-open .archive-chevron{transform:rotate(180deg)}

/* LIVE BADGE */
.live-badge{display:flex;align-items:center;gap:7px;padding:5px 14px 5px 10px;border-radius:100px;background:rgba(220,38,38,.07);border:1px solid rgba(220,38,38,.16);color:#C41E1E;font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;text-decoration:none;animation:liveBadgeGlow 2.5s ease-in-out infinite}
.live-dot-wrap{position:relative;width:8px;height:8px;flex-shrink:0}
.live-dot{width:8px;height:8px;border-radius:50%;background:#DC2626;position:relative;z-index:1;animation:liveDotBreathe 1.5s ease-in-out infinite}
.live-dot::before{content:'';position:absolute;inset:-3px;border-radius:50%;background:rgba(220,38,38,.3);animation:liveDotRing 1.5s ease-out infinite}
@keyframes liveDotBreathe{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(.82);opacity:.7}}
@keyframes liveDotRing{0%{transform:scale(.8);opacity:.7}100%{transform:scale(2.6);opacity:0}}
@keyframes liveBadgeGlow{0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,.06)}50%{box-shadow:0 0 12px rgba(220,38,38,.18)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useCallback,useRef,useEffect}=React;

// Uses SHARED_ORG and TOTAL_HUMANS from data.js
const orgTree = SHARED_ORG;

// ═══ LUCIDE ICON REGISTRY ═══
const LUCIDE={
  voice:'M15.707 21.293a1 1 0 0 1-1.414 0l-1.586-1.586a1 1 0 0 1 0-1.414l5.586-5.586a1 1 0 0 1 1.414 0l1.586 1.586a1 1 0 0 1 0 1.414z||M18 13-1.375-6.874a1 1 0 0 0-.746-.776L3.235 2.028a1 1 0 0 0-1.207 1.207L5.35 15.879a1 1 0 0 0 .776.746L13 18||m2.3 2.3 7.286 7.286||C11,11,2',
  strategy:'M12 18V5||M15 13a4.17 4.17 0 0 1-3-4 4.17 4.17 0 0 1-3 4||M17.598 6.5A3 3 0 1 0 12 5a3 3 0 1 0-5.598 1.5||M17.997 5.125a4 4 0 0 1 2.526 5.77||M18 18a4 4 0 0 0 2-7.464||M19.967 17.483A4 4 0 1 1 12 18a4 4 0 1 1-7.967-.517||M6 18a4 4 0 0 1-2-7.464||M6.003 5.125a4 4 0 0 0-2.526 5.77',
  research:'m21 21-4.34-4.34||C11,11,8',
  creative:'M12 22a1 1 0 0 1 0-20 10 9 0 0 1 10 9 5 5 0 0 1-5 5h-2.25a1.75 1.75 0 0 0-1.4 2.8l.3.4a1.75 1.75 0 0 1-1.4 2.8z||C13.5,6.5,.5f||C17.5,10.5,.5f||C6.5,12.5,.5f||C8.5,7.5,.5f',
  ops:'M9.671 4.136a2.34 2.34 0 0 1 4.659 0 2.34 2.34 0 0 0 3.319 1.915 2.34 2.34 0 0 1 2.33 4.033 2.34 2.34 0 0 0 0 3.831 2.34 2.34 0 0 1-2.33 4.033 2.34 2.34 0 0 0-3.319 1.915 2.34 2.34 0 0 1-4.659 0 2.34 2.34 0 0 0-3.32-1.915 2.34 2.34 0 0 1-2.33-4.033 2.34 2.34 0 0 0 0-3.831A2.34 2.34 0 0 1 6.35 6.051a2.34 2.34 0 0 0 3.319-1.915||C12,12,3',
  product:'M12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83z||M2 12a1 1 0 0 0 .58.91l8.6 3.91a2 2 0 0 0 1.65 0l8.58-3.9A1 1 0 0 0 22 12||M2 17a1 1 0 0 0 .58.91l8.6 3.91a2 2 0 0 0 1.65 0l8.58-3.9A1 1 0 0 0 22 17',
  curriculum:'M21.42 10.922a1 1 0 0 0-.019-1.838L12.83 5.18a2 2 0 0 0-1.66 0L2.6 9.08a1 1 0 0 0 0 1.832l8.57 3.908a2 2 0 0 0 1.66 0z||M22 10v6||M6 12.5V16a6 3 0 0 0 12 0v-3.5',
  sales:'C12,12,10||C12,12,6||C12,12,2',
  engineering:'m16 18 6-6-6-6||m8 6-6 6 6 6',
  analytics:'M3 3v16a2 2 0 0 0 2 2h16||M18 17V9||M13 17V5||M8 17v-3',
  finance:'M19 7V4a1 1 0 0 0-1-1H5a2 2 0 0 0 0 4h15a1 1 0 0 1 1 1v4h-3a2 2 0 0 0 0 4h3a1 1 0 0 0 1-1v-2a1 1 0 0 0-1-1||M3 5v14a2 2 0 0 0 2 2h15a1 1 0 0 0 1-1v-4',
  hr:'M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2||M16 3.128a4 4 0 0 1 0 7.744||M22 21v-2a4 4 0 0 0-3-3.87||C9,7,4',
};
// Activation SVG icons
const ACT_SVG={
  schedule:'C12,12,10||M12 6v6l4 2',
  trigger:'M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z',
  demand:'M14 4.1 12 6||m5.1 8-2.9-.8||m6 12-1.9 2||M7.2 2.2 8 5.1||M9.037 9.69a.498.498 0 0 1 .653-.653l11 4.5a.5.5 0 0 1-.074.949l-4.349 1.041a1 1 0 0 0-.74.739l-1.04 4.35a.5.5 0 0 1-.95.074z',
};
function LucideIcon({paths,size=18,className=''}){
  if(!paths)return null;
  const els=paths.split('||').map((p,i)=>{
    p=p.trim();
    // Circle: C{cx},{cy},{r} optionally with 'f' for filled
    if(p.startsWith('C')){const m=p.match(/C([\d.]+),([\d.]+),([\d.]+)(f?)/);if(m)return React.createElement('circle',{key:i,cx:m[1],cy:m[2],r:m[3],fill:m[4]?'currentColor':'none'});return null;}
    return React.createElement('path',{key:i,d:p});
  });
  return React.createElement('svg',{width:size,height:size,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:2,strokeLinecap:'round',strokeLinejoin:'round',className},els);
}
function ActIcon({type}){
  const labels={demand:'On Demand',trigger:'Trigger',schedule:'Scheduled'};
  return React.createElement('span',{className:`activation-badge a-${type}`},
    React.createElement(LucideIcon,{paths:ACT_SVG[type],size:12,className:`act-icon-${type}`}),
    labels[type]
  );
}
function SkillRow({skill}){
  const catIcon=LUCIDE[skill.cat];
  return(<div className={`skill-card s-${skill.cat}`}>
    <div className="skill-card-top">
      <div className="skill-icon-wrap">{catIcon?<LucideIcon paths={catIcon} size={15}/>:skill.icon}</div>
      <div className="skill-name">{skill.name}</div>
    </div>
    <div className="skill-desc">{skill.desc}</div>
    {skill.activation&&<div className="skill-card-footer"><ActIcon type={skill.activation}/></div>}
  </div>);
}
function MoreRow({count}){
  return(<div className="more-row"><div className="more-dots-wrap"><span/><span/><span/></div>{count} more AI employees…</div>);
}

function SalesTeamPanel({node}) {
  const reps = (node.children || []);
  const sharedAI = node.salesTeamAI || [];
  return (
    <div className="sales-panel">
      <div className="sales-panel-title">Enrollment Team — {reps.length} Specialists</div>
      <div className="sales-reps-row">
        {reps.map(rep => (
          <div className="sales-rep-chip" key={rep.id}>
            <div className="sales-rep-avatar" style={rep.image?{background:'transparent',border:'none',overflow:'hidden'}:{}}>
              {rep.image ? <img src={rep.image} alt={rep.name} style={{width:'100%',height:'100%',objectFit:'cover',borderRadius:'50%'}}/> : rep.initials}
            </div>
            {rep.name}
          </div>
        ))}
      </div>
      <div className="sales-shared-label">Shared AI Employees — Every Specialist Gets Access</div>
      <div className="sales-shared-note">Each enrollment specialist has the same AI team working alongside them</div>
      <div className="ai-grid">
      {sharedAI.map(ai => <SkillRow key={ai.name} skill={ai} />)}
      </div>
      {node.salesTeamMoreCount > 0 && <MoreRow count={node.salesTeamMoreCount} />}
    </div>
  );
}

function PersonNode({node,orgOpen,aiOpen,toggleOrg,toggleAI}){
  const isSalesTeam = node.salesTeam;
  const realChildren = isSalesTeam ? [] : (node.children || []);
  const hasChildren = realChildren.length > 0 || isSalesTeam;
  const isOrgOpen = orgOpen.has(node.id);
  const isAIOpen = aiOpen.has(node.id);
  const aiCount = (node.aiEmployees||[]).length + (node.moreCount||0) + (isSalesTeam ? (node.salesTeamAI||[]).length + (node.salesTeamMoreCount||0) : 0);
  const totalReports = (function c(n){let t=0;(n.children||[]).forEach(ch=>{t+=1+c(ch)});return t})(node);

  const handleClick=(e)=>{
    if(e.target.closest('.pill-ai')){e.stopPropagation();toggleAI(node.id);return}
    if(e.target.closest('.pill-team')){e.stopPropagation();toggleOrg(node.id);return}
    if(hasChildren) toggleOrg(node.id);
    else if(aiCount>0) toggleAI(node.id);
  };

  return(
    <div className="tree-node">
      <div className={`node-card ${(isOrgOpen||isAIOpen)?'is-active':''} ${node.isFounder?'is-founder':''} ${isAIOpen?'ai-open':''} ${isOrgOpen?'org-open':''}`} onClick={handleClick}>
        <div className="node-inner">
          <div className="card-header-row">
            <div className={`avatar-ring ${node.isFounder?'founder':''} ${node.image?'has-img':''}`}>
              {node.image ? <img src={node.image} alt={node.name}/> : node.initials}
            </div>
            <div className="meta-block">
              <div className="person-name">{node.name}</div>
              <div className="person-title">{node.title}</div>
              {node.reportsTo && <div className="reports-to">Reports to {node.reportsTo.name}</div>}
            </div>
          </div>
          <div className="pills-row">
            {totalReports>0&&(
              <span className="pill pill-team" onClick={e=>{e.stopPropagation();toggleOrg(node.id)}}>
                {totalReports} report{totalReports!==1?'s':''}
                <span className="pill-chevron org-chev">{isOrgOpen?'▲':'▼'}</span>
              </span>
            )}
            {aiCount>0&&(
              <span className="pill pill-ai">
                <span className="pill-dot"/>
                {aiCount} AI Employees
                <span className="pill-chevron ai-chev">{isAIOpen?'▲':'▼'}</span>
              </span>
            )}
          </div>
        </div>
        {isAIOpen&&(
          <div className="ai-panel">
            {node.aiEmployees&&node.aiEmployees.length>0&&(
              <><div className="ai-panel-header">{node.name}'s AI Employees</div>
              <div className="ai-grid">
              {node.aiEmployees.map(ai=><SkillRow key={ai.name} skill={ai}/>)}
              </div>
              {node.moreCount>0&&<MoreRow count={node.moreCount}/>}</>
            )}
          </div>
        )}
        {isOrgOpen&&isSalesTeam&&(
          <SalesTeamPanel node={node} />
        )}
      </div>
      {isOrgOpen&&realChildren.length>0&&(
        <div className={`tree-children ${realChildren.length>1?'multi':''}`}>
          {realChildren.map(child=>(
            <PersonNode key={child.id} node={child} orgOpen={orgOpen} aiOpen={aiOpen} toggleOrg={toggleOrg} toggleAI={toggleAI}/>
          ))}
        </div>
      )}
    </div>
  );
}

function recalcBars(){
  document.querySelectorAll('.tree-children.multi').forEach(bar=>{
    const ch=bar.querySelectorAll(':scope>.tree-node');
    if(ch.length<2)return;
    const pr=bar.getBoundingClientRect();
    const fl=ch[0].getBoundingClientRect();
    const ll=ch[ch.length-1].getBoundingClientRect();
    bar.style.setProperty('--bar-l',(fl.left+fl.width/2-pr.left)+'px');
    bar.style.setProperty('--bar-r',(pr.width-(ll.left+ll.width/2-pr.left))+'px');
  });
}
function useHorizontalBars(orgOpen,aiOpen){
  useEffect(()=>{
    requestAnimationFrame(recalcBars);
    // Recalc after images load (they shift card widths)
    const imgs=document.querySelectorAll('.avatar-ring img');
    const onLoad=()=>requestAnimationFrame(recalcBars);
    imgs.forEach(img=>{if(!img.complete)img.addEventListener('load',onLoad)});
    // Also recalc after a short delay as a safety net
    const t=setTimeout(()=>requestAnimationFrame(recalcBars),500);
    return()=>{clearTimeout(t);imgs.forEach(img=>img.removeEventListener('load',onLoad))};
  },[orgOpen,aiOpen]);
}

// ═══ ARCHIVE DROPDOWN ═══
function ArchiveDropdown({archiveOpen,setArchiveOpen}){
  const ref=useRef(null);
  useEffect(()=>{
    if(!archiveOpen)return;
    function handle(e){if(ref.current&&!ref.current.contains(e.target))setArchiveOpen(false)}
    document.addEventListener('mousedown',handle);
    return()=>document.removeEventListener('mousedown',handle);
  },[archiveOpen,setArchiveOpen]);
  return(
    <div className={`archive-dropdown${archiveOpen?' archive-open':''}`} ref={ref}>
      <button className="archive-btn" onClick={()=>setArchiveOpen(!archiveOpen)}>
        Archive <span className="archive-chevron">▾</span>
      </button>
      {archiveOpen&&(
        <div className="archive-menu">
          <a className="archive-item" href="ecosystem.html?v=grid">By Manager</a>
          <a className="archive-item" href="ecosystem.html?v=flow">Data Flow</a>
        </div>
      )}
    </div>
  );
}

function App(){
  const[orgOpen,setOrgOpen]=useState(new Set());
  const[aiOpen,setAIOpen]=useState(new Set());
  const[archiveOpen,setArchiveOpen]=useState(false);
  const[transform,setTransform]=useState({x:0,y:0,scale:1});
  const[isPanning,setIsPanning]=useState(false);
  const[panStart,setPanStart]=useState({x:0,y:0});
  const[showHint,setShowHint]=useState(true);
  const vpRef=useRef(null);

  useHorizontalBars(orgOpen,aiOpen);

  useEffect(()=>{
    const vp=vpRef.current;
    if(!vp)return;
    setTransform({x:vp.clientWidth/2-350,y:20,scale:1});
    const t=setTimeout(()=>setShowHint(false),4000);
    return()=>clearTimeout(t);
  },[]);

  const toggleOrg=useCallback(id=>{
    setOrgOpen(prev=>{
      const next=new Set(prev);
      if(next.has(id)){
        const rm=n=>{next.delete(n.id);(n.children||[]).forEach(rm)};
        const find=n=>{if(n.id===id)return n;for(const c of(n.children||[])){const f=find(c);if(f)return f}return null};
        const t=find(orgTree);if(t)rm(t);
      }else next.add(id);
      return next;
    });
  },[]);

  const toggleAI=useCallback(id=>{
    setAIOpen(prev=>{const next=new Set(prev);if(next.has(id))next.delete(id);else next.add(id);return next});
  },[]);

  const expandAllOrg=useCallback(()=>{
    const all=new Set();
    const walk=n=>{if(n.children&&n.children.length>0){all.add(n.id);n.children.forEach(walk)}};
    walk(orgTree);setOrgOpen(all);
  },[]);

  const collapseAll=useCallback(()=>{setOrgOpen(new Set());setAIOpen(new Set())},[]);

  const onPointerDown=e=>{
    if(e.target.closest('.node-card')||e.target.closest('.zoom-controls')||e.target.closest('.top-bar'))return;
    setIsPanning(true);setPanStart({x:e.clientX-transform.x,y:e.clientY-transform.y});setShowHint(false);
  };
  const onPointerMove=e=>{if(!isPanning)return;setTransform(p=>({...p,x:e.clientX-panStart.x,y:e.clientY-panStart.y}))};
  const onPointerUp=()=>setIsPanning(false);

  const onWheel=useCallback(e=>{
    e.preventDefault();
    const vp=vpRef.current;if(!vp)return;
    const rect=vp.getBoundingClientRect();
    const mx=e.clientX-rect.left,my=e.clientY-rect.top;
    const delta=e.deltaY>0?0.97:1.03;
    setTransform(p=>{
      const ns=Math.min(Math.max(p.scale*delta,0.15),3);
      const r=ns/p.scale;
      return{scale:ns,x:mx-(mx-p.x)*r,y:my-(my-p.y)*r};
    });
    setShowHint(false);
  },[]);

  useEffect(()=>{
    const vp=vpRef.current;
    if(vp)vp.addEventListener('wheel',onWheel,{passive:false});
    return()=>{if(vp)vp.removeEventListener('wheel',onWheel)};
  },[onWheel]);

  const zoomTo=f=>setTransform(p=>{
    const vp=vpRef.current;const cx=vp?vp.clientWidth/2:0;const cy=vp?vp.clientHeight/2:0;
    const ns=Math.min(Math.max(p.scale*f,0.15),3);const r=ns/p.scale;
    return{scale:ns,x:cx-(cx-p.x)*r,y:cy-(cy-p.y)*r};
  });

  const anyOpen=orgOpen.size>0;

  return(
    <>
      <div className="top-bar">
        <div className="top-bar-left">
          <div className="top-bar-logo">The Uncommon <em>Business</em></div>
          <div className="top-bar-divider"/>
          <div className="nav-tabs">
            <a className="nav-tab active" href="index.html">Org Map</a>
            <a className="nav-tab" href="monday-morning.html">Third Shift</a>
            <ArchiveDropdown archiveOpen={archiveOpen} setArchiveOpen={setArchiveOpen}/>
          </div>
        </div>
        <div className="top-bar-right">
          {anyOpen?<button className="tb-btn" onClick={collapseAll}>Collapse all</button>:<button className="tb-btn" onClick={expandAllOrg}>Expand all</button>}
          <a className="live-badge" href="live.html">
            <span className="live-dot-wrap"><span className="live-dot"/></span>
            Live
          </a>
        </div>
      </div>

      <div className="canvas-viewport" ref={vpRef}
        onPointerDown={onPointerDown} onPointerMove={onPointerMove} onPointerUp={onPointerUp} onPointerLeave={onPointerUp}>
        <div className="canvas-world" style={{transform:`translate(${transform.x}px,${transform.y}px) scale(${transform.scale})`}}>

          <div className="hero-panel">
            <h1>The AI-Powered <em>Company</em></h1>
            <div className="hero-divider"/>
            <p className="hero-tagline">"We don't hire people to do process work. We train humans to become AI Architects — then they build AI employees that handle the rest. Take a team of 5, operate like a team of 50."</p>
            <p className="hero-cta"><span>Click any card</span> to explore the org. Click <span>AI Employees</span> to see who's really doing the work.</p>
          </div>

          <PersonNode node={orgTree} orgOpen={orgOpen} aiOpen={aiOpen} toggleOrg={toggleOrg} toggleAI={toggleAI}/>
        </div>
      </div>

      <div className="zoom-controls">
        <button className="zoom-btn" onClick={()=>zoomTo(1.25)}>+</button>
        <div className="zoom-divider"/>
        <div className="zoom-level">{Math.round(transform.scale*100)}%</div>
        <div className="zoom-divider"/>
        <button className="zoom-btn" onClick={()=>zoomTo(0.8)}>−</button>
      </div>

      {showHint&&<div className="canvas-hint"><span className="hint-desktop">Scroll to zoom · Drag to pan · Click cards to explore</span><span className="hint-mobile">Pinch to zoom · Drag to pan · Tap cards to explore</span></div>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
